# custom_prz_logging.cfg v0.9
# ------------------------------------------------------------
# PRZ_LOGGING CONTROLS (Phrozen Logging)
#
#
## Add :
#   [include custom_prz_logging.cfg]
#
#   to the start of your printer.cfg
#
#  New Macro: [gcode_macro PRZ_TOGGLE_LOG_LEVEL] #description: Toggle Phrozen logging between quiet (WARN) and debug
#
#
# PRZ_LOG_LEVEL:  [gcode_macro STARTUP_LOGGING]
#   Controls how much logging is shown in the console
#   LEVEL=0 → ERROR only (critical issues)
#   LEVEL=1 → WARN + ERROR (recommended quiet mode)
#   LEVEL=2 → INFO + WARN + ERROR (default / normal use)
#   LEVEL=3 → DEBUG (everything, same as stock behavior)
#
# PRZ_LOG_FLAGS:
#   Controls how log messages are formatted
#
#   CATEGORIES:
#     1 = ON  → Adds subsystem tags to logs
#         Examples:
#           [AMS]       Filament system logic
#           [SERIAL]    USB / UART communication
#           [TOOLHEAD]  Movement / extruder state
#           [DEV]       General plugin/system logic
#     0 = OFF → No subsystem tags (cleaner output)
#
#   TIMESTAMP:
#     1 = ON  → Adds time to each log entry
#         Example:
#           [12:34:56] [INFO] [AMS] Filament detected
#     0 = OFF → No timestamps
#
#
# Notes:
# - These settings affect console output only (no impact on printing behavior)
# - Settings persist until Klipper restarts or values are changed
# - LEVEL=3 is useful for debugging AMS issues or timing problems
# - CATEGORIES helps identify where issues originate (AMS vs SERIAL, etc.)
# - TIMESTAMP is helpful for diagnosing delays or "MCU timer too close" errors,
#   but is not necessary if your console already shows timestamps.
# ------------------------------------------------------------


# Apply logging settings shortly after Klipper starts
[delayed_gcode APPLY_STARTUP_LOGGING]
initial_duration: 10
gcode:
    STARTUP_LOGGING


# Set initial logging configuration
[gcode_macro STARTUP_LOGGING]
gcode:
    {% set level = 1 %}
    {% set categories = 1 %}
    {% set timestamp = 0 %}

    PRZ_LOG_LEVEL LEVEL={level}
    PRZ_LOG_FLAGS CATEGORIES={categories} TIMESTAMP={timestamp}

    # Sync toggle macro state with startup level
    SET_GCODE_VARIABLE MACRO=PRZ_TOGGLE_LOG_LEVEL VARIABLE=current_level VALUE={level}

    {% set level_name = ["ERROR","WARN","INFO","DEBUG"][level] %}
    RESPOND PREFIX="PRZ_LOG" MSG="Startup logging: Level={level_name}, Categories={'ON' if categories else 'OFF'}, Timestamp={'ON' if timestamp else 'OFF'}"


# Toggle between quiet and debug logging
[gcode_macro PRZ_TOGGLE_LOG_LEVEL]
description: Toggle Phrozen logging between quiet (WARN) and debug
variable_current_level: 1
gcode:
    {% set quiet = 1 %}
    {% set debug = 3 %}

    {% if current_level|int == quiet %}
        {% set new_level = debug %}
    {% else %}
        {% set new_level = quiet %}
    {% endif %}

    PRZ_LOG_LEVEL LEVEL={new_level}
    SET_GCODE_VARIABLE MACRO=PRZ_TOGGLE_LOG_LEVEL VARIABLE=current_level VALUE={new_level}

    {% set level_name = ["ERROR","WARN","INFO","DEBUG"][new_level] %}
    RESPOND PREFIX="PRZ_LOG" MSG="Logging toggled to {level_name}"