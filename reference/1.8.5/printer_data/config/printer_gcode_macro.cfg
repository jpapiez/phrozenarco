    SET_KINEMATIC_POSITION X=150
    SET_KINEMATIC_POSITION Y=150
	SET_KINEMATIC_POSITION Z=150
    SET_FILAMENT_SENSOR SENSOR=fila ENABLE=0
    {action_respond_info("G_printer_position_z_init_M84\n")}


## 自动调平宏
[gcode_macro TP_OUT]
gcode:
    SET_GCODE_VARIABLE MACRO=G30 VARIABLE=k VALUE=0
    SET_GCODE_VARIABLE MACRO=G31 VARIABLE=a VALUE=0
    SET_GCODE_VARIABLE MACRO=PG28 VARIABLE=p VALUE=0

[gcode_macro TP_PUT]
gcode:
    SET_GCODE_VARIABLE MACRO=G30 VARIABLE=k VALUE=1
    SET_GCODE_VARIABLE MACRO=G31 VARIABLE=a VALUE=1
    SET_GCODE_VARIABLE MACRO=PG28 VARIABLE=p VALUE=1

[gcode_macro PG28]
variable_p:1
gcode:
    {% if p|int==1 %}
    PRZ_PRINTING_START
    G28
    G90
    {% endif %}

[gcode_macro G31]
variable_a:1
gcode:
    {% if a|int==1 %}
    BED_MESH_CLEAR 
    BED_MESH_PROFILE LOAD=phrozen
    {% endif %}


[gcode_macro G30]
variable_k:1
gcode:
    {% if k|int==1 %}
    G90
    G28
    M106 S0
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE
    BED_MESH_PROFILE LOAD=default
    {% endif %}

## 打印自动调用-自动调平
[gcode_macro START_PRINT]
gcode:
    BED_MESH_CLEAR 
    BED_MESH_PROFILE LOAD=phrozen


## PID自动调整
[gcode_macro M303]
gcode:
    M106 S255
    PID_CALIBRATE HEATER=extruder TARGET=210
    G4 P100
    SAVE_CONFIG
    
[gcode_macro M304]
gcode:
    PID_CALIBRATE HEATER=heater_bed TARGET=60
    G4 P100
    SAVE_CONFIG

[gcode_macro G29]
gcode:
        G90
        M140 S60 
        M104 S140 
        M190 S60 
        M109 S140 
        PRZ_PRINTING_START
        G28
        G90
        M106 S0
        BED_MESH_CLEAR     
        BED_MESH_CALIBRATE PROFILE=phrozen  
        SAVE_CONFIG


[output_pin probe_pin]
pin:PA0
value:0

[gcode_macro probe_up]
gcode:
    G4 P500
    SET_PIN PIN=probe_pin VALUE=1
    
[gcode_macro probe_off]
gcode:
    SET_PIN PIN=probe_pin VALUE=0


[gcode_macro M190]
rename_existing: M99190
gcode:
    #Parameters
    {% set s = params.S|float %}

    M140 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}   ; Set bed temp
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={s-2} MAXIMUM={s+10}  ; Wait for bed temp (within 1 degree)
    {% endif %}


[gcode_macro M109]
rename_existing: M99109
gcode:
    #Parameters
    {% set s = params.S|float %}
    
    M104 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}  ; Set hotend temp
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={s} MAXIMUM={s+1}   ; Wait for hotend temp (within 1 degree)
    {% endif %}


[gcode_macro M106]
gcode:
    # {% set fan = printer["fan_generic cooling_fan"].speed %}
    # {action_respond_info("fan*255=%s\n" % (fan*255))}
    {% set p = params.P|default(0)|int %}

    {% if p == 2 %}
    {% if params.S is defined %}
        SET_PIN PIN=fan_assist VALUE={(params.S|float)}
    {% else %}
        SET_PIN PIN=fan_assist VALUE=1
    {% endif %}
    {% endif %} 

    {% if p == 0 %}
    {% if params.S is defined %}
        SET_FAN_SPEED FAN=cooling_fan SPEED={(params.S|float / 255.0)}
    {% else %}
        SET_FAN_SPEED FAN=cooling_fan SPEED=1
    {% endif %}
    {% endif %} 

    {% if p == 1 %}
    {% if params.S is defined %}
        SET_FAN_SPEED FAN=cooling_fan SPEED={(params.S|float / 255.0)}
    {% else %}
        SET_FAN_SPEED FAN=cooling_fan SPEED=1
    {% endif %}
    {% endif %} 

    {% if p == 3 %}
    {% if params.S is defined %}
        SET_FAN_SPEED FAN=Chamber_fan SPEED={(params.S|float / 255.0)}
    {% else %}
        SET_FAN_SPEED FAN=Chamber_fan SPEED=1
    {% endif %}
    {% endif %} 