    #lancaigang250519：吐料之前先刮掉残料
    #PRZ_SPITTING_SCRAPE
    PRZ_SPITTING_START
    PRZ_SPITTING_NORMAL
    PRZ_SPITTING_NORMAL
    PRZ_SPITTING_NORMAL
    PRZ_SPITTING_NORMAL
    PRZ_SPITTING_NORMAL
    PRZ_SPITTING_NORMAL
    PRZ_SPITTING_NORMAL
    #lancaigang250322：最后1次关闭加热温度为0
    PRZ_SPITTING_END

    
    #lancaigang250322：吐完料温度恢复，降温
    #M109 S{extruder_temp}
    #lancaigang250322:赋值全局变量
    #SET_GCODE_VARIABLE MACRO=GLOBAL_PARAM VARIABLE=extruder_temperature VALUE={printer.extruder.temperature}
    {action_respond_info("=====recovery extruder temp,global\n")}
    {action_respond_info("g_extruder_temperature=%s\n" % (printer["gcode_macro GLOBAL_PARAM"].g_extruder_temperature))}
    {action_respond_info("=====recovery extruder temp,global\n")}
    {action_respond_info("g_extruder_temperature=%s\n" % (printer["gcode_macro GLOBAL_PARAM"].g_extruder_temperature))}
    #M104 S{(printer["gcode_macro GLOBAL_PARAM"].g_extruder_temperature)}
    ##lancaigang250407:风扇恢复也用也用全局变量
    {action_respond_info("g_extruder_fan_speed=%s\n" % (printer["gcode_macro GLOBAL_PARAM"].g_extruder_fan_speed))}
    #M106 S{fan*255}
    M106 S{(printer["gcode_macro GLOBAL_PARAM"].g_extruder_fan_speed)}
    M106 p2 S{(printer["gcode_macro GLOBAL_PARAM"].g_assist_fan_value)}
    #lancaigang250519:吐料结束，还原，加速度 减速度 速率
    {action_respond_info("g_accel=%s\n" % (printer["gcode_macro GLOBAL_PARAM"].g_accel))}
    {action_respond_info("g_accel_to_decel=%s\n" % (printer["gcode_macro GLOBAL_PARAM"].g_accel_to_decel))}
    {action_respond_info("g_velocity=%s\n" % (printer["gcode_macro GLOBAL_PARAM"].g_velocity))}
    SET_VELOCITY_LIMIT ACCEL={(printer["gcode_macro GLOBAL_PARAM"].g_accel)} ACCEL_TO_DECEL={(printer["gcode_macro GLOBAL_PARAM"].g_accel_to_decel)}
     {action_respond_info("=====SET_VELOCITY_LIMIT;\n")}

     
    #lancaigang250519：降温需要时间
    G4 P2000
    #lancaigang250711：169防止撞到吐料盒
    G90
    G1 X{(printer["gcode_macro GLOBAL_PARAM"].g_wait_pause_x)} Y{(printer["gcode_macro GLOBAL_PARAM"].g_bottom_y)} F6000
    G90
    G1 X{(printer["gcode_macro GLOBAL_PARAM"].g_wait_pause_x)} Y{(printer["gcode_macro GLOBAL_PARAM"].g_bottom_print_y)} F6000
    #M106 S0
    G90


    #G4 P100
    #M400



# 打印结束
[gcode_macro PRINT_END]
gcode:
    {action_respond_info("=====PRINT_END\n")}
    {% set th = printer.toolhead %}
    {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
    {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
    {% set z_safe = [th.position.z + 2, th.axis_maximum.z]|min %}
    
    {% if (printer.gcode_move.position.z+5) < 300 %}
    G91
    G1 Z5 F1000
    G90
    {% endif %}

    G90
    G1  X{(printer["gcode_macro GLOBAL_PARAM"].g_wait_pause_x)} Y{(printer["gcode_macro GLOBAL_PARAM"].g_bottom_print_y)} F3000
    G90
    {action_respond_info("=====M400\n")}
    M400                           ; wait for buffer to clear

    # #lancaigang250608：先保证喷头温度达到挤出温度，才能操作挤出机
    # PG109


    # G92 E0                         ; zero the extruder
    # #G1 E-5.0 F1800
    # G1 E-5.0 F300
    
    #lancaigang250515：P2A7打印完成后，切线AMS退线，不启用暂停恢复
    {action_respond_info("=====P2 A7\n")}
    P2 A7
    #G4 P15000
    #{action_respond_info("=====P0 M0\n")}
    #lancaigang250624：延时放到P2 A7内部，喷头有线材回退40秒，喷头没有线材回退15秒；最后P0 M0
    #P0 M0


    TURN_OFF_HEATERS
    {action_respond_info("=====M107\n")}
    M107 

    #lancaigang250622：M84放最后，防止Z轴动作导致异常；  
    #stepper_z has been manually disabled
    #[(Phrozen)Klipper]MCU 'MKS_THR' shutdown: Timer too close
    #M84
    {action_respond_info("=====BED_MESH_CLEAR\n")}
    BED_MESH_CLEAR
    BED_MESH_PROFILE LOAD=phrozen
    {action_respond_info("=====SET_PIN\n")}
    M106 P1 S0
    M106 P2 S0
    M106 P3 S0
    TP_PUT
    

    {action_respond_info("=====M84\n")}
    M84
    {action_respond_info("ARCO_PRINT_END_OK\n")}




# 取消打印
[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
gcode:
    {action_respond_info("=====CANCEL_PRINT\n")}
    {% if (printer.gcode_move.position.z+5) < 300 %}
    G91
    G1 Z5 F1000
    G90
    {% endif %} 

    SDCARD_RESET_FILE
    PRINT_END
    BASE_CANCEL_PRINT




