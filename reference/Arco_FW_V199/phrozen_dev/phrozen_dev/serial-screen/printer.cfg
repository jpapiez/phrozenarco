[idle_timeout]
timeout: 3600000

[homing_override]
gcode:
    {action_respond_info("homing_override_start\n")}
    M84
    G4 P200
    {% if (printer.gcode_move.position.z+5) < 295 %}
    G91
    G1 Z5 F600
    {% else %}
    G91
    G1 Z-5 F600  
    {% endif %}

    G4 P500
    G90
    G28 Y0
    G4 P200
    G1 Y50 F2000
    G4 P200
    G28 X0
    G4 P200
    PRZ_WIPEMOUTH
    G90
    G1 X150 Y150 F8000
    G4 P500
    probe_up
    G4 P200
    G28 Z0
    G4 P200
    probe_off 
    G4 P500
    G1 Z10 F600

    # {% if printer['gcode_macro PRZ_PRINTING_START'].printing_start | int == 1 %}  
    #     {% set extruder_temp = printer.extruder.temperature | int %}
    #     {% set bed_temp = printer.heater_bed.temperature | int %}
