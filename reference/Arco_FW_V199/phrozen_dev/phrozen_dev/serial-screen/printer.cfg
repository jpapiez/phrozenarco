#printer.cfg_version:V25271

[include printer_MCU.cfg]
[include printer_gcode_macro.cfg]

## 机器设置
[printer]
kinematics:corexy
max_velocity: 1000
max_accel: 40000
max_accel_to_decel: 10000
max_z_velocity: 10
max_z_accel: 150
square_corner_velocity: 8

[stepper_x]
step_pin:PC14
dir_pin:!PC13
enable_pin:!PC15
microsteps: 16
rotation_distance: 39.94
full_steps_per_rotation:200  
#endstop_pin:tmc5160_stepper_x:virtual_endstop
endstop_pin:!MKS_THR:PB12
position_min: -10  
position_endstop: 0
position_max: 330
homing_speed:30
homing_retract_dist:0

[stepper_y]
step_pin:PE5
dir_pin:!PE4
enable_pin:!PD14
microsteps:16
rotation_distance: 39.94
full_steps_per_rotation:200 
# endstop_pin:tmc5160_stepper_y:virtual_endstop
endstop_pin:!PB8
position_min: -10
position_endstop:0
position_max:330
homing_speed:30
homing_retract_dist:0

[stepper_z]
step_pin:PE1
dir_pin:PE0
enable_pin: !PE2
microsteps: 16
rotation_distance:2.674
full_steps_per_rotation: 200
endstop_pin:!PB9
position_endstop: 0.00
position_max: 303
position_min: -5.0
homing_speed: 5
homing_retract_dist: 5
second_homing_speed: 3
homing_positive_dir: false
step_pulse_duration:0.0000001

[stepper_z1]
step_pin:PB5
dir_pin:PB4
enable_pin:!PB6
microsteps:16
rotation_distance:2.674
endstop_pin:!PB9
full_steps_per_rotation: 200
step_pulse_duration:0.0000001

[extruder]
step_pin:MKS_THR:PB9
dir_pin:MKS_THR:PB8
enable_pin:!MKS_THR:PC15 
microsteps:16
rotation_distance: 53.7	
gear_ratio: 1517:170
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
min_temp: -100
max_temp: 350
heater_pin: MKS_THR:PB3
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: MKS_THR:PA1
max_power: 1.0
min_extrude_temp: 170
smooth_time: 0.000001
nozzle_diameter:0.4
pressure_advance: 0.032
pressure_advance_smooth_time:0.03
max_extrude_cross_section:200
instantaneous_corner_velocity: 10
max_extrude_only_distance: 3000
max_extrude_only_velocity:5000
max_extrude_only_accel:2000
step_pulse_duration:0.000002

[verify_heater extruder]
max_error: 200
check_gain_time:100
hysteresis: 10
heating_gain: 1

[heater_bed]
heater_pin: PD12
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: PC0
max_power: 1.0
min_temp: -50
max_temp: 140

[heater_fan Fan0]
pin:MKS_THR:PB4
shutdown_speed: 1

# [fan]
# pin:MKS_THR:PB5

[fan_generic cooling_fan]
pin:MKS_THR:PB5
max_power: 1.0
shutdown_speed: 0
cycle_time: 0.0100
hardware_pwm: false
kick_start_time: 0.100
off_below: 0.0

[fan_generic Chamber_fan]
pin:PA1
max_power: 1.0
shutdown_speed: 0
cycle_time: 0.0100
hardware_pwm: false
kick_start_time: 0.100
off_below: 0.0

[output_pin fan_assist]
pin:MKS_THR:PB6
pwm: True
cycle_time: 0.0100
hardware_pwm: false
value: 0.00
scale: 255
shutdown_value: 0.0

[output_pin board_fan]
pin:PA2
value:1

[temperature_sensor Chamber_sensor]
sensor_type:NTC 100K MGB18-104F39050L32
sensor_pin:PC1


