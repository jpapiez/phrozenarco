    #     G4 P200
    #     PRZ_SPITTING
    #     G4 P200
    #     M106 S255
    #     G4 P200
    #     PRZ_WIPEMOUTH
    #     G4 P200
    #     G90 
    #     G1 X150 Y290 F8000
    #     G4 P500
    #     probe_up
    #     G4 P200
    #     G28 Z0
    #     G4 P200
    #     probe_off
    #     G4 P200
