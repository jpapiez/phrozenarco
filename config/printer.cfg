# horizontal_move_z: 3    
# mesh_min: 20, 20           
# mesh_max: 280, 280          
# probe_count: 5,5              
# mesh_pps: 4,4                          
# bicubic_tension: 0.2   

[bed_mesh]
speed: 300             
horizontal_move_z: 2    
mesh_min: 10, 10           
mesh_max: 290, 290          
probe_count: 6,6              
mesh_pps: 8,8
algorithm: bicubic                          
bicubic_tension: 0.2    



[tmc5160 stepper_x]
cs_pin:PE6
spi_software_sclk_pin:PE12
spi_software_mosi_pin:PE14
spi_software_miso_pin:PE13
spi_speed:200000
run_current: 1.6
sense_resistor:0.12
stealthchop_threshold:0
diag1_pin:^!PA14
driver_SGT:1

[tmc5160 stepper_y]
cs_pin:PE3
spi_software_sclk_pin:PE12
spi_software_mosi_pin:PE14
spi_software_miso_pin:PE13
spi_speed:200000
run_current: 1.6
sense_resistor:0.12
stealthchop_threshold:0
diag1_pin:^!PA15
driver_SGT:1

[tmc2209 stepper_z]
uart_pin: PB7
interpolate: true
run_current: 0.9
sense_resistor: 0.110
stealthchop_threshold: 0

[tmc2209 stepper_z1]
uart_pin: PB3
interpolate: true
run_current: 0.9
sense_resistor: 0.110
stealthchop_threshold: 0



[tmc2209 extruder]
uart_pin: MKS_THR:PC13
interpolate: true
run_current: 0.707
sense_resistor: 0.110
stealthchop_threshold: 0


[duplicate_pin_override]
pins: PB9


[gcode_arcs]
resolution: 0.5


[virtual_sdcard]
path: /home/mks/printer_data/gcodes

## 暂停恢复功能调用
[pause_resume]

[display_status]

[adxl345]
cs_pin: MKS_THR:PA4
spi_software_sclk_pin: MKS_THR:PA5
spi_software_mosi_pin: MKS_THR:PA7
spi_software_miso_pin: MKS_THR:PA6
axes_map: -x, z, -y

[resonance_tester]
accel_chip: adxl345
probe_points:
    150, 150, 20 


# ─── Phrozen Dev Module (Serial Communication / LED / AMS) ──────────────
# This section loads the phrozen_dev Klipper extra which handles serial
# communication with the Arco mainboard.  It provides:
#   - Chamber LED control (P0 LED_SetState)
#   - Filament sensor ADC
#   - HMI protocol messages
#   - AMS serial communication (when ams_attached: true)
#
# Set ams_attached to true if you have a Phrozen AMS unit connected.

[phrozen_dev]
dev_port: /dev/ttyACM1
auto_connect: false
ams_attached: false
fila_cut_x_pos: 318
fila_cut_x_pos_up: 1
fila_cut_y_pos: 260
fila_exist_value: 0.476252
fila_empty_value: 0.249695
fila_sensor_pin: MKS_THR:PA2
wait_max_velocity: 180
wait_line_width: 0.5
wait_timeout: 60
switch_fila_zup_by_gcode: 0

