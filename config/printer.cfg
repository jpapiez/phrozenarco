[homing_override]
gcode:
    {action_respond_info("homing_override_start")}
    _CLEAR_RECOVERY_AUTH
    _KAOS_SAFETY_MODE_ENABLE_INTERNAL_MOTION_BYPASS

    {% set CFG = printer["gcode_macro _USER_CONFIG"] %}
    {% set homing_z_lift_feedrate = CFG.homing_z_lift_feedrate|default(600)|float %}
    {% set homing_y_clear_feedrate = CFG.homing_y_clear_feedrate|default(2000)|float %}
    {% set homing_center_feedrate = CFG.homing_center_feedrate|default(8000)|float %}
    {% set homing_final_z_feedrate = CFG.homing_final_z_feedrate|default(600)|float %}

    {% set home_x = 'X' in params %}
    {% set home_y = 'Y' in params %}
    {% set home_z = 'Z' in params %}
    {% set full_home = not home_x and not home_y and not home_z %}

    # Capture prior axis-trust state before this macro changes variables.
    # SET_GCODE_VARIABLE changes are not reliably visible to Jinja later in the
    # same macro render, so use these prior_* values for axis-only trust decisions.
    {% set prior_x_trusted = printer["gcode_macro _TRUSTED_AXIS_HOME"].x|int %}
    {% set prior_y_trusted = printer["gcode_macro _TRUSTED_AXIS_HOME"].y|int %}
    {% set prior_z_trusted = printer["gcode_macro _TRUSTED_AXIS_HOME"].z|int %}

    {% if full_home %}
        _CLEAR_TRUSTED_HOME
    {% endif %}

    SET_KINEMATIC_POSITION Z={printer.gcode_move.position.z}
    G4 P200

    {% set z_lift_max = printer.configfile.settings.stepper_z.position_max - printer["gcode_macro PRZ_GEOMETRY"].z_lift_safety_margin %}
    {% if full_home or home_y or home_x or home_z %}
        {% if (printer.gcode_move.position.z + 5) < z_lift_max %}
            G91
            G1 Z5 F{homing_z_lift_feedrate}
        {% else %}
            G91
            G1 Z-5 F{homing_z_lift_feedrate}
        {% endif %}
        G4 P500
        G90
    {% endif %}

    {% if full_home or home_y %}
        G28 Y0
        G4 P200
        {% if full_home %}
            G1 Y50 F{homing_y_clear_feedrate}
        {% endif %}
        SET_GCODE_VARIABLE MACRO=_TRUSTED_AXIS_HOME VARIABLE=y VALUE=1
    {% endif %}

    {% if full_home or home_x %}
        G28 X0
        G4 P200
        SET_GCODE_VARIABLE MACRO=_TRUSTED_AXIS_HOME VARIABLE=x VALUE=1
    {% endif %}

    # Compute effective trust using prior state plus axes physically homed in
    # this command. Do not rely on SET_GCODE_VARIABLE reads later in this same
    # macro render. This also handles screen calls like G28 X Y or G28 X Y Z.
    {% set final_x_trusted = 1 if (full_home or home_x or prior_x_trusted == 1) else 0 %}
    {% set final_y_trusted = 1 if (full_home or home_y or prior_y_trusted == 1) else 0 %}
    {% set final_z_trusted = 1 if (full_home or home_z or prior_z_trusted == 1) else 0 %}

    {% if final_x_trusted == 1 and final_y_trusted == 1 %}
        _SET_TRUSTED_XY
    {% endif %}

    {% if full_home %}
        PRZ_WIPEMOUTH
        G90
        G1 X150 Y150 F{homing_center_feedrate}
        G4 P500
    {% endif %}

    {% if full_home or home_z %}
        probe_up
        G4 P200
        G28 Z0
        G4 P200
        _SET_TRUSTED_Z
        SET_GCODE_VARIABLE MACRO=_TRUSTED_AXIS_HOME VARIABLE=z VALUE=1
        probe_off
        G4 P500
    {% endif %}

    {% if final_x_trusted == 1 and final_y_trusted == 1 and final_z_trusted == 1 %}
        _SET_TRUSTED_XYZ
    {% endif %}

    {% if full_home %}
        G90
        G1 Z10 F{homing_final_z_feedrate}
    {% endif %}

    _KAOS_SAFETY_MODE_DISABLE_INTERNAL_MOTION_BYPASS
    {action_respond_info("homing_override_end")}

[probe]
pin: !PB9
x_offset: 0
y_offset: 0
z_offset: 0
speed: 5
samples: 2
samples_result: median
sample_retract_dist: 2#3
samples_tolerance: 0.02
samples_tolerance_retries: 5
activate_gcode:probe_up
deactivate_gcode:probe_off

