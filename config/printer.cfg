dir_pin:!PE4
enable_pin:!PD14
microsteps:16
rotation_distance: 39.94
full_steps_per_rotation:200 
# endstop_pin:tmc5160_stepper_y:virtual_endstop
endstop_pin:!PB8
position_min: -10
position_endstop:0
position_max:330
homing_speed:30
homing_retract_dist:0

[stepper_z]
