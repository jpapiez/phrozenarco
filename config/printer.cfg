dir_pin:PE0
enable_pin: !PE2
microsteps: 16
rotation_distance:2.674
full_steps_per_rotation: 200
endstop_pin:!PB9
position_endstop: 0.00
position_max: 303
position_min: -5.0
homing_speed: 5
homing_retract_dist: 5
second_homing_speed: 3
homing_positive_dir: false
step_pulse_duration:0.0000001

[stepper_z1]
step_pin:PB5
dir_pin:PB4
enable_pin:!PB6
microsteps:16
rotation_distance:2.674
endstop_pin:!PB9
full_steps_per_rotation: 200
step_pulse_duration:0.0000001

[extruder]
step_pin:MKS_THR:PB9
dir_pin:MKS_THR:PB8
enable_pin:!MKS_THR:PC15 
microsteps:16
rotation_distance: 53.7	
gear_ratio: 1517:170
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
min_temp: -100
max_temp: 350
heater_pin: MKS_THR:PB3
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: MKS_THR:PA1
max_power: 1.0
min_extrude_temp: 170
smooth_time: 0.000001
nozzle_diameter:0.4
pressure_advance: 0.032
pressure_advance_smooth_time:0.03
max_extrude_cross_section:200
instantaneous_corner_velocity: 10
max_extrude_only_distance: 3000
max_extrude_only_velocity:5000
max_extrude_only_accel:2000
step_pulse_duration:0.000002

[verify_heater extruder]
max_error: 200
check_gain_time:100
hysteresis: 10
heating_gain: 1

[heater_bed]
heater_pin: PD12
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: PC0
max_power: 1.0
min_temp: -50
max_temp: 140

[heater_fan Fan0]
pin:MKS_THR:PB4
shutdown_speed: 1

