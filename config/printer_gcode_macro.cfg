[gcode_macro PRINT_END]
description: End-of-print: lift, park at waiting area, firmware cut/retract, cool down
gcode:
    _REQUIRE_TRUSTED_XYZ
    _KAOS_LOG LEVEL=2 CATEGORY=PRINT MSG="PRINT_END"

    # Lift Z if there is room (max Z is 303)
    {% set z_lift_max = printer.configfile.settings.stepper_z.position_max - printer["gcode_macro PRZ_GEOMETRY"].z_lift_safety_margin %}
    {% if (printer.gcode_move.position.z + 5) < z_lift_max %}
        G91
        G1 Z5 F1000
        G90
    {% endif %}

    # Safe pathing to waiting area before firmware cut
    PRZ_WAITINGAREA
    M400

    # Firmware cut + AMS retract (when AMS is attached); delay is internal to P2 A7
    {% if 'phrozen_dev' in printer and printer.configfile.settings.phrozen_dev.ams_attached|default(false) %}
        _KAOS_LOG LEVEL=3 CATEGORY=PRINT MSG="PRINT_END: P2 A7"
        P2 A7
    {% else %}
        _KAOS_LOG LEVEL=2 CATEGORY=PRINT MSG="PRINT_END: AMS not attached, skipping P2 A7"
    {% endif %}

    TURN_OFF_HEATERS
    _KAOS_LOG LEVEL=3 CATEGORY=PRINT MSG="PRINT_END: M107"
    M107

    BED_MESH_CLEAR
    BED_MESH_PROFILE LOAD=phrozen
    M106 P1 S0
    M106 P2 S0
    M106 P3 S0
    TP_PUT

    G4 P45000
    M84
    {action_respond_info("ARCO_PRINT_END_OK\n")}

# 取消打印
[gcode_macro CANCEL_PRINT]
description: Cancel a print safely, including before KAOS trusted homing exists
rename_existing: BASE_CANCEL_PRINT
gcode:
    _KAOS_LOG LEVEL=2 CATEGORY=PRINT MSG="CANCEL_PRINT"

    {% set trusted_xyz = printer["gcode_macro _TRUSTED_HOME"].xyz|default(0)|int %}

    # Stop queued virtual-SD print commands first. This must happen before any
    # trusted-motion guard, otherwise early/pre-home cancel can fail and the
    # start G-code may continue running.
    SDCARD_RESET_FILE

    # Always-safe shutdown actions. No motion and no trusted-home requirement.
    TURN_OFF_HEATERS
    M107

    {% if trusted_xyz == 1 %}
        _KAOS_LOG LEVEL=2 CATEGORY=PRINT MSG="CANCEL_PRINT: trusted XYZ; running PRINT_END cleanup"
        PRINT_END
    {% else %}
        _KAOS_LOG LEVEL=1 CATEGORY=PRINT MSG="CANCEL_PRINT: no trusted XYZ; skipping movement cleanup"
        BED_MESH_CLEAR
        TP_PUT
        M106 P1 S0
        M106 P2 S0
        M106 P3 S0
        M84
    {% endif %}

    BASE_CANCEL_PRINT

