## ============================================================================
## GEOMETRY CONSTANTS — read-only machine geometry and safe-zone boundaries.
## ----------------------------------------------------------------------------
## These values describe the machine's physical layout and the corridors
## the toolhead is allowed to traverse. Editing requires understanding of
## the AMS service area, chute, and wipe brush positions.
## ============================================================================
## ============================================================================
## GLOBAL_PARAM — position variables preserved under their original Phrozen
## names. These are the variables that a Phrozen UI calibration flow might
## override at runtime via SET_GCODE_VARIABLE. We keep the original macro
## name + variable names intact so any such override continues to work.
## ============================================================================
[gcode_macro GLOBAL_PARAM]
description: Position state container; original Phrozen variable names preserved for runtime-override compatibility
variable_g_spitting_start_x:    124   ; X of chute / spitting area
variable_g_wait_pause_x:        140   ; X where toolhead parks at waiting area
variable_g_wipemouth_start_x:   140   ; X start of wipe brush
variable_g_bottom_y:            322   ; Y of service level (chute, wipe brush)
variable_g_bottom_print_y:      302   ; Y of waiting area (just past print zone)
gcode:


## ============================================================================
## PRZ_GEOMETRY — KAOS-introduced geometry constants and safety margins.
## These didn't exist in stock Phrozen and are not candidates for runtime
## override. Live alongside the GLOBAL_PARAM positions above.
## ============================================================================
[gcode_macro PRZ_GEOMETRY]
description: Read-only KAOS geometry inputs (margins, offsets, derived-elsewhere widths)
# --- Z safety margin (Z max itself is read live from [stepper_z] position_max
#     so PRZ_GEOMETRY can never desync from printer.cfg) ---
variable_z_lift_safety_margin:   3    ; mm of headroom kept below stepper_z.position_max
variable_toolchange_z_lift:      3    ; Z-sandwich lift during a tool change (mm)
variable_service_level_threshold: 320 ; pos.y >= this counts as "at service level" (= g_bottom_y - 2mm tolerance)
# --- Derived-at-use-site offsets (waiting_x = chute_x + safe_x_offset;
#     wipe_x_right = wipe_x_left + wipe_brush_width). Derivations happen at
#     use sites so they cannot desync. ---
variable_safe_x_offset:         15    ; X offset from chute used as the "near-chute safe spot" (waiting_x = chute_x + this)
variable_wipe_brush_width:      60    ; mm wipe span (wipe_x_right = wipe_x_left + this)
# --- Safe corridor (corridor in X when Y > waiting_y) ---
variable_safe_corridor_x_min:  125
variable_safe_corridor_x_max:  250
# --- Extrusion / heating constants used during tool change ---
variable_prime_length:          55    ; mm gears-to-nozzle prime in PRZ_SPITTING_START
variable_depressurize_length:    4    ; mm retract during PG101 depressurize
variable_temp_safety_max:      250    ; max safe extruder target (deg C); deliberately lower than [extruder] max_temp (350)
variable_temp_overshoot:        20    ; +deg C overshoot during PG101 heating
gcode:


## ============================================================================
## RUNTIME STATE — captures of "what the print is set up to do".
## ----------------------------------------------------------------------------
## PG103/PG104 populate these at print start. PG101, _SPITTING_FRAME,
## ORCA_PURGE, etc. read them to restore state after a service detour.
## Defaults are safe fallbacks: if PG104 never runs, target_accel=2500
## still produces a valid SET_VELOCITY_LIMIT call (no ACCEL=0 trap).
## ============================================================================
[gcode_macro PRZ_RUNTIME_STATE]
description: Runtime captures from PG103/PG104; safe fallback defaults
variable_target_extruder_temp: 205    ; set by PG103
variable_cooling_fan_speed:    254    ; set by PG104 (M106 P0 S0..255)
variable_assist_fan_value:     254    ; set by PG104 (fan_assist pin)
variable_target_accel:        2500    ; set by PG104 (mm/s^2); fallback default
variable_target_accel_to_decel: 2500  ; set by PG104; fallback default
gcode:


[gcode_macro _TRUSTED_AXIS_HOME]
variable_x: 0
variable_y: 0
variable_z: 0
gcode:


## ============================================================================
## TOOLCHANGE PENDING — handoff between TOOLCHANGE and PRZ_SPITTING_END.
## ----------------------------------------------------------------------------
## The slicer (Orca) emits BOTH our `TOOLCHANGE NEXT=... FLUSH=...` line AND
## its own `T<n> ; change extruder` afterwards. We can't suppress the latter,
## so TOOLCHANGE must NOT fire `T<n>` itself (that would double-cut).
##
## But that means the firmware's cut+load+prime cycle runs AFTER our TOOLCHANGE
## completes. If we ran ORCA_PURGE inside TOOLCHANGE, the color flush would
## happen BEFORE the cut — purging old color we're about to discard, and
## leaving new color un-wiped after the prime.
##
## Instead, TOOLCHANGE stashes the slicer's FLUSH/RETRACT here, and
## PRZ_SPITTING_END (called at the tail of the firmware's _SPITTING_FRAME
## prime sequence) reads + clears it, running ORCA_PURGE post-prime so the
## flush + wipe land in the correct order.
##
## Z-sandwich: the firmware does NOT lift Z before traveling to chute, so
## TOOLCHANGE lifts (clears the print on the way out) and PRZ_SPITTING_END
## lowers after ORCA_PURGE (so the slicer resume returns to the original
## print Z). `lifted` tracks whether the lift actually happened (it can be
## skipped near the Z safety ceiling).
##
## Order on hardware:
##   1. TOOLCHANGE: lift Z (if room), retract OLD, stash pending — no lower
##   2. (slicer emits T<n>)
##   3. Firmware: PG104 → PG101 (depressurize + travel at lifted Z) → CUT →
##      PG106 (9mm) → PG110 (5mm catch) → PG113 → _SPITTING_FRAME →
##      PRZ_SPITTING_START (55mm prime) → PRZ_SPITTING_END
##         → PRZ_SPITTING_END consumes pending:
##              ORCA_PURGE FLUSH=... → wipe → if lifted: lower Z back
## ============================================================================
[gcode_macro _TOOLCHANGE_PENDING]
description: Handoff state from TOOLCHANGE to PRZ_SPITTING_END (auto-runs ORCA_PURGE post-prime)
variable_active:  0    ; 1 = TOOLCHANGE queued a color flush; 0 = no pending
variable_flush:   0    ; mm of color flush requested by slicer (FLUSH param)
variable_retract: 0    ; mm of post-purge retract (RETRACT_NEW param)
variable_lifted:  0    ; 1 = TOOLCHANGE lifted Z; PRZ_SPITTING_END must lower it back
gcode:


[gcode_macro G1]
rename_existing: G1.1
gcode:
    {% set trusted_xy = printer["gcode_macro _TRUSTED_HOME"].xy|int %}
    {% set trusted_z = printer["gcode_macro _TRUSTED_HOME"].z|int %}
    {% set recovery = printer["gcode_macro _RECOVERY_STATE"].authorized|int %}
    {% set bypass = printer["gcode_macro _KAOS_SAFETY_MODE_CONFIG"].motion_guard_bypass|int %}
    {% set min_allowed_z = printer["gcode_macro _USER_CONFIG"].min_allowed_z|default(-0.10)|float %}
    {% set has_x = "X" in params %}
    {% set has_y = "Y" in params %}
    {% set has_z = "Z" in params %}

    {% if (has_x or has_y) and trusted_xy != 1 and bypass != 1 %}
        { action_raise_error("G1 HARD BLOCK: any XY move requires trusted XY. Run PG28/G28 first.") }
    {% endif %}

    {% if has_z and trusted_z != 1 and recovery != 1 and bypass != 1 %}
        { action_raise_error("G1 HARD BLOCK: Z move requires trusted Z, user-authorized recovery, or internal bypass. Run PG28/G28 first.") }
    {% endif %}

    {% if has_z and bypass != 1 %}
        {% set requested_z = params.Z|float %}
        {% if printer.gcode_move.absolute_coordinates %}
            {% set target_z = requested_z %}
        {% else %}
            {% set target_z = printer.toolhead.position.z|float + requested_z %}
        {% endif %}
        {% if target_z < min_allowed_z %}
            { action_raise_error("G1 HARD BLOCK: Z target %.3f is below KAOS minimum %.3f. Adjust variable_min_allowed_z only if you intentionally need more negative Z travel." % (target_z, min_allowed_z)) }
        {% endif %}
    {% endif %}

    G1.1 {rawparams}

[gcode_macro G0]
rename_existing: G0.1
gcode:
    {% set trusted_xy = printer["gcode_macro _TRUSTED_HOME"].xy|int %}
    {% set trusted_z = printer["gcode_macro _TRUSTED_HOME"].z|int %}
    {% set recovery = printer["gcode_macro _RECOVERY_STATE"].authorized|int %}
    {% set bypass = printer["gcode_macro _KAOS_SAFETY_MODE_CONFIG"].motion_guard_bypass|int %}
    {% set min_allowed_z = printer["gcode_macro _USER_CONFIG"].min_allowed_z|default(-0.10)|float %}
    {% set has_x = "X" in params %}
    {% set has_y = "Y" in params %}
    {% set has_z = "Z" in params %}

    {% if (has_x or has_y) and trusted_xy != 1 and bypass != 1 %}
        { action_raise_error("G0 HARD BLOCK: any XY move requires trusted XY. Run PG28/G28 first.") }
    {% endif %}

    {% if has_z and trusted_z != 1 and recovery != 1 and bypass != 1 %}
        { action_raise_error("G0 HARD BLOCK: Z move requires trusted Z, user-authorized recovery, or internal bypass. Run PG28/G28 first.") }
    {% endif %}

    {% if has_z and bypass != 1 %}
        {% set requested_z = params.Z|float %}
        {% if printer.gcode_move.absolute_coordinates %}
            {% set target_z = requested_z %}
        {% else %}
            {% set target_z = printer.toolhead.position.z|float + requested_z %}
        {% endif %}
        {% if target_z < min_allowed_z %}
            { action_raise_error("G0 HARD BLOCK: Z target %.3f is below KAOS minimum %.3f. Adjust variable_min_allowed_z only if you intentionally need more negative Z travel." % (target_z, min_allowed_z)) }
        {% endif %}
    {% endif %}

    G0.1 {rawparams}

[gcode_macro G40]
description: Input shaper calibration: ACCELEROMETER_QUERY -> G28 -> SHAPER_CALIBRATE -> SAVE_CONFIG
gcode:
    ACCELEROMETER_QUERY
    G28
    G90
    M104 S140
    SHAPER_CALIBRATE
    G4 P100
    SAVE_CONFIG

[gcode_macro SHAPER_CALIBRATE]
description: Input shaper calibration sweep 30-150 Hz; renames base to RESHAPER_CALIBRATE
rename_existing: RESHAPER_CALIBRATE
gcode:
    RESHAPER_CALIBRATE FREQ_START=30 FREQ_END=150

## 擦嘴设置 (Wipe Brush)
[gcode_macro PRZ_WIPEMOUTH]
description: Wipe across the brush; uses _SAFE_SERVICE_TRANSIT for safe approach
gcode:
    _REQUIRE_TRUSTED_XY
    _KAOS_LOG LEVEL=3 CATEGORY=SERVICE MSG="PRZ_WIPEMOUTH"
    {% set GEO = printer["gcode_macro PRZ_GEOMETRY"] %}
    {% set pos = printer.toolhead.position %}

    G90

    # If already at service level, go direct to wiper; else route through waiting area first.
    {% if pos.y >= GEO.service_level_threshold %}
    {% else %}
        _SAFE_SERVICE_TRANSIT
        G1 Y{printer["gcode_macro GLOBAL_PARAM"].g_bottom_y} F4000
    {% endif %}

    G1 X{printer["gcode_macro GLOBAL_PARAM"].g_wipemouth_start_x} Y{printer["gcode_macro GLOBAL_PARAM"].g_bottom_y} F8000
    G1 X{printer["gcode_macro GLOBAL_PARAM"].g_wipemouth_start_x + GEO.wipe_brush_width} F8000
    G1 X{printer["gcode_macro GLOBAL_PARAM"].g_wipemouth_start_x} F8000
    G1 X{printer["gcode_macro GLOBAL_PARAM"].g_wipemouth_start_x + GEO.wipe_brush_width} F8000
    G1 X{printer["gcode_macro GLOBAL_PARAM"].g_wipemouth_start_x} F8000
    G1 X{printer["gcode_macro GLOBAL_PARAM"].g_wipemouth_start_x + GEO.wipe_brush_width} F8000
    G1 X{printer["gcode_macro GLOBAL_PARAM"].g_wipemouth_start_x} F8000

    # Return to waiting area; diagonal is safe (X stays in corridor).
    G1 X{printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x + GEO.safe_x_offset} Y{printer["gcode_macro GLOBAL_PARAM"].g_bottom_print_y} F8000


[gcode_macro PRZ_PRINTING_START]
description: Sets variable_printing_start=1 to mark print-in-progress (read by homing override)
variable_printing_start: 0 
gcode:
    SET_GCODE_VARIABLE MACRO=PRZ_PRINTING_START VARIABLE=printing_start VALUE=1
    {action_respond_info("MAINTENANCE_ITEM_PARAM :%d\n" % (printer["gcode_macro PRZ_PRINTING_START"].printing_start))}
    
## 吐料轨迹 (legacy single-color purge; called by PG108)
[gcode_macro PRZ_SPITTING]
description: Single-color 110mm purge with kicks; called by PG108 (firmware single-color M3 mode)
gcode:
    _REQUIRE_TRUSTED_XY
    _KAOS_LOG LEVEL=3 CATEGORY=PURGE MSG="PRZ_SPITTING"
    {% set GEO = printer["gcode_macro PRZ_GEOMETRY"] %}

    M106 S0
    M106 P2 S0

    G90
    G1 X{printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x} Y{printer["gcode_macro GLOBAL_PARAM"].g_bottom_y} F4000
    M83
    G92 E0
    G1 E60 F320
    G92 E0
    G1 E50 F250
    G92 E0
    G1 E-2 F300

    M106 S255
    M106 P2 S255
    G4 P6000
    M106 S0
    M106 P2 S0
    G4 P1500

    G90
    G1 X{printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x + GEO.safe_x_offset} Y{printer["gcode_macro GLOBAL_PARAM"].g_bottom_y} F12000
    G4 P200

    G90
    G1 X{printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x} Y{printer["gcode_macro GLOBAL_PARAM"].g_bottom_y} F4000
    G4 P100
    G90
    G1 X{printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x + GEO.safe_x_offset} Y{printer["gcode_macro GLOBAL_PARAM"].g_bottom_y} F12000
    G4 P100

## lancaigang250519:吐料刮料
## Stub: firmware (P-commands) calls this by name. The original purpose was
## a residue scrape; it has been a no-op since the move to ORCA_PURGE-driven
## color transitions. Keep the name to satisfy firmware lookups.
[gcode_macro PRZ_SPITTING_SCRAPE]
description: No-op stub - firmware-callable
gcode:
    _KAOS_LOG LEVEL=3 CATEGORY=PURGE MSG="PRZ_SPITTING_SCRAPE (no-op)"

[gcode_macro PRZ_SPITTING_START]
description: Prime new filament from gears to nozzle tip; ORCA_PURGE handles the color-transition purge
gcode:
    _REQUIRE_TRUSTED_XY
    _KAOS_LOG LEVEL=3 CATEGORY=PURGE MSG="PRZ_SPITTING_START"
    {% set GEO = printer["gcode_macro PRZ_GEOMETRY"] %}

    M106 S0
    M106 P2 S0

    G90
    G1 X{printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x} Y{printer["gcode_macro GLOBAL_PARAM"].g_bottom_y} F4000

    # Prime: gears-to-nozzle distance (PRZ_GEOMETRY.prime_length)
    M83
    G92 E0
    G1 E{GEO.prime_length} F320
    G92 E0

    # Small post-prime cleanup retract (intentionally smaller than PG101's
    # depressurize: this is just to reduce ooze before the kick moves)
    G1 E-2 F300

    M106 S255
    M106 P2 S255
    G4 P6000
    M106 S0
    M106 P2 S0
    G4 P1500

    G90
    G1 X{printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x + GEO.safe_x_offset} Y{printer["gcode_macro GLOBAL_PARAM"].g_bottom_y} F12000
    G4 P200

    G90
    G1 X{printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x} Y{printer["gcode_macro GLOBAL_PARAM"].g_bottom_y} F4000
    G4 P100
    G90
    G1 X{printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x + GEO.safe_x_offset} Y{printer["gcode_macro GLOBAL_PARAM"].g_bottom_y} F12000
    G4 P100


## Tail of the firmware's _SPITTING_FRAME prime sequence. If TOOLCHANGE queued
## a color flush via _TOOLCHANGE_PENDING, run ORCA_PURGE here (post-prime,
## while still hot at chute) so the flush + wipe land in the correct order,
## then lower Z back to print height if TOOLCHANGE lifted it.
## Otherwise (single-color path via PG108 etc.) just restore print temp.
[gcode_macro PRZ_SPITTING_END]
description: Restore print temp; consumes any pending ORCA_PURGE + Z-lower queued by TOOLCHANGE
gcode:
    {% set PEND = printer["gcode_macro _TOOLCHANGE_PENDING"] %}
    {% set GEO = printer["gcode_macro PRZ_GEOMETRY"] %}
    {% set ST = printer["gcode_macro PRZ_RUNTIME_STATE"] %}
    {% if PEND.active|int == 1 %}
        # Clear FIRST so any re-entry (shouldn't happen, but defensive) sees no pending.
        SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_PENDING VARIABLE=active VALUE=0
        # ORCA_PURGE handles its own temp + fan restore at the end.
        ORCA_PURGE FLUSH={PEND.flush} RETRACT={PEND.retract}
        # Mirror TOOLCHANGE's lift, only if it actually happened.
        {% if PEND.lifted|int == 1 %}
            SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_PENDING VARIABLE=lifted VALUE=0
            G91
            G1 Z-{GEO.toolchange_z_lift} F12000
            G90
        {% endif %}
    {% else %}
        _KAOS_LOG LEVEL=3 CATEGORY=PURGE MSG="PRZ_SPITTING_END: restoring temp to {ST.target_extruder_temp}"
        M104 S{ST.target_extruder_temp}
    {% endif %}


## Helper: shared safe pathing to the waiting area. Used by PRZ_WAITINGAREA,
## PRZ_CUT_WAITINGAREA, PRZ_PAUSE_WAITINGAREA, PRZ_WIPEMOUTH. The leading
## underscore name avoids recursion when timer callbacks invoke
## PRZ_PAUSE_WAITINGAREA while PRZ_WAITINGAREA is executing.
##
## Safe corridor: X in [safe_corridor_x_min, safe_corridor_x_max] when Y > waiting_y
[gcode_macro _SAFE_SERVICE_TRANSIT]
description: Shared safe pathing to waiting area; firmware doesn't know this name
gcode:
    _REQUIRE_TRUSTED_XY
    {% set GEO = printer["gcode_macro PRZ_GEOMETRY"] %}
    {% set pos = printer.toolhead.position %}
    _KAOS_LOG LEVEL=3 CATEGORY=SERVICE MSG="_SAFE_SERVICE_TRANSIT: from ({pos.x|round(1)}, {pos.y|round(1)}) to waiting area ({(printer['gcode_macro GLOBAL_PARAM'].g_spitting_start_x + GEO.safe_x_offset)|round(1)}, {printer['gcode_macro GLOBAL_PARAM'].g_bottom_print_y|round(1)})"

    G90

    # Use the renamed native move command inside this shared service-path helper.
    # Reason: this macro can be invoked by Phrozen pause/recovery callbacks while
    # a guarded G1 macro is already executing, especially during very slow ironing
    # moves. Calling G1 here can therefore trip Klipper's macro-recursion guard.
    # The trusted-XY check above remains the safety gate for this internal move.
    {% if pos.y > printer["gcode_macro GLOBAL_PARAM"].g_bottom_print_y %}
        # Already in service area: slide X into corridor before dropping Y
        {% if pos.x < GEO.safe_corridor_x_min %}
            G1.1 X{GEO.safe_corridor_x_min} F10000
        {% elif pos.x > GEO.safe_corridor_x_max %}
            G1.1 X{GEO.safe_corridor_x_max} F10000
        {% endif %}
        G1.1 X{printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x + GEO.safe_x_offset} Y{printer["gcode_macro GLOBAL_PARAM"].g_bottom_print_y} F4000
    {% else %}
        # Below service area - single diagonal move is safe
        G1.1 X{printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x + GEO.safe_x_offset} Y{printer["gcode_macro GLOBAL_PARAM"].g_bottom_print_y} F4000
    {% endif %}


[gcode_macro PRZ_WAITINGAREA]
description: Safe transit to waiting area
gcode:
    _REQUIRE_TRUSTED_XY
    _KAOS_LOG LEVEL=3 CATEGORY=SERVICE MSG="PRZ_WAITINGAREA"
    _SAFE_SERVICE_TRANSIT


[gcode_macro PRZ_CUT_WAITINGAREA]
description: Safe transit to chute via waiting area
gcode:
    _REQUIRE_TRUSTED_XY
    {% set GEO = printer["gcode_macro PRZ_GEOMETRY"] %}
    {% set pos = printer.toolhead.position %}

    _KAOS_LOG LEVEL=3 CATEGORY=SERVICE MSG="PRZ_CUT_WAITINGAREA: from ({pos.x|round(1)}, {pos.y|round(1)}) to chute ({printer['gcode_macro GLOBAL_PARAM'].g_spitting_start_x|round(1)}, {printer['gcode_macro GLOBAL_PARAM'].g_bottom_y|round(1)})"

    # Optimization: already at service level, just slide X to chute
    {% if pos.y >= GEO.service_level_threshold %}
        G90
        G1 X{printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x} F4000
    {% else %}
        # Route via waiting area, then rise to service level and slide into chute
        _SAFE_SERVICE_TRANSIT
        G1 Y{printer["gcode_macro GLOBAL_PARAM"].g_bottom_y} F4000
        G1 X{printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x} F4000
    {% endif %}


[gcode_macro PRZ_PAUSE_WAITINGAREA]
description: Safe pause position at waiting area
gcode:
    _REQUIRE_TRUSTED_XY
    _KAOS_LOG LEVEL=3 CATEGORY=SERVICE MSG="PRZ_PAUSE_WAITINGAREA"
    _SAFE_SERVICE_TRANSIT

## ============================================================================
## PG10X / PG11X — firmware-driven entry points
## ----------------------------------------------------------------------------
## These macros are called BY the firmware (via P-commands) at specific points
## during a print. The numbering and per-macro contract is dictated by the
## firmware (phrozen_dev/dev.py); we cannot rename, delete, or merge them
## without coordinating with that code.
##
##   PG101 — Pre-cut path. Fires at the start of T[] tool change. Does NOT lift
##           Z; the TOOLCHANGE wrapper owns the Z-sandwich.
##   PG102 — Toolchange spit (single-NORMAL legacy; equivalent to PG112 today).
##   PG103 — Capture extruder.temperature into PRZ_RUNTIME_STATE.
##   PG104 — Capture fans + accel + accel_to_decel into PRZ_RUNTIME_STATE.
##   PG105 — No-op stub. Firmware checkpoint only.
##   PG106 — Move to chute, depressurize 9mm.
##   PG107 — No-op stub. Firmware checkpoint only.
##   PG108 — Heat to print temp + spit + wipe + park (single-color M3 mode).
##   PG109 — Heat to print temp (capped at PRZ_GEOMETRY.temp_safety_max).
##   PG110 — Klipper "catches" new filament with 5mm extrude.
##   PG111 — _SPITTING_FRAME PRIME=0  (no prime; just temp restore + park).
##   PG112-PG119 — _SPITTING_FRAME PRIME=1  (prime + temp restore + park).
##                 Originally graduated by PRZ_SPITTING_NORMAL count (now
##                 removed); kept as separate names for the firmware contract.
## ============================================================================

[gcode_macro PG103]
description: Firmware-fired sensor capture: snapshots extruder.temperature into PRZ_RUNTIME_STATE
gcode:
    # No trust guard - PG103 does not issue motion, just captures a sensor read.
    _KAOS_LOG LEVEL=3 CATEGORY=FIRMWARE MSG="PG103"
    SET_GCODE_VARIABLE MACRO=PRZ_RUNTIME_STATE VARIABLE=target_extruder_temp VALUE={printer.extruder.temperature}

[gcode_macro PG104]
description: Firmware-fired sensor capture: snapshots fan speeds + accel/velocity into PRZ_RUNTIME_STATE
gcode:
    _KAOS_LOG LEVEL=3 CATEGORY=FIRMWARE MSG="PG104"
    {% set fan = printer["fan_generic cooling_fan"].speed %}
    {% set assist_fan = printer["output_pin fan_assist"].value %}
    SET_GCODE_VARIABLE MACRO=PRZ_RUNTIME_STATE VARIABLE=cooling_fan_speed VALUE={fan*255}
    SET_GCODE_VARIABLE MACRO=PRZ_RUNTIME_STATE VARIABLE=assist_fan_value VALUE={assist_fan*255}
    SET_GCODE_VARIABLE MACRO=PRZ_RUNTIME_STATE VARIABLE=target_accel VALUE={printer.toolhead.max_accel}
    SET_GCODE_VARIABLE MACRO=PRZ_RUNTIME_STATE VARIABLE=target_accel_to_decel VALUE={printer.toolhead.max_accel_to_decel}

[gcode_macro PG101]
description: Pre-cut path called by firmware during T[]; does NOT lift Z (TOOLCHANGE wrapper owns the Z sandwich)
gcode:
    _REQUIRE_TRUSTED_XY
    _KAOS_LOG LEVEL=2 CATEGORY=TOOLCHANGE MSG="PG101: starting pre-cut sequence"
    {% set GEO = printer["gcode_macro PRZ_GEOMETRY"] %}
    {% set ST = printer["gcode_macro PRZ_RUNTIME_STATE"] %}
    {% set extruder_temp = printer.extruder.temperature %}

    # 1. Travel to chute (for heating). Caller is responsible for any Z lift.
    PRZ_CUT_WAITINGAREA

    # 2. Heat at chute
    M106 S0
    M106 P2 S0
    {% if extruder_temp < 200 %}
        M109 S200
    {% endif %}
    {% set target = ST.target_extruder_temp + GEO.temp_overshoot %}
    {% if target > GEO.temp_safety_max %}
        M104 S{GEO.temp_safety_max}
    {% else %}
        M104 S{target}
    {% endif %}

    # 3. Depressurize. M83 is explicit; G92 E0 zeroes the relative-E counter.
    M83
    G92 E0
    G1 E-{GEO.depressurize_length} F600
    G92 E0

    _KAOS_LOG LEVEL=3 CATEGORY=TOOLCHANGE MSG="PG101: complete"

[gcode_macro PG105]
description: Firmware checkpoint stub (no-op; firmware-side logs only)
gcode:
    _KAOS_LOG LEVEL=3 CATEGORY=FIRMWARE MSG="PG105"

[gcode_macro PG106]
description: Firmware-fired pre-cut depressurize: travel to chute, M83, extrude 9mm
gcode:
    _REQUIRE_TRUSTED_XY
    _KAOS_LOG LEVEL=3 CATEGORY=TOOLCHANGE MSG="PG106"
    M106 S0
    M106 P2 S0
    G90
    G1 X{(printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x)} Y{(printer["gcode_macro GLOBAL_PARAM"].g_bottom_y)} F4000
    M83
    G92 E0
    G1 E9 F150

[gcode_macro PG109]
description: Firmware-fired heat-up to print temp (capped at PRZ_GEOMETRY.temp_safety_max)
gcode:
    _KAOS_LOG LEVEL=3 CATEGORY=FIRMWARE MSG="PG109"
    {% set extruder_temp = printer.extruder.temperature %}
    {% if extruder_temp < 200 %}
        M109 S200
    {% endif %}
    {% if (printer["gcode_macro PRZ_RUNTIME_STATE"].target_extruder_temp) > 250 %}
        M109 S250
    {% else %}
        M109 S{(printer["gcode_macro PRZ_RUNTIME_STATE"].target_extruder_temp)}
    {% endif %}

[gcode_macro PG107]
description: Firmware checkpoint stub (no-op; firmware-side logs only)
gcode:
    _KAOS_LOG LEVEL=3 CATEGORY=FIRMWARE MSG="PG107"

[gcode_macro PG108]
description: Firmware-fired single-color M3 mode spit: heat + PRZ_SPITTING + wipe + park
gcode:
    _REQUIRE_TRUSTED_XY
    _KAOS_LOG LEVEL=3 CATEGORY=PURGE MSG="PG108"
    M109 S{(printer["gcode_macro PRZ_RUNTIME_STATE"].target_extruder_temp)}
    PRZ_WAITINGAREA
    PRZ_SPITTING
    PRZ_WIPEMOUTH
    M106 S{(printer["gcode_macro PRZ_RUNTIME_STATE"].cooling_fan_speed)}
    G90
    G1 X{(printer["gcode_macro GLOBAL_PARAM"].g_wait_pause_x)} Y{(printer["gcode_macro GLOBAL_PARAM"].g_bottom_print_y)} F4000

[gcode_macro PG110]
description: Firmware-fired filament-catch: G92 E0 + 5mm slow extrude as new filament arrives
gcode:
    _KAOS_LOG LEVEL=3 CATEGORY=FIRMWARE MSG="PG110"
    G92 E0
    G1 E5 F150

## Internal helper for PG102 / PG111 / PG112-PG119.
## Before round 2, these eight macros differed only in how many times they
## invoked PRZ_SPITTING_NORMAL (now removed as a no-op). The actual color
## purge is handled by ORCA_PURGE on the slicer side, so the bodies became
## identical except for the optional prime.
## PRIME=1 calls PRZ_SPITTING_START (gears-to-nozzle prime); PRIME=0 skips it.
[gcode_macro _SPITTING_FRAME]
description: Internal helper - velocity-capped spit + temp restore + park
gcode:
    _REQUIRE_TRUSTED_XY
    {% set GEO = printer["gcode_macro PRZ_GEOMETRY"] %}
    {% set ST = printer["gcode_macro PRZ_RUNTIME_STATE"] %}
    {% set do_prime = params.PRIME|default(1)|int %}
    SET_VELOCITY_LIMIT ACCEL=10000 ACCEL_TO_DECEL=5000
    {% if do_prime %}
        PRZ_SPITTING_START
    {% endif %}
    PRZ_SPITTING_END
    M106 S{ST.cooling_fan_speed}
    M106 P2 S{ST.assist_fan_value}
    SET_VELOCITY_LIMIT ACCEL={ST.target_accel} ACCEL_TO_DECEL={ST.target_accel_to_decel}
    G4 P2000
    G90
    G1 X{printer["gcode_macro GLOBAL_PARAM"].g_wait_pause_x} Y{printer["gcode_macro GLOBAL_PARAM"].g_bottom_y} F6000
    G1 X{printer["gcode_macro GLOBAL_PARAM"].g_wait_pause_x} Y{printer["gcode_macro GLOBAL_PARAM"].g_bottom_print_y} F6000


[gcode_macro PG102]
description: Firmware-fired toolchange spit (PG112-equivalent today; calls _SPITTING_FRAME PRIME=1)
gcode:
    _KAOS_LOG LEVEL=3 CATEGORY=PURGE MSG="PG102"
    _SPITTING_FRAME PRIME=1

[gcode_macro PG111]
description: Firmware-fired end-only (no prime); calls _SPITTING_FRAME PRIME=0
gcode:
