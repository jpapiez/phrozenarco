## ============================================================================
## PROBE GATE — state container shared by TP_OUT/TP_PUT and G30/G31/PG28.
## ----------------------------------------------------------------------------
## TP_OUT clears these flags before a print starts so mid-print PG28/G30/G31
## calls become no-ops (avoids accidental re-homing or re-meshing). TP_PUT
## restores them post-print. The flags live here, not on G30/G31/PG28, so the
## state-vs-behavior split is explicit.
## ============================================================================
[gcode_macro _PROBE_GATE]
description: State container - probing-during-print enable flags
variable_g30_enabled: 1
variable_g31_enabled: 1
variable_pg28_enabled: 1
gcode:

## 自动调平宏
[gcode_macro TP_OUT]
description: Disable probing during print: clears _PROBE_GATE flags
gcode:
    SET_GCODE_VARIABLE MACRO=_PROBE_GATE VARIABLE=g30_enabled VALUE=0
    SET_GCODE_VARIABLE MACRO=_PROBE_GATE VARIABLE=g31_enabled VALUE=0
    SET_GCODE_VARIABLE MACRO=_PROBE_GATE VARIABLE=pg28_enabled VALUE=0

[gcode_macro TP_PUT]
description: Re-enable probing post-print: sets _PROBE_GATE flags
gcode:
    SET_GCODE_VARIABLE MACRO=_PROBE_GATE VARIABLE=g30_enabled VALUE=1
    SET_GCODE_VARIABLE MACRO=_PROBE_GATE VARIABLE=g31_enabled VALUE=1
    SET_GCODE_VARIABLE MACRO=_PROBE_GATE VARIABLE=pg28_enabled VALUE=1

[gcode_macro PG28]
variable_p: 1
gcode:
    {% if printer["gcode_macro PG28"].p|int == 1 %}
        # Full-home wrapper used by print/start flows.
        # Axis-specific homes should be sent as G28 X / G28 Y / G28 Z so
        # [homing_override] can see the requested axes directly.
        G28
        G90
    {% endif %}

[gcode_macro G31]
description: Bed-mesh profile load (gated by _PROBE_GATE.g31_enabled)
gcode:
    {% if printer["gcode_macro _PROBE_GATE"].g31_enabled|int == 1 %}
    BED_MESH_CLEAR
    BED_MESH_PROFILE LOAD=phrozen
    {% endif %}

[gcode_macro G30]
description: Probe-and-mesh: clear trust, home, calibrate (gated by _PROBE_GATE.g30_enabled)
gcode:
    {% if printer["gcode_macro _PROBE_GATE"].g30_enabled|int == 1 %}
    _CLEAR_TRUSTED_HOME
    _CLEAR_RECOVERY_AUTH
    G90
    G28
    G90
    _SET_TRUSTED_XYZ
    M106 S0
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE 
    # Safety fix: do not load another saved mesh immediately after calibrating,
    # because that discards/replaces the freshly probed mesh.
    {% endif %}

## 打印自动调用-自动调平
[gcode_macro START_PRINT]
description: Full pre-print routine (heat staging, PG28, Z tilt once, adaptive mesh, final heat)
gcode:
    {% set bed_temp = params.BED_TEMP|default(60)|float %}
    {% set extruder_temp = params.EXTRUDER_TEMP|default(205)|float %}
    {% set total_layer_count = params.TOTAL_LAYER_COUNT|default(params.TOTAL_LAYERS|default(0))|int %}
    {% set mesh_min_x = params.MESH_MIN_X|default(10)|float %}
    {% set mesh_min_y = params.MESH_MIN_Y|default(10)|float %}
    {% set mesh_max_x = params.MESH_MAX_X|default(290)|float %}
    {% set mesh_max_y = params.MESH_MAX_Y|default(290)|float %}
    {% set probe_temp = 140.0 %}

    M118 Starting print...
    M107
    G90

    M140 S{bed_temp}
    M104 S{probe_temp}
    M190 S{bed_temp}
    M109 S{probe_temp}

    PG28
    Z_TILT_ONCE
    PRZ_WIPEMOUTH
    M106 S255
    BED_MESH_CLEAR

    BED_MESH_CALIBRATE_CUSTOM MESH_MIN_X={mesh_min_x} MESH_MIN_Y={mesh_min_y} MESH_MAX_X={mesh_max_x} MESH_MAX_Y={mesh_max_y}

    TP_OUT
    PRZ_WAITINGAREA
    M106 S0
    G21
    M83
    M109 S{extruder_temp}

    {% if 'phrozen_dev' in printer and printer.configfile.settings.phrozen_dev.ams_attached|default(false) %}
        P0 M1
        P28
        P2 A1
    {% else %}
        _KAOS_LOG LEVEL=2 CATEGORY=PRINT MSG="START_PRINT: AMS not attached, skipping P0/P28/P2 AMS init"
    {% endif %}

    {% if total_layer_count > 0 %}
        SET_PRINT_STATS_INFO TOTAL_LAYER={total_layer_count}
    {% endif %}


## PID自动调整
[gcode_macro M303]
description: PID auto-tune for extruder at 210C, then SAVE_CONFIG
gcode:
    M106 S255
    PID_CALIBRATE HEATER=extruder TARGET=210
    G4 P100
    SAVE_CONFIG
    
[gcode_macro M304]
description: PID auto-tune for heater_bed at 60C, then SAVE_CONFIG
gcode:
    PID_CALIBRATE HEATER=heater_bed TARGET=60
    G4 P100
    SAVE_CONFIG

[gcode_macro G29]
description: Bed mesh calibration: clear trust, home, calibrate, save
gcode:
        _CLEAR_TRUSTED_HOME
        _CLEAR_RECOVERY_AUTH
        G90
        M140 S60 
        M104 S140 
        M190 S60 
        M109 S140 
        PRZ_PRINTING_START
        G28
        G90
        _SET_TRUSTED_XYZ
        M106 S0
        BED_MESH_CLEAR     
        BED_MESH_CALIBRATE PROFILE=phrozen  
        SAVE_CONFIG


[output_pin probe_pin]
pin:PA0
value:0

[gcode_macro probe_up]
description: Activate Z probe (SET_PIN PIN=probe_pin VALUE=1)
gcode:
    G4 P500
    SET_PIN PIN=probe_pin VALUE=1
    
[gcode_macro probe_off]
description: Deactivate Z probe (SET_PIN PIN=probe_pin VALUE=0)
gcode:
    SET_PIN PIN=probe_pin VALUE=0


[gcode_macro M190]
description: M190 wrapper using TEMPERATURE_WAIT for loose (s-2..s+10C) bed tolerance; renames base to M99190
rename_existing: M99190
gcode:
    #Parameters
    {% set s = params.S|float %}

    M140 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}   ; Set bed temp
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={s-2} MAXIMUM={s+10}  ; Wait for bed temp (within 1 degree)
    {% endif %}

[gcode_macro M109]
description: M109 wrapper using TEMPERATURE_WAIT for tight (+/-1C) hotend tolerance; renames base to M99109
rename_existing: M99109
gcode:
    #Parameters
    {% set s = params.S|float %}
    
    M104 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}  ; Set hotend temp
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={s} MAXIMUM={s+1}   ; Wait for hotend temp (within 1 degree)
    {% endif %}

[gcode_macro M106]
description: Fan control: P0/P1=cooling_fan, P2=fan_assist pin, P3=Chamber_fan; S=0..255
gcode:
    # {% set fan = printer["fan_generic cooling_fan"].speed %}
    # {action_respond_info("fan*255=%s\n" % (fan*255))}
    {% set p = params.P|default(0)|int %}

    {% if p == 2 %}
        {% if params.S is defined %}
            SET_PIN PIN=fan_assist VALUE={(params.S|float)}
        {% else %}
            SET_PIN PIN=fan_assist VALUE=1
        {% endif %}
    {% endif %} 

    {% if p == 0 %}
        {% if params.S is defined %}
            SET_FAN_SPEED FAN=cooling_fan SPEED={(params.S|float / 255.0)}
        {% else %}
            SET_FAN_SPEED FAN=cooling_fan SPEED=1
        {% endif %}
    {% endif %} 

    {% if p == 1 %}
        {% if params.S is defined %}
            SET_FAN_SPEED FAN=cooling_fan SPEED={(params.S|float / 255.0)}
        {% else %}
            SET_FAN_SPEED FAN=cooling_fan SPEED=1
        {% endif %}
    {% endif %} 

    {% if p == 3 %}
        {% if params.S is defined %}
            SET_FAN_SPEED FAN=Chamber_fan SPEED={(params.S|float / 255.0)}
        {% else %}
            SET_FAN_SPEED FAN=Chamber_fan SPEED=1
        {% endif %}
    {% endif %} 

[gcode_macro PRZ_MANUAL_WAITING]
description: Manual filament-feed waiting position (user-triggered)
gcode:
    _REQUIRE_TRUSTED_XY
    _KAOS_LOG LEVEL=3 CATEGORY=SERVICE MSG="PRZ_MANUAL_WAITING"
    G90
    G1 X{(printer["gcode_macro GLOBAL_PARAM"].g_wait_pause_x)} Y{(printer["gcode_macro GLOBAL_PARAM"].g_bottom_print_y)} F4000
    G90
    G1 X{(printer["gcode_macro GLOBAL_PARAM"].g_wait_pause_x)} Y{(printer["gcode_macro GLOBAL_PARAM"].g_bottom_print_y)} F4000
    G90
    G1 X{(printer["gcode_macro GLOBAL_PARAM"].g_wait_pause_x)} Y{(printer["gcode_macro GLOBAL_PARAM"].g_bottom_y)} F4000
    G90
    G1 X{(printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x) + 15} Y{(printer["gcode_macro GLOBAL_PARAM"].g_bottom_y)} F4000
    G90
    G1 X{(printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x)} Y{(printer["gcode_macro GLOBAL_PARAM"].g_bottom_y)} F4000  
    G90