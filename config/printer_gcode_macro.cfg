    _SPITTING_FRAME PRIME=0

[gcode_macro PG112]
description: Firmware-fired spit-with-prime; calls _SPITTING_FRAME PRIME=1
gcode:
    _KAOS_LOG LEVEL=3 CATEGORY=PURGE MSG="PG112"
    _SPITTING_FRAME PRIME=1

[gcode_macro PG113]
description: Firmware-fired spit-with-prime; calls _SPITTING_FRAME PRIME=1
gcode:
    _KAOS_LOG LEVEL=3 CATEGORY=PURGE MSG="PG113"
    _SPITTING_FRAME PRIME=1

[gcode_macro PG114]
description: Firmware-fired spit-with-prime; calls _SPITTING_FRAME PRIME=1
gcode:
    _KAOS_LOG LEVEL=3 CATEGORY=PURGE MSG="PG114"
    _SPITTING_FRAME PRIME=1

[gcode_macro PG115]
description: Firmware-fired spit-with-prime; calls _SPITTING_FRAME PRIME=1
gcode:
    _KAOS_LOG LEVEL=3 CATEGORY=PURGE MSG="PG115"
    _SPITTING_FRAME PRIME=1

[gcode_macro PG116]
description: Firmware-fired spit-with-prime; calls _SPITTING_FRAME PRIME=1
gcode:
    _KAOS_LOG LEVEL=3 CATEGORY=PURGE MSG="PG116"
    _SPITTING_FRAME PRIME=1

[gcode_macro PG117]
description: Firmware-fired spit-with-prime; calls _SPITTING_FRAME PRIME=1
gcode:
