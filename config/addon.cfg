;**************************************
[include magic_ams_by_chris.cfg] ; Complete rewrite of filament purge to integrate with Orca
;**************************************

;**************************************
;This is the master config Section. Here you can choose features to enable and set their properties
;**************************************

;**************************************
#This is the feture Section where some features can be enabled or disabled
# === Simple on/off switches for features ===
# 1 = enabled, 0 = disabled
;**************************************
[gcode_macro _USER_CONFIG]
variable_enable_startup_light: 1
variable_enable_startup_beep: 0
variable_enable_hold_current: 1    # enable reduced hold current for stepper motors
variable_enable_board_fan_ctrl: 1  # Enable Fan control  ===

;Future:
;variable_enable_filamentchange_beep: 0
;variable_enable_lights_off_print_complete: 0

;**************************************
;This is the config Section. Here you can set the varaibles for some of the features
;It has been prepopulate with tested values. 
;**************************************


;**************************************
# === Variables to control functionality of AMS color changes ===
;**************************************
variable_extra_toolchange_cuts: 0     # extra cuts before firmware cut
variable_initial_purge_length: 150    # mm to purge on initial load (when slicer sends FLUSH=0)
variable_max_poop_size: 100           # max mm per poop (larger purges split with kick between)
variable_wipe_lanes: 1                # wipe brush lanes (1-3) - lower stays closer to Y=322

;**************************************
# === Variables to control fan ===
;**************************************
variable_board_fan_target: 50   ; normal MCU target temp (°C)
variable_cpu_fan_on: 55          ; CPU temperature to force fan ON
variable_cpu_fan_off: 45         ; CPU temperature to release override
variable_cpu_override_target: 10  ; lowers fan target to force ON during CPU override

;**************************************
# === Variables Dynamic Speed By Height (tall / narrow prints) ===
;**************************************
# Height thresholds (mm)
variable_dynamic_z1: 100 ;height break one
variable_dynamic_z2: 160 ;height break two
# Acceleration profiles (mm/s²)
variable_dynamic_accel_mid: 8000 ; velocity after height break one
variable_dynamic_accel_high: 4000 ;velocity after height break two
# Speed scaling profiles (M220 %)
variable_dynamic_speed_mid: 70 ;speed after height break two
variable_dynamic_speed_high: 50 ;speed after height break two

gcode:
  # placeholder – this macro only stores variables
  {% set _ = 0 %}

;**************************************
;Do not modify anything below here unless you know what you are doing!
;**************************************


;******************************
; MCU / CPU cooling control (Klipper temperature_fan + macros)
;
; - Normal: fan ON/OFF based on MCU temperature (watermark)
; - CPU override: forces fan ON when CPU >= CPU_ON,
;                 releases when CPU <= CPU_OFF
; - Binary only (0% or 100%) recommended for 2-wire DC fans (low PWM can buzz or stall)
;
; The following variables in AddOn.cfg control behavior:
;   variable_board_fan_target: 40   ; normal MCU target temp (°C)
;   variable_cpu_fan_on: 55          ; CPU temperature to force fan ON
;   variable_cpu_fan_off: 45         ; CPU temperature to release override
;   variable_cpu_override_target: 10  ; low target forces fan ON
;
; IMPORTANT:
; Disable any other config using pin PA2
; (output_pin / fan / fan_generic / temperature_fan)
;
; For this to work, the following must be commented out in printer.cfg:
;   #[output_pin board_fan]
;   #pin: PA2
;   #value: 1
;******************************


[temperature_sensor cpu_temp]
sensor_type: temperature_host
min_temp: 0
max_temp: 100


[temperature_fan board_fan]
pin: PA2
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

target_temp: 50                  ; fallback matches _USER_CONFIG default

control: watermark
max_speed: 1.0
min_speed: 0.0
kick_start_time: 0.5
gcode_id: MCU

[delayed_gcode apply_board_fan_target]
initial_duration: 4
gcode:
  {% set cfg = printer["gcode_macro _USER_CONFIG"] %}
  {% if cfg.enable_board_fan_ctrl|int == 1 %}
    {% set t = cfg.board_fan_target|float %}

    {% if t < 0 %}{% set t = 0 %}{% endif %}
    {% if t > 100 %}{% set t = 100 %}{% endif %}

    SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=board_fan TARGET={t}
    {action_respond_info("Board fan MCU threshold=" ~ t)}
  {% else %}
    {action_respond_info("Board fan control disabled in _USER_CONFIG")}
  {% endif %}


[gcode_macro BOARD_FAN_CPU_OVERRIDE]
variable_active: 0
gcode:
  {% set cfg = printer["gcode_macro _USER_CONFIG"] %}

  # Master enable check (Klipper-safe)
  {% if cfg.enable_board_fan_ctrl|int != 1 %}
    {action_respond_info("Board fan control disabled — override ignored")}
  {% else %}

    {% set cpu = printer["temperature_sensor cpu_temp"].temperature|float %}
    {% set active = printer["gcode_macro BOARD_FAN_CPU_OVERRIDE"].active|int %}

    {% set CPU_ON  = cfg.cpu_fan_on|float %}
    {% set CPU_OFF = cfg.cpu_fan_off|float %}

    # Clamp to sane CPU range
    {% if CPU_ON < 30 %}{% set CPU_ON = 30 %}{% endif %}
    {% if CPU_ON > 90 %}{% set CPU_ON = 90 %}{% endif %}

    {% if CPU_OFF < 25 %}{% set CPU_OFF = 25 %}{% endif %}
    {% if CPU_OFF > 85 %}{% set CPU_OFF = 85 %}{% endif %}

    {% set normal_t = cfg.board_fan_target|float %}
    {% set over_t   = cfg.cpu_override_target|float %}

    # Optional clamp for override target
    {% if over_t < 0 %}{% set over_t = 0 %}{% endif %}
    {% if over_t > 20 %}{% set over_t = 20 %}{% endif %}

    # Ensure valid hysteresis
    {% if CPU_OFF > CPU_ON %}
      {% set CPU_OFF = CPU_ON - 1 %}
    {% endif %}

    {% if active == 0 and cpu >= CPU_ON %}
      SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=board_fan TARGET={over_t}
      SET_GCODE_VARIABLE MACRO=BOARD_FAN_CPU_OVERRIDE VARIABLE=active VALUE=1
      {action_respond_info("CPU hot (" ~ cpu ~ "C) → fan forced ON")}

    {% elif active == 1 and cpu <= CPU_OFF %}
      SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=board_fan TARGET={normal_t}
      SET_GCODE_VARIABLE MACRO=BOARD_FAN_CPU_OVERRIDE VARIABLE=active VALUE=0
      {action_respond_info("CPU cooled (" ~ cpu ~ "C) → MCU control restored")}

    {% endif %}

  {% endif %}



[delayed_gcode BOARD_FAN_CPU_LOOP]
initial_duration: 6
gcode:
  {% if printer["gcode_macro _USER_CONFIG"].enable_board_fan_ctrl|int == 1 %}
    BOARD_FAN_CPU_OVERRIDE
    UPDATE_DELAYED_GCODE ID=BOARD_FAN_CPU_LOOP DURATION=2
  {% else %}
    {action_respond_info("Board fan loop disabled in _USER_CONFIG")}
  {% endif %}




;******************************
; Light Section
;   #TURN_ON_LIGHT_AT_BOOT
;   #LIGHTS_OFF_DELAY
;   #Lights_On
;   #Lights_Off
;   #Lights_Toggle
;******************************


[delayed_gcode TURN_ON_LIGHT_AT_BOOT]
initial_duration: 5
gcode:
  {% if printer["gcode_macro _USER_CONFIG"].enable_startup_light|int == 1 %}
    Lights_On
  {% endif %}


[delayed_gcode LIGHTS_OFF_DELAY]
gcode:
    Lights_Off
 #UPDATE_DELAYED_GCODE ID=LIGHTS_OFF_DELAY DURATION=1200  ; 20 minutes

[gcode_macro Lights_On]
#toggle control LED light in Fluidd or Mainsail
gcode:
        SET_GCODE_VARIABLE MACRO=Lights_Toggle VARIABLE=toggle_state VALUE=1
        P0 LED_SetState=1

[gcode_macro Lights_Off]
gcode:
        SET_GCODE_VARIABLE MACRO=Lights_Toggle VARIABLE=toggle_state VALUE=0
        P0 LED_SetState=0

[gcode_macro Lights_Toggle]
variable_toggle_state: 0
gcode:
    {% if printer["gcode_macro Lights_Toggle"].toggle_state == 0 %}
        SET_GCODE_VARIABLE MACRO=Lights_Toggle VARIABLE=toggle_state VALUE=1
# Add G-code commands to execute when state is 1
        P0 LED_SetState=1
    {% else %}
        SET_GCODE_VARIABLE MACRO=Lights_Toggle VARIABLE=toggle_state VALUE=0
# Add G-code commands to execute when state is 0
        P0 LED_SetState=0
    {% endif %}


;******************************
; Fix for G30 - remove BED_MESH_PROFILE LOAD=default
; in case people still use it.
;******************************
[gcode_macro G30]
variable_k:1
gcode:
    {% if k|int==1 %}
    G90
    G28
    M106 S0
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE
    {% endif %}


;******************************
; Fix for PG28 - Add state with VARIABLE=has_run to see if printer is homed
; Z_TILT_ADJUST and BED_MESH_CALIBRATE_CUSTOM use this to ensure
; a homing is always perferomed, but not duplicated needlessly.
;******************************
[gcode_macro PG28]
variable_p: 1
variable_has_run: 0     # NEW: remembers if PG28 has ever actually executed
gcode:
    {% if p|int == 1 %}
        PRZ_PRINTING_START
        G28
        G90
        SET_GCODE_VARIABLE MACRO=PG28 VARIABLE=has_run VALUE=1
        RESPOND PREFIX=info MSG="PG28: has_run=1"
    {% endif %}

[gcode_macro PG28_CLEAR_HAS_RUN]
gcode:
    SET_GCODE_VARIABLE MACRO=PG28 VARIABLE=has_run VALUE=0
    RESPOND PREFIX=info MSG="PG28: has_run reset to 0"


;******************************
; Reduce hold current to steppers to potentially reduce wear.
;******************************

[delayed_gcode apply_hold_current]
initial_duration: 3
gcode:
  {% if printer["gcode_macro _USER_CONFIG"].enable_hold_current|int == 1 %}
    SET_TMC_CURRENT STEPPER=stepper_x HOLDCURRENT=1.0
    SET_TMC_CURRENT STEPPER=stepper_y HOLDCURRENT=1.0
    SET_TMC_CURRENT STEPPER=stepper_z HOLDCURRENT=0.9
    SET_TMC_CURRENT STEPPER=stepper_z1 HOLDCURRENT=0.9
    SET_TMC_CURRENT STEPPER=extruder HOLDCURRENT=0.5
    {action_respond_info("Hold currents applied")}
  {% else %}
    {action_respond_info("Hold currents skipped (disabled in config)")}
  {% endif %}

