# ==============================================================
# Dynamic Speed & Acceleration by Z Height (Klipper)
#
# PURPOSE:
# This macro set is designed specifically for **tall, narrow, or
# top-heavy prints** (towers, spires, vases, thin enclosures, etc.)
# where lateral stability decreases as Z height increases.
#
# By progressively reducing acceleration and global speed as the
# print gets taller, this system helps mitigate:
#   - Ringing and ghosting at higher Z
#   - Frame excitation and table sway
#   - Part deflection or wobble on slender geometries
#   - Risk of layer shifts late in long prints
#
# HOW IT WORKS:
# - A delayed_gcode loop periodically samples the current toolhead Z
# - Z is compared against two configurable height thresholds (z1, z2)
# - Based on the active Z range, the macro applies:
#     • A motion acceleration limit (SET_VELOCITY_LIMIT)
#     • A global speed scale (M220 %)
# - The loop automatically re-runs while enabled
#
# HEIGHT PROFILES:
# - Z < z1      → Full performance (fast / high accel)
# - z1 ≤ Z < z2 → Moderate slowdown
# - Z ≥ z2      → Conservative motion for tall, unstable sections
#
# ----------------------------------------------------------------
# MACRO OVERVIEW
#
# [gcode_macro DYNAMIC_SPEED_ENABLE]
# - Enables dynamic Z-based speed control
# - Sets the internal enabled flag
# - Starts the delayed_gcode evaluation loop
#
# [gcode_macro DYNAMIC_SPEED_DISABLE]
# - Disables dynamic control and stops the loop
# - Restores captured base acceleration (the value active at ENABLE time)
# - Resets global speed scaling to a known baseline (M220 S100)
#
# [gcode_macro DYNAMIC_SPEED]
# - Configuration and state holder only
# - Stores enable flag, Z thresholds, accel values, and speed profiles
# - Does NOT actively modify motion by itself
#
# [delayed_gcode DYNAMIC_SPEED_LOOP]
# - Periodically evaluates current Z height
# - Selects the appropriate accel and speed profile
# - Applies changes using SET_VELOCITY_LIMIT and M220
# - Re-schedules itself while the feature is enabled
#
# USAGE NOTES:
# - Intended for tall, narrow, or mechanically sensitive prints
# - Affects global speed scaling (M220), not per-move feedrates
# - Should be disabled for motion tuning, input shaping tests,
#   or maximum-speed benchmarking
#
# ============================================================== 

[gcode_macro DYNAMIC_SPEED]
variable_enabled: 0
variable_last_band: -1
variable_base_accel: 0
gcode:
  RESPOND PREFIX="dynamic" MSG="Dynamic speed macro ready."



[gcode_macro DYNAMIC_SPEED_ENABLE]
description: Enable dynamic speed/accel based on Z height
gcode:
  # Capture slicer/start-gcode accel exactly as-is
  SET_GCODE_VARIABLE MACRO=DYNAMIC_SPEED VARIABLE=base_accel VALUE={printer.toolhead.max_accel|int}

  SET_GCODE_VARIABLE MACRO=DYNAMIC_SPEED VARIABLE=last_band VALUE=-1
  SET_GCODE_VARIABLE MACRO=DYNAMIC_SPEED VARIABLE=enabled VALUE=1

  RESPOND PREFIX="dynamic" MSG="Dynamic speed ENABLED (original accel captured)."
  UPDATE_DELAYED_GCODE ID=DYNAMIC_SPEED_LOOP DURATION=2.0


[gcode_macro DYNAMIC_SPEED_DISABLE]
description: Disable dynamic speed/accel and restore original values
gcode:
  {% set ds = printer["gcode_macro DYNAMIC_SPEED"] %}

  SET_GCODE_VARIABLE MACRO=DYNAMIC_SPEED VARIABLE=enabled VALUE=0
  UPDATE_DELAYED_GCODE ID=DYNAMIC_SPEED_LOOP DURATION=0

  # Restore captured acceleration exactly
  {% if ds.base_accel|int > 0 %}
    SET_VELOCITY_LIMIT ACCEL={ds.base_accel|int}
  {% endif %}

  # Optional but recommended: normalize speed factor
  # Uncomment if you want deterministic behavior
  M220 S100

  RESPOND PREFIX="dynamic" MSG="Dynamic speed DISABLED (original accel restored)."


[delayed_gcode DYNAMIC_SPEED_LOOP]
initial_duration: 0
gcode:
  {% set u = printer["gcode_macro _USER_CONFIG"] %}
  {% set ds = printer["gcode_macro DYNAMIC_SPEED"] %}

  {% if ds.enabled|int == 1 %}
    {% set z = printer.toolhead.position.z|float %}

    # Determine current band, BUT do nothing below z1
    {% if z < u.dynamic_z1|float %}
      {% set band = 0 %}
    {% elif z < u.dynamic_z2|float %}
      {% set band = 1 %}
    {% else %}
      {% set band = 2 %}
    {% endif %}

    # Only apply when crossing into a new band (and skip band 0)
    {% if band != ds.last_band|int %}
      SET_GCODE_VARIABLE MACRO=DYNAMIC_SPEED VARIABLE=last_band VALUE={band}

      {% if band == 1 %}
        SET_VELOCITY_LIMIT ACCEL={u.dynamic_accel_mid|int}
        M220 S{u.dynamic_speed_mid|int}
        RESPOND PREFIX="dynamic" MSG="Z={z|round(1)}: MID profile applied."
      {% elif band == 2 %}
        SET_VELOCITY_LIMIT ACCEL={u.dynamic_accel_high|int}
        M220 S{u.dynamic_speed_high|int}
        RESPOND PREFIX="dynamic" MSG="Z={z|round(1)}: HIGH profile applied."
      {% endif %}
    {% endif %}

    UPDATE_DELAYED_GCODE ID=DYNAMIC_SPEED_LOOP DURATION=3.0
  {% endif %}


