    SET_PIN PIN=beeper VALUE=0
    G4 P100
    SET_PIN PIN=beeper VALUE=0.1
    G4 P50
    SET_PIN PIN=beeper VALUE=0
  {% endif %}


[gcode_macro Beep_Notify]
description: Play a tone on the beeper
gcode:
    {% set pin = params.PIN|default("beeper") %}
    SET_PIN PIN={pin} VALUE=0.4
    G4 P120
    SET_PIN PIN={pin} VALUE=0
    G4 P60
    SET_PIN PIN={pin} VALUE=0.25
    G4 P250
    SET_PIN PIN={pin} VALUE=0
    G4 P100
    SET_PIN PIN={pin} VALUE=0.5
    G4 P80
    SET_PIN PIN={pin} VALUE=0


 ;******************************
 ; Variable bed mesh depending on size of print.
 ;******************************

[gcode_macro BED_MESH_CALIBRATE_CUSTOM]
gcode:
    ; Safety: ensure home before tilt when called directly
    {% if printer["gcode_macro PG28"].has_run | int == 0 %}
        RESPOND PREFIX=info MSG="BED_MESH_CALIBRATE_CUSTOM: PG28 has not run, calling PG28"
        PG28
    {% else %}
        RESPOND PREFIX=info MSG="BED_MESH_CALIBRATE_CUSTOM: PG28 already ran, skipping"
    {% endif %}

    {% set x_size = params.MESH_MAX_X|float - params.MESH_MIN_X|float %}
    {% set y_size = params.MESH_MAX_Y|float - params.MESH_MIN_Y|float %}
    {% set max_size = x_size if x_size > y_size else y_size %}

    {% if max_size <= 40 %}
        {% set probe_count = "3,3" %}
    {% elif max_size <= 150 %}
        {% set probe_count = "4,4" %}
    {% else %}
        {% set probe_count = "5,5" %}
    {% endif %}

    BED_MESH_CLEAR
    BED_MESH_CALIBRATE PROFILE=phrozen mesh_min={params.MESH_MIN_X},{params.MESH_MIN_Y} mesh_max={params.MESH_MAX_X},{params.MESH_MAX_Y} probe_count={probe_count} algorithm=bicubic


; ==============================================================
; Z_TILT control macros (run-once per session / first print)
;
;USAGE:
;Add the following line to your machine start G-Code
; Z_TILT_ONCE   
;
; PURPOSE:
; - Provide a safe, idempotent Z_TILT workflow for CoreXY / dual-Z printers
; - Ensure Z_TILT_ADJUST always homes (G28) before running
; - Prevent redundant Z_TILT runs after the first print
;
; BEHAVIOR:
; - Z_TILT runs automatically on the first print after startup
; - Subsequent prints skip Z_TILT unless the run flag is cleared
; - Z_TILT_CLEAR resets the flag to allow Z_TILT to run again
; - FORCE=1 bypasses the flag and forces a re-run without restart
;
; MACROS:
; - Z_TILT_ADJUST : Safe wrapper that homes and runs base Z_TILT
; - Z_TILT_ONCE   : Executes Z_TILT_ADJUST only if it has not run yet
; - Z_TILT_CLEAR  : Manually clears the run-once flag
;
; NOTES:
; - The `ran` flag persists across prints until cleared or firmware restart
; - Intended for START_PRINT inclusion or manual calibration workflows
; ==============================================================



[gcode_macro Z_TILT_ONCE]
gcode:
    {% set force = params.FORCE|default(0)|int %}

    {% if force == 1 %}
        RESPOND PREFIX=info MSG="Z_TILT: FORCING RE-RUN"
        SET_GCODE_VARIABLE MACRO=Z_TILT_ADJUST VARIABLE=ran VALUE=False
    {% endif %}

    {% if not printer["gcode_macro Z_TILT_ADJUST"].ran %}
        RESPOND PREFIX=info MSG="Z_TILT: Running"
        Z_TILT_ADJUST
        SET_GCODE_VARIABLE MACRO=Z_TILT_ADJUST VARIABLE=ran VALUE=True
    {% else %}
        RESPOND PREFIX=info MSG="Z_TILT: already run, skipping"
    {% endif %}

[gcode_macro Z_TILT_ADJUST]
variable_ran: False
rename_existing: Z_TILT_ADJUST_BASE
gcode:
    ; Safety: ensure home before tilt when called directly
    {% if printer["gcode_macro PG28"].has_run | int == 0 %}
        RESPOND PREFIX=info MSG="Z_TILT: PG28 has not run, Z_TILT_ADJUST calling PG28"
        PG28
    {% else %}
        RESPOND PREFIX=info MSG="Z_TILT: PG28 already ran, Z_TILT_ADJUST skipping"
    {% endif %}
    Z_TILT_ADJUST_BASE


[gcode_macro Z_TILT_CLEAR]
gcode:
    SET_GCODE_VARIABLE MACRO=Z_TILT_ADJUST VARIABLE=ran VALUE=False
    RESPOND PREFIX=info MSG="Z_TILT: flag cleared"



    
