[respond]
[exclude_object]

[gcode_macro _USER_CONFIG]
# === Simple on/off switches for features ===
# 1 = enabled, 0 = disabled
variable_enable_startup_light: 1
variable_enable_startup_beep: 1
variable_beep_on_pause: 1
variable_enable_hold_current: 1       # enable reduced hold current for stepper motors
variable_extra_toolchange_cuts: 0     # extra cuts before firmware cut
variable_initial_purge_length: 150    # mm to purge on initial load (when slicer sends FLUSH=0)
variable_max_poop_size: 100           # max mm per poop (larger purges split with kick between)
variable_wipe_lanes: 1                # wipe brush lanes (1-3) - lower stays closer to Y=322

gcode:
  # placeholder – this macro only stores variables
  {% set _ = 0 %}

[delayed_gcode Lights_On_Startup]
# Automatically turn on light with machine
initial_duration: 5
gcode:
  {% set cfg = printer["gcode_macro _USER_CONFIG"] %}
  {% if cfg.enable_startup_light|int == 1 %}
    TOGGLE_LIGHT
  {% endif %}

[delayed_gcode apply_hold_current]
initial_duration: 3
gcode:
  {% if printer["gcode_macro _USER_CONFIG"].enable_hold_current|int == 1 %}
    SET_TMC_CURRENT STEPPER=stepper_x HOLDCURRENT=0.6
    SET_TMC_CURRENT STEPPER=stepper_y HOLDCURRENT=0.6
    SET_TMC_CURRENT STEPPER=stepper_z HOLDCURRENT=0.9
    SET_TMC_CURRENT STEPPER=stepper_z1 HOLDCURRENT=0.9
    SET_TMC_CURRENT STEPPER=extruder HOLDCURRENT=0.5
    {action_respond_info("Hold currents applied")}
  {% else %}
    {action_respond_info("Hold currents skipped (disabled in config)")}
  {% endif %}

[delayed_gcode apply_transit_override]
# Override g_bottom_print_y: stock=280, we use 302 (waiting area Y threshold)
initial_duration: 2
gcode:
    SET_GCODE_VARIABLE MACRO=GLOBAL_PARAM VARIABLE=g_bottom_print_y VALUE=302
    {action_respond_info("Applied g_bottom_print_y=302")}

[output_pin beeper]
pin: PB2
value: 0
shutdown_value: 0
pwm: True
cycle_time: 0.005  # Default beeper tone in kHz. 1 / 0.0005 = 1000Hz (2kHz)


[delayed_gcode startup_beep]
initial_duration: 1
gcode:
  {% set cfg = printer["gcode_macro _USER_CONFIG"] %}
  {% if cfg.enable_startup_beep|int == 1 %}
    SET_PIN PIN=beeper VALUE=0.2
    G4 P25
    SET_PIN PIN=beeper VALUE=0
    G4 P100
    SET_PIN PIN=beeper VALUE=0.1
    G4 P50
    SET_PIN PIN=beeper VALUE=0
  {% endif %}


[gcode_macro Beep_Notify]
description: Play a tone on the beeper
gcode:
    {% set pin = params.PIN|default("beeper") %}
    SET_PIN PIN={pin} VALUE=0.4
    G4 P120
    SET_PIN PIN={pin} VALUE=0
    G4 P60
    SET_PIN PIN={pin} VALUE=0.25
    G4 P250
    SET_PIN PIN={pin} VALUE=0
    G4 P100
    SET_PIN PIN={pin} VALUE=0.5
    G4 P80
    SET_PIN PIN={pin} VALUE=0


#Added M601 to support pause commands in Orca
[gcode_macro M601]
description: Pause print (with optional beep)
gcode:
  {% set cfg = printer["gcode_macro _USER_CONFIG"] %}
  {% if cfg.beep_on_pause|int == 1 %}
    Beep_Notify
  {% endif %}
  PAUSE

  
[temperature_fan board_fan]
pin: PA2
sensor_type: temperature_host
min_temp: 0
max_temp: 100
target_temp: 50.0
max_speed: 1.0
min_speed: 0.4
control: pid
pid_kp: 1.0
pid_ki: 0.5
pid_kd: 2.0
gcode_id: PI

#Display CPU temo
[temperature_sensor cpu_temp]
sensor_type: temperature_host
min_temp: 0
max_temp: 100

[screws_tilt_adjust]
screw1:
    30, 30
screw1_name:
  bottom_left
screw2:
    270, 30
screw2_name:
  bottom_right
screw3:
  270, 270
screw3_name:
  top_right
screw4:
  30, 270
screw4_name:
  top_left
speed: 50
horizontal_move_z: 20
screw_thread: CCW-M4

[z_tilt]
z_positions:
  365, 150
  -45, 150
points:
  270, 150
  30, 150
speed: 100
horizontal_move_z: 30
retries: 3
retry_tolerance: 0.01

# Wrap SCREWS_TILT_CALCULATE to home first
[gcode_macro SCREWS_TILT_CALCULATE]
rename_existing: _SCREWS_TILT_CALCULATE
gcode:
    G28
  _SCREWS_TILT_CALCULATE

# Wrap Z_TILT_ADJUST to home first
[gcode_macro Z_TILT_ADJUST]
rename_existing: _Z_TILT_ADJUST
gcode:
    G28
  _Z_TILT_ADJUST  

[gcode_macro BED_MESH_CALIBRATE_CUSTOM]
gcode:
    {% set x_size = params.MESH_MAX_X|float - params.MESH_MIN_X|float %}
    {% set y_size = params.MESH_MAX_Y|float - params.MESH_MIN_Y|float %}
    {% set max_size = x_size if x_size > y_size else y_size %}

    {% if max_size <= 40 %}
        {% set probe_count = "3,3" %}
    {% elif max_size <= 150 %}
        {% set probe_count = "4,4" %}
    {% else %}
        {% set probe_count = "5,5" %}
    {% endif %}

    BED_MESH_CLEAR
    BED_MESH_CALIBRATE PROFILE=phrozen mesh_min={params.MESH_MIN_X},{params.MESH_MIN_Y} mesh_max={params.MESH_MAX_X},{params.MESH_MAX_Y} probe_count={probe_count} algorithm=bicubic

[gcode_macro TOGGLE_LIGHT]
variable_toggle_state: 0
gcode:
  {% if printer["gcode_macro TOGGLE_LIGHT"].toggle_state == 0 %}
    SET_GCODE_VARIABLE MACRO=TOGGLE_LIGHT VARIABLE=toggle_state VALUE=1
    P0 LED_SetState=1
  {% else %}
    SET_GCODE_VARIABLE MACRO=TOGGLE_LIGHT VARIABLE=toggle_state VALUE=0
    P0 LED_SetState=0
  {% endif %}

  # === Filament Change (two pauses; no extra check pause) ===
[gcode_macro M600]
description: Filament change with retract -> pause, then load -> pause, then purge & resume
variable_filament_change: 0        # 0 = idle, 1 = in M600 flow
variable_stage: 0                  # 0 = waiting to load, 1 = loaded & waiting second RESUME
variable_unload_length: 45         # mm retract to unload
variable_unload_speed: 600         # mm/min
variable_load_length: 50           # mm load after first RESUME
variable_load_speed: 300           # mm/min
variable_antiooze: 2.0             # mm to retract
variable_antiooze_speed: 600       # mm/min
gcode:
    # Enter M600 flow and remember print state
    SET_GCODE_VARIABLE MACRO=M600 VARIABLE=filament_change VALUE=1
    SET_GCODE_VARIABLE MACRO=M600 VARIABLE=stage VALUE=0
    SAVE_GCODE_STATE NAME=M600_state

    # Record temps/fans and park at your cut-waiting area
    PG103
    PG104
    PRZ_WAITINGAREA

    # Unload (retract), then pause for swap
    RESPOND PREFIX="M600" MSG="Retracting… swap filament, then press RESUME to load."
    G91
    G1 E-{unload_length} F{unload_speed}
    G90
    PAUSE


# === RESUME: handle M600 stages, otherwise behave normally ===
[gcode_macro RESUME]
rename_existing: BASE_RESUMEPRINT
gcode:
    {% set changing = printer["gcode_macro M600"].filament_change|int %}
    {% set stage    = printer["gcode_macro M600"].stage|int %}

    {% if changing == 1 and stage == 0 %}
        # First RESUME after M600: heat, load and retract, then pause once more
        RESPOND PREFIX="M600" MSG="Heating and loading… press RESUME again to continue."
        PG109
        G91
        G1 E{printer["gcode_macro M600"].load_length} F{printer["gcode_macro M600"].load_speed}
        G1 -E{printer["gcode_macro M600"].antiooze}F{printer["gcode_macro M600"].antiooze_speed}
        G90
        SET_GCODE_VARIABLE MACRO=M600 VARIABLE=stage VALUE=1
        PAUSE
        # stay paused; do NOT fall through

    {% elif changing == 1 and stage == 1 %}
        # Second RESUME: wipe, clear flag, restore state, and continue — no more pauses
        RESPOND PREFIX="M600" MSG="Press resume…"
        PRZ_WAITINGAREA
        PRZ_WIPEMOUTH
        SET_GCODE_VARIABLE MACRO=M600 VARIABLE=filament_change VALUE=0
        SET_GCODE_VARIABLE MACRO=M600 VARIABLE=stage VALUE=0
        RESTORE_GCODE_STATE NAME=M600_state MOVE=0
        BASE_RESUMEPRINT

    {% else %}
    # Normal (non-M600) resumes use your existing behavior
    BASE_RESUMEPRINT
    {% endif %}


# ==============================================================================
# PHROZEN ARCO TOOLCHANGE MACROS
# ==============================================================================
# Note: These macros override stock definitions (Klipper uses last definition).
# To configure in _USER_CONFIG above:
#   variable_extra_toolchange_cuts: N - extra cuts before firmware

[gcode_macro PG101]
description: Smart Pre-Cut: Custom pathing with configurable extra cuts
gcode:
    {% set cfg = printer["gcode_macro _USER_CONFIG"] %}
    {% set cut_count = cfg.extra_toolchange_cuts|int %}

    {action_respond_info("PG101: Starting Pre-Cut Sequence (%d extra cuts)" % cut_count)}
    {% set extruder_temp = printer.extruder.temperature %}

    # --- 1. TRAVEL TO CHUTE (for heating) ---
    PRZ_CUT_WAITINGAREA

    # --- 2. HEATING AT CHUTE ---
    M106 S0
    M106 p2 S0
    {% if extruder_temp < 200 %}
        M109 S200
    {% endif %}
    {% if ((printer["gcode_macro GLOBAL_PARAM"].g_extruder_temperature)+20) > 250 %}
        M104 S250
    {% else %}
        M104 S{(printer["gcode_macro GLOBAL_PARAM"].g_extruder_temperature)+20}
    {% endif %}

    # --- 3. DEPRESSURIZE (at chute, before traveling) ---
    G92 E0
    G1 E-4 F600
    G92 E0

    # --- 4. EXTRA CUTS (if configured) ---
    {% if cut_count > 0 %}
        G1 X300 Y260 F12000          ; Direct from chute to cut area
        {% for i in range(cut_count) %}
            G1 X313 F10000           ; Fast approach to pre-cut position
            G1 X320 F500             ; SLOW PUSH through cutter
            G4 P500                  ; Hold
            G1 X300 F10000           ; Back off
        {% endfor %}
    {% endif %}

    # --- 5. END POSITION ---
    # After cuts: stay at cutter (X=300, Y=260) - firmware TX may cut next
    # No cuts: stay at chute (X=123, Y=322) - firmware will position as needed
    # Either way, firmware's next step (TX) handles safe pathing via PRZ_CUT_WAITINGAREA
    {action_respond_info("PG101: Complete (cuts=%d)" % cut_count)}

[gcode_macro ORCA_PURGE]
description: Color transition purge (No Z movement - handled by slicer)
gcode:
    {% set cfg = printer["gcode_macro _USER_CONFIG"] %}
    {% set flush_vol = params.FLUSH|default(50)|float %}
    {% set retract_len = params.RETRACT|default(2)|float %}
    {% set initial_purge = cfg.initial_purge_length|float %}
    {% set max_poop = cfg.max_poop_size|float %}
    {% set spitting_x = printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x %}
    {% set bottom_y = printer["gcode_macro GLOBAL_PARAM"].g_bottom_y %}

    # Note: Z is maintained by slicer G-code (Z-Sandwich pattern)
    # Firmware handles priming (55mm in PRZ_SPITTING_START)
    # This macro handles the FULL color transition purge from Orca

    {% if flush_vol == 0 %}
        ; Initial load - use fixed purge amount
        {% set purge_amount = initial_purge %}
        {action_respond_info("ORCA_PURGE: Initial load, Purge=%.1f" % (purge_amount))}
    {% else %}
        {% set purge_amount = flush_vol %}
        {action_respond_info("ORCA_PURGE: Color transition purge=%.1f" % (purge_amount))}
    {% endif %}

    {% if purge_amount > 0 %}
        # Calculate number of poops needed (split if > max_poop_size)
        {% set num_poops = ((purge_amount / max_poop) | round(0, 'ceil')) | int %}
        {% set poop_size = purge_amount / num_poops %}
        {action_respond_info("ORCA_PURGE: Splitting into %d poops of %.1fmm each" % (num_poops, poop_size))}

        # Safe pathing to purge position (PRZ_CUT_WAITINGAREA ends at spitting_x, bottom_y)
        PRZ_CUT_WAITINGAREA
        M106 S0
        M83

        {% for poop_num in range(num_poops) %}
            {action_respond_info("ORCA_PURGE: Poop %d/%d (%.1fmm)" % (poop_num + 1, num_poops, poop_size))}

            # Purge (+retract_len compensates for retraction after extrusion)
            G1 E{poop_size + retract_len} F200
            G1 E-{retract_len} F1800

            # Cooling - match stock values (100% fans, 5s cool, 1.5s solidify)
            M106 S255
            M106 P2 S255
            G4 P5000
            M106 S0
            M106 P2 S0
            G4 P1500

            # Kick (returns to spitting_x for next iteration)
            G90
            G1 X{spitting_x + 15} Y{bottom_y} F12000
            G4 P200
            G1 X{spitting_x} Y{bottom_y} F4000
            G4 P100
            G1 X{spitting_x + 15} Y{bottom_y} F12000
            G4 P100
            G1 X{spitting_x} Y{bottom_y} F4000
        {% endfor %}

        PRZ_WIPEMOUTH

        # Restore print temperature (was in PRZ_SPITTING_END, moved here to purge hot)
        {action_respond_info("ORCA_PURGE: Restoring temp to %d" % (printer["gcode_macro GLOBAL_PARAM"].g_extruder_temperature))}
        M104 S{(printer["gcode_macro GLOBAL_PARAM"].g_extruder_temperature)}

        ; Restore fans
        M106 S{(printer["gcode_macro GLOBAL_PARAM"].g_extruder_fan_speed)}
        M106 P2 S{(printer["gcode_macro GLOBAL_PARAM"].g_assist_fan_value)}
    {% else %}
        {action_respond_info("ORCA_PURGE: No purge requested")}
        # Still restore temp even if no purge needed
        M104 S{(printer["gcode_macro GLOBAL_PARAM"].g_extruder_temperature)}
        M106 S{(printer["gcode_macro GLOBAL_PARAM"].g_extruder_fan_speed)}
        M106 P2 S{(printer["gcode_macro GLOBAL_PARAM"].g_assist_fan_value)}
    {% endif %}


# ==============================================================================
# PRZ_SPITTING_* OVERRIDES
# ==============================================================================
# Firmware can call any PG11X macro (PG112-PG119), each calling different
# combinations of PRZ_SPITTING_START/NORMAL/END. We override all three:
#
#   - PRZ_SPITTING_START: 55mm prime (gears to nozzle)
#   - PRZ_SPITTING_NORMAL: No-op (ORCA_PURGE handles color transition)
#   - PRZ_SPITTING_END: No-op (temp restore in ORCA_PURGE)
#
# Priming (here) and color transition purge (ORCA_PURGE) are separate:
#   - Prime = fixed distance from extruder gears to nozzle (~70mm)
#   - Purge = Orca's flush volume for color transition (variable)

[gcode_macro PRZ_SPITTING_START]
description: Prime nozzle (55mm) - ORCA_PURGE handles color transition purge
gcode:
    {action_respond_info("PRZ_SPITTING_START\n")}

    M106 S0
    M106 p2 S0

    G90
    G1 X{(printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x)} Y{(printer["gcode_macro GLOBAL_PARAM"].g_bottom_y)} F4000

    # Prime: 55mm to get new filament from gears to nozzle tip
    M83
    G92 E0
    G1 E55 F320
    G92 E0

    G92 E0
    G1 E-2 F300

    M106 S255
    M106 p2 S255
    G4 P6000
    M106 S0
    M106 p2 S0
    G4 P1500

    G90
    G1 X{(printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x)+15} Y{(printer["gcode_macro GLOBAL_PARAM"].g_bottom_y)} F12000
    G4 P200

    G90
    G1 X{(printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x)} Y{(printer["gcode_macro GLOBAL_PARAM"].g_bottom_y)} F4000
    G4 P100
    G90
    G1 X{(printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x)+15} Y{(printer["gcode_macro GLOBAL_PARAM"].g_bottom_y)} F12000
    G4 P100


[gcode_macro PRZ_SPITTING_NORMAL]
description: No-op - ORCA_PURGE handles color transition
gcode:
    {action_respond_info("PRZ_SPITTING_NORMAL (skipped - ORCA_PURGE handles purge)\n")}
    # No purge here - START did priming, ORCA_PURGE does color transition


[gcode_macro PRZ_SPITTING_END]
description: No-op - temp restore moved to ORCA_PURGE to keep purge hot
gcode:
    {action_respond_info("PRZ_SPITTING_END (no-op, temp restored after ORCA_PURGE)\n")}
    # Don't restore temp here - ORCA_PURGE runs after this and needs to stay hot
    # Temperature is restored at the end of ORCA_PURGE


# ==============================================================================
# SAFE PATHING MACROS
# ==============================================================================

[gcode_macro _SAFE_SERVICE_TRANSIT]
description: Shared safe pathing to waiting area (X=138, Y=302) - firmware doesn't know this name
gcode:
    # This helper macro contains the safe corridor logic. Using a name unknown to
    # firmware avoids recursion when timer callbacks invoke PRZ_PAUSE_WAITINGAREA
    # while PRZ_WAITINGAREA is executing (both can safely call this helper).
    #
    # WAITING AREA: X=138 (g_spitting_start_x + 15), Y=302
    # This is the safe "home base" for service operations:
    #   - X=138 is in safe corridor (125-250)
    #   - Y=302 is at threshold (safe to return to print from here)
    #
    {% set pos = printer.toolhead.position %}
    {% set waiting_x = printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x + 15 %}
    {% set waiting_y = printer["gcode_macro GLOBAL_PARAM"].g_bottom_print_y %}

    # Safe corridor: X = 125-250 when Y > 302
    {% set safe_x_min = 125 %}
    {% set safe_x_max = 250 %}

    {action_respond_info("_SAFE_SERVICE_TRANSIT: from (%.1f, %.1f) to waiting area (%.1f, %.1f)" % (pos.x, pos.y, waiting_x, waiting_y))}

    G90

    {% if pos.y > waiting_y %}
        # Already in service area (Y > 302)
        # Must slide X into corridor before dropping Y (if outside corridor)
        {% if pos.x < safe_x_min %}
            {action_respond_info("_SAFE_SERVICE_TRANSIT: in left keepout, sliding X to %d" % (safe_x_min))}
            G1 X{safe_x_min} F10000
        {% elif pos.x > safe_x_max %}
            {action_respond_info("_SAFE_SERVICE_TRANSIT: in right keepout, sliding X to %d" % (safe_x_max))}
            G1 X{safe_x_max} F10000
        {% endif %}
        # Now in corridor (X in 125-250), diagonal to waiting area is safe
        G1 X{waiting_x} Y{waiting_y} F4000
    {% else %}
        # Below service area (Y <= 302) - can move freely, single diagonal move
        G1 X{waiting_x} Y{waiting_y} F4000
    {% endif %}

    {action_respond_info("_SAFE_SERVICE_TRANSIT: complete at waiting area (%.1f, %.1f)" % (waiting_x, waiting_y))}


[gcode_macro PRZ_WAITINGAREA]
description: Safe transit to waiting area (X=138, Y=302)
gcode:
    {action_respond_info("PRZ_WAITINGAREA\n")}
    _SAFE_SERVICE_TRANSIT


[gcode_macro PRZ_CUT_WAITINGAREA]
description: Safe transit to chute (X=123, Y=322) via waiting area
gcode:
    {% set chute_x = printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x %}
    {% set service_y = printer["gcode_macro GLOBAL_PARAM"].g_bottom_y %}
    {% set waiting_y = printer["gcode_macro GLOBAL_PARAM"].g_bottom_print_y %}
    {% set pos = printer.toolhead.position %}

    {action_respond_info("PRZ_CUT_WAITINGAREA: from (%.1f, %.1f) to chute (%.1f, %.1f)" % (pos.x, pos.y, chute_x, service_y))}
    {action_respond_info("  globals: g_bottom_y=%d, g_bottom_print_y=%d, g_spitting_start_x=%d" % (service_y, waiting_y, chute_x))}

    # Optimization: if already at service level (Y >= 320), just slide to chute
    {% if pos.y >= 320 %}
        {action_respond_info("PRZ_CUT_WAITINGAREA: already at service level, sliding to chute")}
        G90
        G1 X{chute_x} F4000
    {% else %}
        # Go through waiting area for safe pathing
        _SAFE_SERVICE_TRANSIT
        # Rise to service level and slide into chute
        {action_respond_info("PRZ_CUT_WAITINGAREA: rising to Y=%d then sliding to X=%d" % (service_y, chute_x))}
        G1 Y{service_y} F4000
        G1 X{chute_x} F4000
    {% endif %}


[gcode_macro PRZ_PAUSE_WAITINGAREA]
description: Safe pause position at waiting area (X=138, Y=302)
gcode:
    {action_respond_info("PRZ_PAUSE_WAITINGAREA\n")}
    _SAFE_SERVICE_TRANSIT


[gcode_macro PRZ_WIPEMOUTH]
description: Serpentine wipe across configurable lanes for even wear distribution
variable_wipe_cycle: 0
gcode:
    {action_respond_info("PRZ_WIPEMOUTH\n")}
    {% set cfg = printer["gcode_macro _USER_CONFIG"] %}
    {% set num_lanes = cfg.wipe_lanes|int %}
    {% set pos = printer.toolhead.position %}
    {% set wipe_x = printer["gcode_macro GLOBAL_PARAM"].g_wipemouth_start_x %}
    {% set base_y = printer["gcode_macro GLOBAL_PARAM"].g_bottom_y %}
    {% set waiting_x = printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x + 15 %}
    {% set waiting_y = printer["gcode_macro GLOBAL_PARAM"].g_bottom_print_y %}

    # Lane positions: 2.5mm spacing from base_y (322)
    {% set lane1_y = base_y %}
    {% set lane2_y = base_y + 2.5 %}
    {% set lane3_y = base_y + 5.0 %}

    {% set x_left = wipe_x %}
    {% set x_right = wipe_x + 60 %}

    # Get current cycle and increment for next time
    {% set cycle = printer["gcode_macro PRZ_WIPEMOUTH"].wipe_cycle %}
    SET_GCODE_VARIABLE MACRO=PRZ_WIPEMOUTH VARIABLE=wipe_cycle VALUE={(cycle + 1) % 2}

    {action_respond_info("PRZ_WIPEMOUTH: cycle=%d, lanes=%d (L1=%.1f, L2=%.1f)" % (cycle, num_lanes, lane1_y, lane2_y))}

    G90

    # Optimization: if already at service level (Y >= 320), go direct to wiper
    # Otherwise, go through waiting area for safe pathing
    {% if pos.y >= 320 %}
        {action_respond_info("PRZ_WIPEMOUTH: already at service level, going direct to wiper")}
    {% else %}
        {action_respond_info("PRZ_WIPEMOUTH: going through waiting area first")}
        _SAFE_SERVICE_TRANSIT
        G1 Y{base_y} F4000    ; Rise to service level
    {% endif %}

    {% if num_lanes >= 3 %}
        # 3-lane wipe pattern (Y max = 327)
        {% if cycle == 0 %}
            G1 X{x_left} Y{lane1_y} F8000
            G1 X{x_right} F8000                   ; Wipe 1: Lane 1 RIGHT
            G1 Y{lane2_y} F8000                   ; Step to Lane 2
            G1 X{x_left} F8000                    ; Wipe 2: Lane 2 LEFT
            G1 Y{lane3_y} F8000                   ; Step to Lane 3
            G1 X{x_right} F8000                   ; Wipe 3: Lane 3 RIGHT
            G1 X{x_left} F8000                    ; Wipe 4: Lane 3 LEFT
            G1 Y{lane2_y} F8000                   ; Step to Lane 2
            G1 X{x_right} F8000                   ; Wipe 5: Lane 2 RIGHT
            G1 Y{lane1_y} F8000                   ; Step to Lane 1
            G1 X{x_left} F8000                    ; Wipe 6: Lane 1 LEFT
            G1 X{x_right} F8000                   ; Wipe 7: Lane 1 RIGHT
            G1 Y{lane2_y} F8000                   ; Step to Lane 2
            G1 X{x_left} F8000                    ; Wipe 8: Lane 2 LEFT
            G1 Y{lane3_y} F8000                   ; Step to Lane 3
            G1 X{x_right} F8000                   ; Wipe 9: Lane 3 RIGHT
        {% else %}
            G1 X{x_left} Y{lane3_y} F8000
            G1 X{x_right} F8000                   ; Wipe 1: Lane 3 RIGHT
            G1 Y{lane2_y} F8000                   ; Step to Lane 2
            G1 X{x_left} F8000                    ; Wipe 2: Lane 2 LEFT
            G1 Y{lane1_y} F8000                   ; Step to Lane 1
            G1 X{x_right} F8000                   ; Wipe 3: Lane 1 RIGHT
            G1 X{x_left} F8000                    ; Wipe 4: Lane 1 LEFT
            G1 Y{lane2_y} F8000                   ; Step to Lane 2
            G1 X{x_right} F8000                   ; Wipe 5: Lane 2 RIGHT
            G1 Y{lane3_y} F8000                   ; Step to Lane 3
            G1 X{x_left} F8000                    ; Wipe 6: Lane 3 LEFT
            G1 X{x_right} F8000                   ; Wipe 7: Lane 3 RIGHT
            G1 Y{lane2_y} F8000                   ; Step to Lane 2
            G1 X{x_left} F8000                    ; Wipe 8: Lane 2 LEFT
            G1 Y{lane1_y} F8000                   ; Step to Lane 1
            G1 X{x_right} F8000                   ; Wipe 9: Lane 1 RIGHT
        {% endif %}
    {% elif num_lanes == 2 %}
        # 2-lane wipe pattern (Y max = 324.5)
        {% if cycle == 0 %}
            G1 X{x_left} Y{lane1_y} F8000
            G1 X{x_right} F8000                   ; Wipe 1: Lane 1 RIGHT
            G1 Y{lane2_y} F8000                   ; Step to Lane 2
            G1 X{x_left} F8000                    ; Wipe 2: Lane 2 LEFT
            G1 X{x_right} F8000                   ; Wipe 3: Lane 2 RIGHT
            G1 Y{lane1_y} F8000                   ; Step to Lane 1
            G1 X{x_left} F8000                    ; Wipe 4: Lane 1 LEFT
            G1 X{x_right} F8000                   ; Wipe 5: Lane 1 RIGHT
            G1 Y{lane2_y} F8000                   ; Step to Lane 2
            G1 X{x_left} F8000                    ; Wipe 6: Lane 2 LEFT
        {% else %}
            G1 X{x_left} Y{lane2_y} F8000
            G1 X{x_right} F8000                   ; Wipe 1: Lane 2 RIGHT
            G1 Y{lane1_y} F8000                   ; Step to Lane 1
            G1 X{x_left} F8000                    ; Wipe 2: Lane 1 LEFT
            G1 X{x_right} F8000                   ; Wipe 3: Lane 1 RIGHT
            G1 Y{lane2_y} F8000                   ; Step to Lane 2
            G1 X{x_left} F8000                    ; Wipe 4: Lane 2 LEFT
            G1 X{x_right} F8000                   ; Wipe 5: Lane 2 RIGHT
            G1 Y{lane1_y} F8000                   ; Step to Lane 1
            G1 X{x_left} F8000                    ; Wipe 6: Lane 1 LEFT
        {% endif %}
    {% else %}
        # 1-lane wipe pattern (Y = 322 only, no cycle alternation)
        G1 X{x_left} Y{lane1_y} F8000
        G1 X{x_right} F8000                       ; Wipe 1
        G1 X{x_left} F8000                        ; Wipe 2
        G1 X{x_right} F8000                       ; Wipe 3
        G1 X{x_left} F8000                        ; Wipe 4
        G1 X{x_right} F8000                       ; Wipe 5
        G1 X{x_left} F8000                        ; Wipe 6
    {% endif %}

    # Return to waiting area - diagonal is safe (X stays in corridor 125-250)
    G1 X{waiting_x} Y{waiting_y} F8000


# ==============================================================================
# PRINT_END OVERRIDE - Extra cuts before final retract
# ==============================================================================
# Stock PRINT_END only does a single cut via P2 A7. We add extra cuts
# using the same logic as PG101 before calling P2 A7.

[gcode_macro PRINT_END]
gcode:
    {action_respond_info("=====PRINT_END (with extra cuts)\n")}
    {% set cfg = printer["gcode_macro _USER_CONFIG"] %}
    {% set cut_count = cfg.extra_toolchange_cuts|int %}

    # Lift Z if possible
    {% if (printer.gcode_move.position.z + 5) < 300 %}
        G91
        G1 Z5 F1000
        G90
    {% endif %}

    # Safe pathing to chute area
    PRZ_WAITINGAREA
    M400

    # Extra cuts before P2 A7
    {% if cut_count > 0 %}
        {action_respond_info("PRINT_END: Performing %d extra cuts" % cut_count)}
        G1 X300 Y260 F12000
        {% for i in range(cut_count) %}
            G1 X313 F10000
            G1 X320 F500
            G4 P500
            G1 X300 F10000
        {% endfor %}
    {% endif %}

    # Firmware cut and retract
    {action_respond_info("=====P2 A7\n")}
    P2 A7

    TURN_OFF_HEATERS
    {action_respond_info("=====M107\n")}
    M107

    BED_MESH_CLEAR
    BED_MESH_PROFILE LOAD=phrozen
    M106 P1 S0
    M106 P2 S0
    M106 P3 S0
    TP_PUT

    M84
    {action_respond_info("ARCO_PRINT_END_OK\n")}

