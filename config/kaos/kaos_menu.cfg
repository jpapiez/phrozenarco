# KAOS_VERSION: v0.95
# Add this file with: [include kaos_menu.cfg]

[gcode_macro KAOS_MENU]
description: Popup menu for KAOS user commands
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin KAOS Menu"
    RESPOND TYPE=command MSG="action:prompt_text Choose a KAOS category:"
    RESPOND TYPE=command MSG="action:prompt_button Logging|_KAOS_MENU_OPEN_LOGGING"
    RESPOND TYPE=command MSG="action:prompt_button Lights / Sound|_KAOS_MENU_OPEN_LIGHTS"
    RESPOND TYPE=command MSG="action:prompt_button Filament|_KAOS_MENU_OPEN_FILAMENT"
    RESPOND TYPE=command MSG="action:prompt_button Calibration / Mesh / Tilt|_KAOS_MENU_OPEN_CALIBRATION"
    RESPOND TYPE=command MSG="action:prompt_button Dynamic Speed|_KAOS_MENU_OPEN_DYNAMIC_SPEED"
    RESPOND TYPE=command MSG="action:prompt_button System Options|_KAOS_MENU_OPEN_SYSTEM"
    RESPOND TYPE=command MSG="action:prompt_button Debug / Recovery|_KAOS_MENU_OPEN_DEBUG"
    RESPOND TYPE=command MSG="action:prompt_button Close|_KAOS_MENU_CANCEL"
    RESPOND TYPE=command MSG="action:prompt_show"


# -----------------------------------------------------------------------------
# Category openers / navigation
# -----------------------------------------------------------------------------

[gcode_macro _KAOS_MENU_OPEN_MAIN]
description: Menu action - return to KAOS main menu
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    KAOS_MENU

[gcode_macro _KAOS_MENU_OPEN_LOGGING]
description: Menu action - open KAOS logging and language menu
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    _KAOS_MENU_LOGGING

[gcode_macro _KAOS_MENU_OPEN_LIGHTS]
description: Menu action - open KAOS lights and sound menu
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    _KAOS_MENU_LIGHTS

[gcode_macro _KAOS_MENU_OPEN_FILAMENT]
description: Menu action - open KAOS filament menu
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    _KAOS_MENU_FILAMENT

[gcode_macro _KAOS_MENU_OPEN_CALIBRATION]
description: Menu action - open KAOS calibration menu
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    _KAOS_MENU_CALIBRATION


[gcode_macro _KAOS_MENU_OPEN_DYNAMIC_SPEED]
description: Menu action - open KAOS dynamic speed menu
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    _KAOS_MENU_DYNAMIC_SPEED


[gcode_macro _KAOS_MENU_OPEN_SYSTEM]
description: Menu action - open KAOS system options menu
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    _KAOS_MENU_SYSTEM

[gcode_macro _KAOS_MENU_OPEN_DEBUG]
description: Menu action - open KAOS debug and recovery menu
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    _KAOS_MENU_DEBUG

[gcode_macro _KAOS_MENU_CANCEL]
description: Menu action - cancel KAOS menu
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    RESPOND MSG="KAOS menu cancelled"


# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------

[gcode_macro _KAOS_MENU_LOGGING]
description: Popup menu for KAOS logging commands
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin KAOS Logging"
    RESPOND TYPE=command MSG="action:prompt_text Logging level:"
    RESPOND TYPE=command MSG="action:prompt_button Quiet - WARN|_KAOS_MENU_LOG_LEVEL_WARN"
    RESPOND TYPE=command MSG="action:prompt_button Info|_KAOS_MENU_LOG_LEVEL_INFO"
    RESPOND TYPE=command MSG="action:prompt_button Debug|_KAOS_MENU_LOG_LEVEL_DEBUG"
    RESPOND TYPE=command MSG="action:prompt_button Toggle Quiet / Debug|_KAOS_MENU_LOG_LEVEL_TOGGLE"
    RESPOND TYPE=command MSG="action:prompt_text Formatting:"
    RESPOND TYPE=command MSG="action:prompt_button Categories On|_KAOS_MENU_LOG_CATEGORIES_ON"
    RESPOND TYPE=command MSG="action:prompt_button Categories Off|_KAOS_MENU_LOG_CATEGORIES_OFF"
    RESPOND TYPE=command MSG="action:prompt_button Timestamp On|_KAOS_MENU_LOG_TIMESTAMP_ON"
    RESPOND TYPE=command MSG="action:prompt_button Timestamp Off|_KAOS_MENU_LOG_TIMESTAMP_OFF"
    RESPOND TYPE=command MSG="action:prompt_text Status:"
    RESPOND TYPE=command MSG="action:prompt_button Show KAOS Log Status|_KAOS_MENU_LOG_STATUS"
    RESPOND TYPE=command MSG="action:prompt_button Back|_KAOS_MENU_OPEN_MAIN"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _KAOS_MENU_LOG_LEVEL_WARN]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    KAOS_SET_LOG_LEVEL LEVEL=1 SAVE=1
    KAOS_MENU

[gcode_macro _KAOS_MENU_LOG_LEVEL_INFO]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    KAOS_SET_LOG_LEVEL LEVEL=2 SAVE=1
    KAOS_MENU

[gcode_macro _KAOS_MENU_LOG_LEVEL_DEBUG]
gcode:
