# KAOS_VERSION: v0.95
; ==============================================================
; Z_TILT control macros (run-once per session / first print)
;
;USAGE:
;Add the following line to your machine start G-Code
; Z_TILT_ONCE
;
; PURPOSE:
; - Provide a safe, idempotent Z_TILT workflow for CoreXY / dual-Z printers
; - Ensure Z_TILT_ADJUST always homes (G28) before running
; - Prevent redundant Z_TILT runs after the first print
;
; BEHAVIOR:
; - Z_TILT runs automatically on the first print after startup
; - Subsequent prints skip Z_TILT unless the run flag is cleared
; - Z_TILT_CLEAR resets the flag to allow Z_TILT to run again
; - FORCE=1 bypasses the flag and forces a re-run without restart
;
; MACROS:
; - Z_TILT_ADJUST : Safe wrapper that homes and runs base Z_TILT
; - Z_TILT_ONCE   : Executes Z_TILT_ADJUST only if it has not run yet
; - Z_TILT_CLEAR  : Manually clears the run-once flag
;
; NOTES:
; - The `ran` flag persists across prints until cleared or firmware restart
; - Intended for START_PRINT inclusion or manual calibration workflows
; ==============================================================


; State container shared by Z_TILT_ONCE / Z_TILT_CLEAR / Z_TILT_ADJUST.
; The "has Z_TILT_ADJUST run this session?" flag lives here, separated from
; the Z_TILT_ADJUST macro that performs the actual motion.
[gcode_macro _Z_TILT_STATE]
description: State container - has Z_TILT_ADJUST run this session?
variable_ran: False
gcode:


[gcode_macro Z_TILT_ONCE]
description: Run Z_TILT_ADJUST only once per session (gated by _Z_TILT_STATE.ran); FORCE=1 overrides
gcode:
    {% set force = params.FORCE|default(0)|int %}

    {% if force == 1 %}
        _KAOS_LOG LEVEL=1 CATEGORY=Z_TILT MSG="Z_TILT: forcing re-run"
        SET_GCODE_VARIABLE MACRO=_Z_TILT_STATE VARIABLE=ran VALUE=False
    {% endif %}

    {% if not printer["gcode_macro _Z_TILT_STATE"].ran %}
        _KAOS_LOG LEVEL=2 CATEGORY=Z_TILT MSG="Z_TILT: running"
        Z_TILT_ADJUST
        SET_GCODE_VARIABLE MACRO=_Z_TILT_STATE VARIABLE=ran VALUE=True
    {% else %}
        _KAOS_LOG LEVEL=3 CATEGORY=Z_TILT MSG="Z_TILT: already run, skipping"
    {% endif %}

[gcode_macro Z_TILT_ADJUST]
description: Z tilt with safety guards; renames base to Z_TILT_ADJUST_BASE
rename_existing: Z_TILT_ADJUST_BASE
gcode:
    ; Safety: same pattern as protected movement macros.
    ; Do not auto-home here. START G-code is responsible for PG28.
    _KAOS_LOG LEVEL=3 CATEGORY=Z_TILT MSG="Z_TILT: checking trusted XYZ before Z_TILT_ADJUST"
    _KAOS_SAFETY_MODE_REQUIRE_PHYSICAL_TRUSTED_XYZ NAME="KAOS calibration/probing command"

    Z_TILT_ADJUST_BASE

    ; Z tilt changes the physical Z relationship, so re-assert trusted Z/XYZ afterward.
    _SET_TRUSTED_Z
    _SET_TRUSTED_XYZ


[gcode_macro Z_TILT_CLEAR]
description: Clear _Z_TILT_STATE.ran to allow Z_TILT_ADJUST to run again
gcode:
    SET_GCODE_VARIABLE MACRO=_Z_TILT_STATE VARIABLE=ran VALUE=False
    _KAOS_LOG LEVEL=2 CATEGORY=Z_TILT MSG="Z_TILT: flag cleared"



[z_tilt]
z_positions:
  365,150
  -45,150
points:
  270,150
  30,150
speed: 300
horizontal_move_z: 10
retries: 3
retry_tolerance: 0.01
