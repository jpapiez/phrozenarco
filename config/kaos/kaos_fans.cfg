# KAOS_VERSION: v0.95
#####################################################################
# KAOS: MCU / CPU cooling control
#####################################################################
#
; - Normal: fan ON/OFF based on MCU temperature (watermark)
; - CPU override: forces fan ON when CPU >= CPU_ON,
;                 releases when CPU <= CPU_OFF
; - Binary only (0% or 100%) recommended for 2-wire DC fans (low PWM can buzz or stall)
;
; The following variables in KAOS.cfg control behavior:
;   variable_board_fan_target: 40   ; normal MCU target temp (°C)
;   variable_cpu_fan_on: 55          ; CPU temperature to force fan ON
;   variable_cpu_fan_off: 45         ; CPU temperature to release override
;   variable_cpu_override_target: 10  ; low target forces fan ON
;
; IMPORTANT:
; Disable any other config using pin PA2
; (output_pin / fan / fan_generic / temperature_fan)
;
; For this to work, the following must be commented out in printer.cfg:
;   #[output_pin board_fan]
;   #pin: PA2
;   #value: 1
#####################################################################
[temperature_sensor cpu_temp]
sensor_type: temperature_host
min_temp: 0
max_temp: 100


[temperature_fan board_fan]
pin: PA2
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

target_temp: 50                  ; fallback matches _USER_CONFIG default

control: watermark
max_speed: 1.0
min_speed: 0.0
kick_start_time: 0.5
gcode_id: MCU

# ============================================================
# KAOS Board Fan Control Persistence
# ============================================================
# Persisted variable:
#   kaos_enable_board_fan_ctrl = 0/1
#
# Runtime variable lives in _USER_CONFIG:
#   enable_board_fan_ctrl
# ============================================================

[gcode_macro KAOS_SET_BOARD_FAN_CTRL]
description: Enable/disable KAOS board fan control and optionally persist the setting
gcode:
    {% set cfg = printer["gcode_macro _USER_CONFIG"] %}
    {% set enable = params.ENABLE|default(cfg.enable_board_fan_ctrl)|int %}
    {% set save = params.SAVE|default(1)|int %}

    {% if enable < 0 %}{% set enable = 0 %}{% endif %}
    {% if enable > 1 %}{% set enable = 1 %}{% endif %}

    SET_GCODE_VARIABLE MACRO=_USER_CONFIG VARIABLE=enable_board_fan_ctrl VALUE={enable}

    {% if enable == 1 %}
        {% set t = cfg.board_fan_target|float %}
        {% if t < 0 %}{% set t = 0 %}{% endif %}
        {% if t > 100 %}{% set t = 100 %}{% endif %}
        SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=board_fan TARGET={t}
        UPDATE_DELAYED_GCODE ID=BOARD_FAN_CPU_LOOP DURATION=2
    {% else %}
        # Control disabled means fail-safe cooling: force the board fan to 100%.
        # The board_fan is a temperature_fan in watermark mode.
        # On the Arco, TARGET=0 appears to disable/turn off the fan,
        # so use TARGET=1 to force continuous full-speed cooling.
        UPDATE_DELAYED_GCODE ID=BOARD_FAN_CPU_LOOP DURATION=0
        SET_GCODE_VARIABLE MACRO=_BOARD_FAN_CPU_OVERRIDE VARIABLE=active VALUE=0
        SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=board_fan TARGET=1
    {% endif %}

    {% if save == 1 %}
        SAVE_VARIABLE VARIABLE=kaos_enable_board_fan_ctrl VALUE={enable}
        RESPOND MSG="KAOS board fan control set to {enable} and saved"
    {% else %}
        RESPOND MSG="KAOS board fan control set to {enable} for this session only"
    {% endif %}

[gcode_macro _KAOS_LOAD_PERSISTED_FAN_OPTIONS]
description: Load saved KAOS fan settings from save_variables
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set cfg = printer["gcode_macro _USER_CONFIG"] %}

    {% set default_board_fan = cfg.enable_board_fan_ctrl|default(1)|int %}
    {% set saved_board_fan = svv.kaos_enable_board_fan_ctrl|default(default_board_fan)|int %}

    {% if saved_board_fan < 0 or saved_board_fan > 1 %}
        RESPOND TYPE=error MSG="KAOS fans: saved kaos_enable_board_fan_ctrl is invalid, using default {default_board_fan}"
        KAOS_SET_BOARD_FAN_CTRL ENABLE={default_board_fan} SAVE=0
    {% else %}
        KAOS_SET_BOARD_FAN_CTRL ENABLE={saved_board_fan} SAVE=0
        RESPOND MSG="KAOS fans: loaded saved board fan control {saved_board_fan}"
    {% endif %}

[gcode_macro KAOS_FAN_STATUS]
description: Show KAOS fan option status
gcode:
    {% set cfg = printer["gcode_macro _USER_CONFIG"] %}
    {% set svv = printer.save_variables.variables %}
    {% set saved_board_fan = svv.kaos_enable_board_fan_ctrl|default("unset") %}
    {% set override = printer["gcode_macro _BOARD_FAN_CPU_OVERRIDE"].active|int %}
    {% if cfg.enable_board_fan_ctrl|int == 1 %}
        RESPOND MSG="KAOS fan status: board_fan_ctrl=1, saved_board_fan_ctrl={saved_board_fan}, mode=automatic, cpu_override_active={override}"
    {% else %}
        RESPOND MSG="KAOS fan status: board_fan_ctrl=0, saved_board_fan_ctrl={saved_board_fan}, mode=forced_100_percent, cpu_override_active={override}"
    {% endif %}

[delayed_gcode apply_board_fan_target]
initial_duration: 4
gcode:
  {% set cfg = printer["gcode_macro _USER_CONFIG"] %}
  {% if cfg.enable_board_fan_ctrl|int == 1 %}
    {% set t = cfg.board_fan_target|float %}

    {% if t < 0 %}{% set t = 0 %}{% endif %}
    {% if t > 100 %}{% set t = 100 %}{% endif %}

    SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=board_fan TARGET={t}
    _KAOS_LOG LEVEL=2 CATEGORY=FAN MSG="Board fan MCU threshold={t}"
  {% else %}
    # Control disabled means fail-safe cooling: force the board fan to 100%.
    SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=board_fan TARGET=1
    _KAOS_LOG LEVEL=1 CATEGORY=FAN MSG="Board fan control disabled - fan forced ON"
  {% endif %}


[gcode_macro _BOARD_FAN_CPU_OVERRIDE]
variable_active: 0
gcode:
  {% set cfg = printer["gcode_macro _USER_CONFIG"] %}

  # Master enable check (Klipper-safe)
  {% if cfg.enable_board_fan_ctrl|int != 1 %}
    _KAOS_LOG LEVEL=1 CATEGORY=FAN MSG="Board fan control disabled - override ignored"
  {% else %}

    {% set cpu = printer["temperature_sensor cpu_temp"].temperature|float %}
    {% set active = printer["gcode_macro _BOARD_FAN_CPU_OVERRIDE"].active|int %}

    {% set CPU_ON  = cfg.cpu_fan_on|float %}
    {% set CPU_OFF = cfg.cpu_fan_off|float %}

    # Clamp to sane CPU range
    {% if CPU_ON < 30 %}{% set CPU_ON = 30 %}{% endif %}
    {% if CPU_ON > 90 %}{% set CPU_ON = 90 %}{% endif %}

    {% if CPU_OFF < 25 %}{% set CPU_OFF = 25 %}{% endif %}
    {% if CPU_OFF > 85 %}{% set CPU_OFF = 85 %}{% endif %}

    {% set normal_t = cfg.board_fan_target|float %}
    {% set over_t   = cfg.cpu_override_target|float %}

    # Optional clamp for override target
    {% if over_t < 0 %}{% set over_t = 0 %}{% endif %}
    {% if over_t > 20 %}{% set over_t = 20 %}{% endif %}

    # Ensure valid hysteresis
    {% if CPU_OFF > CPU_ON %}
      {% set CPU_OFF = CPU_ON - 1 %}
    {% endif %}

    {% if active == 0 and cpu >= CPU_ON %}
      SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=board_fan TARGET={over_t}
      SET_GCODE_VARIABLE MACRO=_BOARD_FAN_CPU_OVERRIDE VARIABLE=active VALUE=1
      _KAOS_LOG LEVEL=2 CATEGORY=FAN MSG="CPU hot ({cpu}C) fan forced ON"

    {% elif active == 1 and cpu <= CPU_OFF %}
      SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=board_fan TARGET={normal_t}
      SET_GCODE_VARIABLE MACRO=_BOARD_FAN_CPU_OVERRIDE VARIABLE=active VALUE=0
      _KAOS_LOG LEVEL=2 CATEGORY=FAN MSG="CPU cooled ({cpu}C) MCU control restored"

    {% endif %}

  {% endif %}


[delayed_gcode BOARD_FAN_CPU_LOOP]
initial_duration: 6
gcode:
  {% if printer["gcode_macro _USER_CONFIG"].enable_board_fan_ctrl|int == 1 %}
    _BOARD_FAN_CPU_OVERRIDE
    UPDATE_DELAYED_GCODE ID=BOARD_FAN_CPU_LOOP DURATION=2
  {% else %}
    _KAOS_LOG LEVEL=1 CATEGORY=FAN MSG="Board fan loop disabled in _USER_CONFIG"
  {% endif %}
