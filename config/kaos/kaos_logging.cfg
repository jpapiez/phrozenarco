# KAOS_VERSION: v0.95
#####################################################################
# KAOS: Logging wrapper
#####################################################################
# Logging variables live in _USER_CONFIG:
#   log_level, log_categories, log_timestamp
#
# Levels: 0=ERROR, 1=WARN, 2=INFO, 3=DEBUG
#
# _KAOS_LOG is the internal cfg logger and uses RESPOND only.
# KAOS_LOG is kept as a compatibility wrapper for older/public calls.
#####################################################################

[gcode_macro _KAOS_LOG]
description: Internal filtered console output helper for KAOS cfg macros
gcode:
  {% set msg_level = params.LEVEL|default(2)|int %}
  {% if msg_level < 0 %}{% set msg_level = 0 %}{% endif %}
  {% if msg_level > 3 %}{% set msg_level = 3 %}{% endif %}

  {% set cfg = printer["gcode_macro _USER_CONFIG"] %}
  {% set current_level = cfg.log_level|int %}
  {% set categories = cfg.log_categories|int %}
  {% set category = params.CATEGORY|default(params.SOURCE|default("KAOS")) %}
  {% set msg = params.MSG|default("") %}

  {% if msg_level <= current_level %}
    {% set level_name = ["ERROR","WARN","INFO","DEBUG"][msg_level] %}
    {% if categories == 1 %}
      RESPOND PREFIX="KAOS_LOG" MSG="[{level_name}] [{category}] {msg}"
    {% else %}
      RESPOND PREFIX="KAOS_LOG" MSG="[{level_name}] {msg}"
    {% endif %}
  {% endif %}

[gcode_macro KAOS_LOG]
description: Compatibility wrapper for old/public KAOS_LOG calls
gcode:
  {% set raw_level = params.LEVEL|default("INFO")|string|upper %}

  {% if raw_level == "ERROR" %}
    {% set level = 0 %}
  {% elif raw_level == "WARN" or raw_level == "WARNING" %}
    {% set level = 1 %}
  {% elif raw_level == "INFO" %}
    {% set level = 2 %}
  {% elif raw_level == "DEBUG" %}
    {% set level = 3 %}
  {% else %}
    {% set level = raw_level|int %}
  {% endif %}

  {% set category = params.CATEGORY|default(params.SOURCE|default("KAOS")) %}
  {% set msg = params.MSG|default("") %}

  _KAOS_LOG LEVEL={level} CATEGORY={category} MSG="{msg}"

# ============================================================
# KAOS Logging Persistence Setters
# ============================================================

[gcode_macro KAOS_SET_LOG_LEVEL]
description: Set KAOS log level and optionally persist it
gcode:
    {% set level = params.LEVEL|default(1)|int %}
    {% set save = params.SAVE|default(1)|int %}

    {% if level < 0 or level > 3 %}
        RESPOND TYPE=error MSG="KAOS_SET_LOG_LEVEL: LEVEL must be 0, 1, 2, or 3"
    {% else %}
        SET_GCODE_VARIABLE MACRO=_USER_CONFIG VARIABLE=log_level VALUE={level}

        {% if save == 1 %}
            SAVE_VARIABLE VARIABLE=kaos_log_level VALUE={level}
            RESPOND MSG="KAOS log level set to {level} and saved"
        {% else %}
            RESPOND MSG="KAOS log level set to {level} for this session only"
        {% endif %}
    {% endif %}

[gcode_macro KAOS_SET_LOG_FLAGS]
description: Set KAOS log categories and timestamp flags and optionally persist them
gcode:
    {% set cfg = printer["gcode_macro _USER_CONFIG"] %}
    {% set categories = params.CATEGORIES|default(cfg.log_categories)|int %}
    {% set timestamp = params.TIMESTAMP|default(cfg.log_timestamp)|int %}
    {% set save = params.SAVE|default(1)|int %}

    {% if categories < 0 %}{% set categories = 0 %}{% endif %}
    {% if categories > 1 %}{% set categories = 1 %}{% endif %}
    {% if timestamp < 0 %}{% set timestamp = 0 %}{% endif %}
    {% if timestamp > 1 %}{% set timestamp = 1 %}{% endif %}

    SET_GCODE_VARIABLE MACRO=_USER_CONFIG VARIABLE=log_categories VALUE={categories}
    SET_GCODE_VARIABLE MACRO=_USER_CONFIG VARIABLE=log_timestamp VALUE={timestamp}

    {% if save == 1 %}
        SAVE_VARIABLE VARIABLE=kaos_log_categories VALUE={categories}
        SAVE_VARIABLE VARIABLE=kaos_log_timestamp VALUE={timestamp}
        RESPOND MSG="KAOS log flags set and saved: Categories={categories}, Timestamp={timestamp}"
    {% else %}
        RESPOND MSG="KAOS log flags set for this session only: Categories={categories}, Timestamp={timestamp}"
    {% endif %}

# ============================================================
# KAOS Load Persisted Logging Settings
# ============================================================

[gcode_macro _KAOS_LOAD_PERSISTED_LOGGING]
description: Load saved KAOS logging settings from save_variables
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set cfg = printer["gcode_macro _USER_CONFIG"] %}

    {% set default_level = cfg.log_level|default(1)|int %}
    {% set default_categories = cfg.log_categories|default(1)|int %}
    {% set default_timestamp = cfg.log_timestamp|default(0)|int %}
    {% set saved_level = svv.kaos_log_level|default(default_level)|int %}
    {% set saved_categories = svv.kaos_log_categories|default(default_categories)|int %}
    {% set saved_timestamp = svv.kaos_log_timestamp|default(default_timestamp)|int %}

    {% if saved_level < 0 or saved_level > 3 %}
        RESPOND TYPE=error MSG="KAOS logging: saved kaos_log_level is invalid, using default {default_level}"
        KAOS_SET_LOG_LEVEL LEVEL={default_level} SAVE=0
    {% else %}
        KAOS_SET_LOG_LEVEL LEVEL={saved_level} SAVE=0
        RESPOND MSG="KAOS logging: loaded saved log level {saved_level}"
    {% endif %}

    {% if saved_categories < 0 or saved_categories > 1 or saved_timestamp < 0 or saved_timestamp > 1 %}
        RESPOND TYPE=error MSG="KAOS logging: saved log flags are invalid, using defaults"
        KAOS_SET_LOG_FLAGS CATEGORIES={default_categories} TIMESTAMP={default_timestamp} SAVE=0
    {% else %}
        KAOS_SET_LOG_FLAGS CATEGORIES={saved_categories} TIMESTAMP={saved_timestamp} SAVE=0
        RESPOND MSG="KAOS logging: loaded saved flags Categories={saved_categories}, Timestamp={saved_timestamp}"
    {% endif %}

[gcode_macro KAOS_LOG_STATUS]
description: Show current KAOS logging settings and saved values
gcode:
    {% set cfg = printer["gcode_macro _USER_CONFIG"] %}
    {% set svv = printer.save_variables.variables %}
    {% set level = cfg.log_level|int %}
    {% set level_name = ["ERROR","WARN","INFO","DEBUG"][level] %}
    {% set categories = cfg.log_categories|int %}
    {% set timestamp = cfg.log_timestamp|int %}
    {% set saved_level = svv.kaos_log_level|default("unset") %}
    {% set saved_categories = svv.kaos_log_categories|default("unset") %}
    {% set saved_timestamp = svv.kaos_log_timestamp|default("unset") %}
    RESPOND MSG="KAOS log current: Level={level_name} ({level}), Categories={categories}, Timestamp={timestamp}"
    RESPOND MSG="KAOS log saved: Level={saved_level}, Categories={saved_categories}, Timestamp={saved_timestamp}"

[gcode_macro _KAOS_STARTUP_LOGGING]
description: Report startup logging settings from _USER_CONFIG
gcode:
    KAOS_LOG_STATUS

[gcode_macro KAOS_TOGGLE_LOG_LEVEL]
description: Toggle KAOS unified logging between quiet (WARN) and debug
gcode:
    {% set current = printer["gcode_macro _USER_CONFIG"].log_level|int %}
    {% set quiet = 1 %}
    {% set debug = 3 %}

    {% if current == quiet %}
        {% set new_level = debug %}
    {% else %}
        {% set new_level = quiet %}
    {% endif %}

    KAOS_SET_LOG_LEVEL LEVEL={new_level} SAVE=1
