# KAOS_VERSION: v0.95
# ==============================================================================
# MAGIC AMS BY CHRIS — multi-color tool change & purge integration with Orca
# ==============================================================================
# Slicer-facing entry points for multi-color printing on the Phrozen Arco.
#
#   TOOLCHANGE — tool-change setup. Slicer calls this from its Change-Filament
#                G-code BEFORE Orca emits its own `T<n>`. Lifts Z, retracts old
#                filament, stashes the slicer's FLUSH + RETRACT into
#                _TOOLCHANGE_PENDING for PRZ_SPITTING_END to consume post-prime,
#                lowers Z. Does NOT fire `T<n>` itself (Orca already does that
#                immediately after) and does NOT call ORCA_PURGE here (that
#                runs post-cut, see below).
#   ORCA_PURGE — color-transition purge. Auto-fired by PRZ_SPITTING_END at the
#                tail of the firmware's _SPITTING_FRAME prime sequence, with
#                the FLUSH/RETRACT values TOOLCHANGE stashed. Can also be
#                invoked directly for testing.
#
# Order on hardware (per tool change):
#   1. Slicer emits TOOLCHANGE NEXT=... FLUSH=... RETRACT_OLD=... RETRACT_NEW=...
#      → lift Z (head stays elevated until step 4), retract OLD, set
#        _TOOLCHANGE_PENDING (flush, retract, lifted, active)
#   2. Slicer emits its own `T<n> ; change extruder`
#   3. Firmware fires its cut+load+prime: PG104 → PG101 (depressurize + travel
#      at lifted Z) → CUT → PG106 (9mm load) → PG110 (5mm catch) → PG113 →
#      _SPITTING_FRAME → PRZ_SPITTING_START (55mm prime) → PRZ_SPITTING_END
#   4. PRZ_SPITTING_END sees pending state: fires ORCA_PURGE with stashed
#      FLUSH/RETRACT (color flush + wipe + temp/fan restore), then if `lifted`
#      lowers Z back to print height, clears pending
#
# Tunables in [gcode_macro _USER_CONFIG] (kaos.cfg):
#   variable_initial_purge_length — mm to purge on FLUSH=0 (initial color load)
#   variable_max_poop_size        — mm cap per "poop"; longer purges are split
#                                   with a kick-and-cool between segments
#
# Position constants (chute X, waiting Y, service Y, etc.) live in GLOBAL_PARAM
# under their original Phrozen names so a hypothetical UI calibration
# (SET_GCODE_VARIABLE MACRO=GLOBAL_PARAM ...) keeps working. KAOS-introduced
# constants (Z lift amount, safe corridor bounds, prime length, etc.) live in
# PRZ_GEOMETRY. Both in printer_gcode_macro.cfg.
# ==============================================================================


[gcode_macro TOOLCHANGE]
description: Tool-change setup called by slicer Change-Filament G-code; lifts Z, retracts, queues post-prime ORCA_PURGE, lowers Z
gcode:
    _REQUIRE_TRUSTED_XY
    {% if params.NEXT is not defined %}
        { action_raise_error("TOOLCHANGE: NEXT parameter is required (e.g. TOOLCHANGE NEXT={next_extruder} ...)") }
    {% endif %}
    {% set GEO = printer["gcode_macro PRZ_GEOMETRY"] %}
    {% set next = params.NEXT|int %}
    {% if next < 0 %}
        { action_raise_error("TOOLCHANGE: NEXT must be >= 0 (got %d)" % next) }
    {% endif %}
    {% set flush = params.FLUSH|default(0)|float %}
    {% set retract_old = params.RETRACT_OLD|default(2)|float %}
    {% set retract_new = params.RETRACT_NEW|default(2)|float %}
    {% set z_max = printer.configfile.settings.stepper_z.position_max %}
    {% set z_lift_max = z_max - GEO.z_lift_safety_margin %}
    {% set should_lift = (printer.gcode_move.position.z + GEO.toolchange_z_lift) < z_lift_max %}

    {action_respond_info("TOOLCHANGE: NEXT=%d FLUSH=%.1f RETRACT_OLD=%.1f RETRACT_NEW=%.1f lift=%d" % (next, flush, retract_old, retract_new, 1 if should_lift else 0))}

    # Lift Z so the firmware's travel from current print position to the chute
    # clears any tall print features. Stays lifted through the firmware's
    # cut+load+prime+purge cycle; PRZ_SPITTING_END mirrors the lower at the end.
    {% if should_lift %}
        G91
        G1 Z{GEO.toolchange_z_lift} F12000
        G90
    {% endif %}

    # Retract OLD filament before the slicer's T<n> triggers the firmware cut.
    M83
    G1 E-{retract_old} F1800

    # Queue the post-prime ORCA_PURGE and matching Z-lower. PRZ_SPITTING_END
    # consumes this at the tail of the firmware's _SPITTING_FRAME, after the
    # cut+load+prime cycle. `lifted` mirrors the actual lift decision so the
    # post-purge lower only fires if the lift did.
    SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_PENDING VARIABLE=flush   VALUE={flush}
    SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_PENDING VARIABLE=retract VALUE={retract_new}
    SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_PENDING VARIABLE=lifted  VALUE={1 if should_lift else 0}
    SET_GCODE_VARIABLE MACRO=_TOOLCHANGE_PENDING VARIABLE=active  VALUE=1


[gcode_macro ORCA_PURGE]
description: Color-transition purge. Called by TOOLCHANGE; safe to call standalone for testing.
gcode:
    _REQUIRE_TRUSTED_XY
    {% set GEO = printer["gcode_macro PRZ_GEOMETRY"] %}
    {% set ST = printer["gcode_macro PRZ_RUNTIME_STATE"] %}
    {% set USR = printer["gcode_macro _USER_CONFIG"] %}
    {% set flush_vol = params.FLUSH|default(50)|float %}
    {% set retract_len = params.RETRACT|default(2)|float %}
    {% set initial_purge = USR.initial_purge_length|float %}
    {% set max_poop = USR.max_poop_size|float %}

    # FLUSH=0 means initial color load (slicer didn't compute a flush volume).
    # FLUSH>0 is a normal Orca color transition.
    {% if flush_vol == 0 %}
        {% set purge_amount = initial_purge %}
        {action_respond_info("ORCA_PURGE: Initial load, Purge=%.1f" % (purge_amount))}
    {% else %}
        {% set purge_amount = flush_vol %}
        {action_respond_info("ORCA_PURGE: Color transition purge=%.1f" % (purge_amount))}
    {% endif %}

    {% if purge_amount > 0 %}
        # Split into N poops, each <= max_poop_size, with a kick between
        {% set num_poops = ((purge_amount / max_poop) | round(0, 'ceil')) | int %}
        {% set poop_size = purge_amount / num_poops %}
        RESPOND PREFIX=INFO MSG="ORCA_PURGE: Splitting into {num_poops} poops of {poop_size|round(1)}mm each"

        # PRZ_CUT_WAITINGAREA ends at (chute_x, service_y) — at the chute
        PRZ_CUT_WAITINGAREA
        M106 S0
        M83

        {% for poop_num in range(num_poops) %}
            RESPOND PREFIX=INFO MSG="ORCA_PURGE: Poop {poop_num + 1}/{num_poops} ({poop_size|round(1)}mm)"

            # Purge (+retract_len compensates for the retract that follows)
            G1 E{poop_size + retract_len} F200
            G1 E-{retract_len} F1800

            # Cool the poop: full fans 5s, then settle 1.5s
            M106 S255
            M106 P2 S255
            G4 P5000
            M106 S0
            M106 P2 S0
            G4 P1500

            # Kick the poop free (toolhead returns to chute_x for next iteration)
            G90
            G1 X{printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x + GEO.safe_x_offset} Y{printer["gcode_macro GLOBAL_PARAM"].g_bottom_y} F12000
            G4 P200
            G1 X{printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x}   Y{printer["gcode_macro GLOBAL_PARAM"].g_bottom_y} F4000
            G4 P100
            G1 X{printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x + GEO.safe_x_offset} Y{printer["gcode_macro GLOBAL_PARAM"].g_bottom_y} F12000
            G4 P100
            G1 X{printer["gcode_macro GLOBAL_PARAM"].g_spitting_start_x}   Y{printer["gcode_macro GLOBAL_PARAM"].g_bottom_y} F4000
        {% endfor %}

        PRZ_WIPEMOUTH

        # Restore print temp (purge HAPPENS hot — much cleaner color transitions)
        RESPOND PREFIX=INFO MSG="ORCA_PURGE: Restoring temp to {ST.target_extruder_temp}"
        M104 S{ST.target_extruder_temp}

        # Restore fans to whatever PG104 captured
        M106 S{ST.cooling_fan_speed}
        M106 P2 S{ST.assist_fan_value}
    {% else %}
        RESPOND PREFIX=INFO MSG="ORCA_PURGE: No purge requested"
        M104 S{ST.target_extruder_temp}
        M106 S{ST.cooling_fan_speed}
        M106 P2 S{ST.assist_fan_value}
    {% endif %}
