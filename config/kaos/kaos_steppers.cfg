# KAOS_VERSION: v0.95
; Reduce hold current to steppers to potentially reduce wear.
#####################################################################

# ============================================================
# KAOS Hold Current Persistence
# ============================================================
# Persisted variable:
#   kaos_enable_hold_current = 0/1
#
# Runtime variable lives in _USER_CONFIG:
#   enable_hold_current
# ============================================================

[gcode_macro KAOS_SET_HOLD_CURRENT]
description: Enable/disable KAOS reduced hold current and optionally persist the setting
gcode:
    {% set cfg = printer["gcode_macro _USER_CONFIG"] %}
    {% set enable = params.ENABLE|default(cfg.enable_hold_current)|int %}
    {% set save = params.SAVE|default(1)|int %}

    {% if enable < 0 %}{% set enable = 0 %}{% endif %}
    {% if enable > 1 %}{% set enable = 1 %}{% endif %}

    SET_GCODE_VARIABLE MACRO=_USER_CONFIG VARIABLE=enable_hold_current VALUE={enable}

    {% if save == 1 %}
        SAVE_VARIABLE VARIABLE=kaos_enable_hold_current VALUE={enable}
        RESPOND MSG="KAOS hold current set to {enable} and saved"
        {% if enable == 1 %}
            UPDATE_DELAYED_GCODE ID=apply_hold_current DURATION=0.1
        {% endif %}
    {% else %}
        RESPOND MSG="KAOS hold current set to {enable} for this session only"
    {% endif %}

[gcode_macro _KAOS_LOAD_PERSISTED_STEPPER_OPTIONS]
description: Load saved KAOS stepper settings from save_variables
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set cfg = printer["gcode_macro _USER_CONFIG"] %}

    {% set default_hold = cfg.enable_hold_current|default(1)|int %}
    {% set saved_hold = svv.kaos_enable_hold_current|default(default_hold)|int %}

    {% if saved_hold < 0 or saved_hold > 1 %}
        RESPOND TYPE=error MSG="KAOS steppers: saved kaos_enable_hold_current is invalid, using default {default_hold}"
        KAOS_SET_HOLD_CURRENT ENABLE={default_hold} SAVE=0
    {% else %}
        KAOS_SET_HOLD_CURRENT ENABLE={saved_hold} SAVE=0
        RESPOND MSG="KAOS steppers: loaded saved hold current {saved_hold}"
    {% endif %}

[gcode_macro KAOS_STEPPER_STATUS]
description: Show KAOS stepper option status
gcode:
    {% set cfg = printer["gcode_macro _USER_CONFIG"] %}
    {% set svv = printer.save_variables.variables %}
    {% set saved_hold = svv.kaos_enable_hold_current|default("unset") %}
    RESPOND MSG="KAOS stepper status: hold_current={cfg.enable_hold_current|int}, saved_hold_current={saved_hold}"

[gcode_macro _KAOS_APPLY_HOLD_CURRENT]
description: Apply KAOS reduced hold current if enabled
gcode:
  {% if printer["gcode_macro _USER_CONFIG"].enable_hold_current|int == 1 %}
    SET_TMC_CURRENT STEPPER=stepper_x HOLDCURRENT=1.0
    SET_TMC_CURRENT STEPPER=stepper_y HOLDCURRENT=1.0
    SET_TMC_CURRENT STEPPER=stepper_z HOLDCURRENT=0.9
    SET_TMC_CURRENT STEPPER=stepper_z1 HOLDCURRENT=0.9
    SET_TMC_CURRENT STEPPER=extruder HOLDCURRENT=0.5
    _KAOS_LOG LEVEL=2 CATEGORY=STEPPER MSG="Hold currents applied"
  {% else %}
    _KAOS_LOG LEVEL=2 CATEGORY=STEPPER MSG="Hold currents skipped (disabled in config)"
  {% endif %}

[delayed_gcode apply_hold_current]
initial_duration: 3
gcode:
  _KAOS_APPLY_HOLD_CURRENT
