# KAOS_VERSION: v0.95
#####################################################################
; Movement safety notes
;
; PG28 and G30 are intentionally NOT defined in kaos.cfg anymore.
; They are handled in printer_gcode_macro.cfg by the trusted-home / recovery-aware
; safety system. Keeping duplicate PG28/G30 definitions here can create macro
; conflicts and split safety state across files.
#####################################################################
#####################################################################
; KAOS physical-trust guard
;
; This intentionally checks only _TRUSTED_HOME.xyz, not recovery authorization.
; Probing/calibration routines should not run merely because power-loss recovery
; movement was authorized.
#####################################################################
[gcode_macro _KAOS_SAFETY_MODE_REQUIRE_PHYSICAL_TRUSTED_XYZ]
description: Internal guard for probing/calibration commands that require a real physical XYZ home
gcode:
    {% set name = params.NAME|default("Command") %}
    {% if printer["gcode_macro _TRUSTED_HOME"].xyz|int != 1 %}
        { action_raise_error(name ~ " blocked: physical XYZ home is not trusted. Run PG28/G28 first, then rerun. Power-loss recovery authorization is not accepted for probing/calibration.") }
    {% endif %}

#####################################################################
; KAOS Z-position / recovery guard
;
; This allows either real trusted Z or explicit recovery authorization.
; It is intended for non-probing logic that reads current Z, such as
; dynamic speed scaling.
#####################################################################
[gcode_macro _KAOS_SAFETY_MODE_REQUIRE_TRUSTED_Z_OR_RECOVERY]
description: Internal guard for commands that require trusted Z or explicit recovery authorization
gcode:
    {% set name = params.NAME|default("Command") %}
    {% set trusted_z = printer["gcode_macro _TRUSTED_HOME"].z|int %}
    {% set recovery = printer["gcode_macro _RECOVERY_STATE"].authorized|int %}
    {% if trusted_z != 1 and recovery != 1 %}
        { action_raise_error(name ~ " blocked: trusted Z home or user-authorized recovery is required. Run PG28/G28 first, or use AUTHORIZE_POWER_LOSS_RECOVERY only for power-loss continue.") }
    {% endif %}

#####################################################################

# Trusted physical homing guard
# Do not rely on printer.toolhead.homed_axes on this printer because
# startup SET_KINEMATIC_POSITION can make Klipper believe XYZ is homed.
#####################################################################
[gcode_macro _TRUSTED_HOME]
variable_xy: 0
variable_z: 0
variable_xyz: 0
gcode:
    _KAOS_LOG LEVEL=2 CATEGORY=TRUST MSG="Trusted home state: XY={printer['gcode_macro _TRUSTED_HOME'].xy}, Z={printer['gcode_macro _TRUSTED_HOME'].z}, XYZ={printer['gcode_macro _TRUSTED_HOME'].xyz}"

[gcode_macro _CLEAR_TRUSTED_HOME]
gcode:
    SET_GCODE_VARIABLE MACRO=_TRUSTED_HOME VARIABLE=xy VALUE=0
    SET_GCODE_VARIABLE MACRO=_TRUSTED_HOME VARIABLE=z VALUE=0
    SET_GCODE_VARIABLE MACRO=_TRUSTED_HOME VARIABLE=xyz VALUE=0
    SET_GCODE_VARIABLE MACRO=_TRUSTED_AXIS_HOME VARIABLE=x VALUE=0
    SET_GCODE_VARIABLE MACRO=_TRUSTED_AXIS_HOME VARIABLE=y VALUE=0
    SET_GCODE_VARIABLE MACRO=_TRUSTED_AXIS_HOME VARIABLE=z VALUE=0

[gcode_macro _SET_TRUSTED_XY]
gcode:
    SET_GCODE_VARIABLE MACRO=_TRUSTED_HOME VARIABLE=xy VALUE=1
    {% if printer['gcode_macro _TRUSTED_HOME'].z|int == 1 %}
        SET_GCODE_VARIABLE MACRO=_TRUSTED_HOME VARIABLE=xyz VALUE=1
    {% endif %}

[gcode_macro _SET_TRUSTED_Z]
gcode:
    SET_GCODE_VARIABLE MACRO=_TRUSTED_HOME VARIABLE=z VALUE=1
    {% if printer['gcode_macro _TRUSTED_HOME'].xy|int == 1 %}
        SET_GCODE_VARIABLE MACRO=_TRUSTED_HOME VARIABLE=xyz VALUE=1
    {% endif %}

[gcode_macro _SET_TRUSTED_XYZ]
gcode:
    SET_GCODE_VARIABLE MACRO=_TRUSTED_HOME VARIABLE=xy VALUE=1
    SET_GCODE_VARIABLE MACRO=_TRUSTED_HOME VARIABLE=z VALUE=1
    SET_GCODE_VARIABLE MACRO=_TRUSTED_HOME VARIABLE=xyz VALUE=1

[gcode_macro _RECOVERY_STATE]
# This is NOT persisted and does not mean the printer is physically homed.
# It is a temporary user-authorized bypass for power-loss recovery / continue-print workflows.
variable_authorized: 0
gcode:
    _KAOS_LOG LEVEL=2 CATEGORY=RECOVERY MSG="Recovery authorized={printer['gcode_macro _RECOVERY_STATE'].authorized}"

[gcode_macro AUTHORIZE_POWER_LOSS_RECOVERY]
description: User-triggered: allow motion after power loss without re-homing (sets _RECOVERY_STATE.authorized=1)
#Allow movement after power loss. Bypass homing requirements
gcode:
    SET_GCODE_VARIABLE MACRO=_RECOVERY_STATE VARIABLE=authorized VALUE=1
    _KAOS_LOG LEVEL=1 CATEGORY=RECOVERY MSG="Power-loss recovery motion authorized by user. This does not prove physical homing."

[gcode_macro _CLEAR_RECOVERY_AUTH]
# Remove Power-loss recovery motion authorization
gcode:
    SET_GCODE_VARIABLE MACRO=_RECOVERY_STATE VARIABLE=authorized VALUE=0

[gcode_macro _KAOS_SAFETY_MODE_CONFIG]
# Internal motion guard state used only during homing/recovery-safe internal routines.
# There is no user-selectable safe/bulletproof mode anymore.
variable_motion_guard_bypass: 0
gcode:
    _KAOS_LOG LEVEL=2 CATEGORY=SAFETY MSG="Internal motion bypass={printer['gcode_macro _KAOS_SAFETY_MODE_CONFIG'].motion_guard_bypass}"

[gcode_macro _KAOS_SAFETY_MODE_ENABLE_INTERNAL_MOTION_BYPASS]
gcode:
    SET_GCODE_VARIABLE MACRO=_KAOS_SAFETY_MODE_CONFIG VARIABLE=motion_guard_bypass VALUE=1

[gcode_macro _KAOS_SAFETY_MODE_DISABLE_INTERNAL_MOTION_BYPASS]
gcode:
    SET_GCODE_VARIABLE MACRO=_KAOS_SAFETY_MODE_CONFIG VARIABLE=motion_guard_bypass VALUE=0

[gcode_macro _REQUIRE_TRUSTED_XY]
gcode:
    {% set trusted = printer['gcode_macro _TRUSTED_HOME'].xy|int %}
    {% set recovery = printer['gcode_macro _RECOVERY_STATE'].authorized|int %}
    {% set bypass = printer['gcode_macro _KAOS_SAFETY_MODE_CONFIG'].motion_guard_bypass|int %}
    {% if trusted != 1 and recovery != 1 and bypass != 1 %}
        { action_raise_error("Blocked: trusted XY home or user-authorized recovery required. Run PG28/G28 first, or AUTHORIZE_POWER_LOSS_RECOVERY only for power-loss continue.") }
    {% endif %}

[gcode_macro _REQUIRE_TRUSTED_Z]
gcode:
    {% set trusted = printer['gcode_macro _TRUSTED_HOME'].z|int %}
    {% set recovery = printer['gcode_macro _RECOVERY_STATE'].authorized|int %}
    {% set bypass = printer['gcode_macro _KAOS_SAFETY_MODE_CONFIG'].motion_guard_bypass|int %}
    {% if trusted != 1 and recovery != 1 and bypass != 1 %}
        { action_raise_error("Blocked: trusted Z home or user-authorized recovery required. Run PG28/G28 first, or AUTHORIZE_POWER_LOSS_RECOVERY only for power-loss continue.") }
    {% endif %}

[gcode_macro _REQUIRE_TRUSTED_XYZ]
gcode:
    {% set trusted = printer['gcode_macro _TRUSTED_HOME'].xyz|int %}
    {% set recovery = printer['gcode_macro _RECOVERY_STATE'].authorized|int %}
    {% set bypass = printer['gcode_macro _KAOS_SAFETY_MODE_CONFIG'].motion_guard_bypass|int %}
    {% if trusted != 1 and recovery != 1 and bypass != 1 %}
        { action_raise_error("Blocked: trusted XYZ home or user-authorized recovery required. Run PG28/G28 first, or AUTHORIZE_POWER_LOSS_RECOVERY only for power-loss continue.") }
    {% endif %}

