# KAOS_VERSION: v0.95
#####################################################################
# KAOS: Filament handling
#####################################################################
;
; Public commands:
;   LOAD_FILAMENT
;   UNLOAD_FILAMENT
;   COLD_PULL
;   M600
;   SWAP_FILAMENT
;   MATERIAL_INFO
;   KAOS_FILAMENT_STATUS
;   KAOS_FILAMENT_SENSOR_STATUS
;   KAOS_SET_FILAMENT_MENU_MODE
;
; Internal helpers:
;   _MATERIAL_PROFILE
;   _PARSE_MATERIAL
;   _LOAD_FILAMENT_MENU
;   _KAOS_LOAD_FILAMENT_*
;
; Notes:
; - Material profiles are stored as key=value;key=value strings for
;   compatibility with limited Jinja features.
; - XY wipe moves are guarded and skipped unless XY is trusted or
;   recovery motion is authorized.
#####################################################################

#####################################################################
# Material Profile Table
#####################################################################
[gcode_macro _MATERIAL_PROFILE]
description: "Central material profile table using key=value strings"

# Each material is stored as a simple key=value string.
# This avoids JSON, dicts, and all unsupported Jinja features.

variable_pla:     "load_temp=210;unload_temp=200;purge=40;tip=mild;load_speed=800;unload_speed=600;coldpull_heat=210;coldpull_pull=90"
variable_petg:    "load_temp=240;unload_temp=230;purge=60;tip=medium;load_speed=600;unload_speed=600;coldpull_heat=240;coldpull_pull=110"
variable_pctg:    "load_temp=250;unload_temp=240;purge=70;tip=medium;load_speed=600;unload_speed=600;coldpull_heat=250;coldpull_pull=110"
variable_asa:     "load_temp=255;unload_temp=250;purge=80;tip=medium;load_speed=500;unload_speed=600;coldpull_heat=255;coldpull_pull=130"
variable_abs:     "load_temp=245;unload_temp=235;purge=70;tip=medium;load_speed=500;unload_speed=600;coldpull_heat=245;coldpull_pull=130"
variable_pa:      "load_temp=260;unload_temp=255;purge=100;tip=aggressive;load_speed=400;unload_speed=500;coldpull_heat=260;coldpull_pull=140"
variable_pa6_gf:  "load_temp=265;unload_temp=260;purge=120;tip=aggressive;load_speed=350;unload_speed=500;coldpull_heat=265;coldpull_pull=140"
variable_pa_cf:   "load_temp=270;unload_temp=265;purge=120;tip=aggressive;load_speed=350;unload_speed=500;coldpull_heat=270;coldpull_pull=140"

gcode:
    _KAOS_LOG LEVEL=3 CATEGORY=FILAMENT MSG="Material profile table loaded"


#####################################################################
# Internal Material Parser
#####################################################################
[gcode_macro _PARSE_MATERIAL]
description: "Internal helper to parse key=value material strings"

# These MUST exist before SET_GCODE_VARIABLE can assign to them.
variable_load_temp: 0
variable_unload_temp: 0
variable_purge: 0
variable_tip: ""
variable_load_speed: 0
variable_unload_speed: 0
variable_coldpull_heat: 0
variable_coldpull_pull: 0

gcode:
    # Material name passed in
    {% set mat = params.MAT|default("PLA")|upper|string %}

    # STATIC LOOKUP — your firmware cannot do dynamic indexing
    {% if mat == "PLA" %}
        {% set raw = printer["gcode_macro _MATERIAL_PROFILE"].pla %}
    {% elif mat == "PETG" %}
        {% set raw = printer["gcode_macro _MATERIAL_PROFILE"].petg %}
    {% elif mat == "PCTG" %}
        {% set raw = printer["gcode_macro _MATERIAL_PROFILE"].pctg %}
    {% elif mat == "ASA" %}
        {% set raw = printer["gcode_macro _MATERIAL_PROFILE"].asa %}
    {% elif mat == "ABS" %}
        {% set raw = printer["gcode_macro _MATERIAL_PROFILE"].abs %}
    {% elif mat == "PA" %}
        {% set raw = printer["gcode_macro _MATERIAL_PROFILE"].pa %}
    {% elif mat == "PA6_GF" %}
        {% set raw = printer["gcode_macro _MATERIAL_PROFILE"].pa6_gf %}
    {% elif mat == "PA_CF" %}
        {% set raw = printer["gcode_macro _MATERIAL_PROFILE"].pa_cf %}
    {% else %}
        { action_raise_error("Unknown material '" ~ mat ~ "'. Valid: PLA, PETG, PCTG, ASA, ABS, PA, PA6_GF, PA_CF") }
        {% set raw = printer["gcode_macro _MATERIAL_PROFILE"].pla %}
    {% endif %}

    # Split into key=value pairs
    {% set parts = raw.split(';') %}

    # Parse each key=value pair
    {% for p in parts %}
        {% set kv = p.split('=') %}
        {% if kv|length == 2 %}
            {% if kv[0] == "load_temp" %}        SET_GCODE_VARIABLE MACRO=_PARSE_MATERIAL VARIABLE=load_temp VALUE={kv[1]|int} {% endif %}
            {% if kv[0] == "unload_temp" %}      SET_GCODE_VARIABLE MACRO=_PARSE_MATERIAL VARIABLE=unload_temp VALUE={kv[1]|int} {% endif %}
            {% if kv[0] == "purge" %}            SET_GCODE_VARIABLE MACRO=_PARSE_MATERIAL VARIABLE=purge VALUE={kv[1]|int} {% endif %}
            {% if kv[0] == "tip" %}              SET_GCODE_VARIABLE MACRO=_PARSE_MATERIAL VARIABLE=tip VALUE='"{kv[1]}"' {% endif %}
            {% if kv[0] == "load_speed" %}       SET_GCODE_VARIABLE MACRO=_PARSE_MATERIAL VARIABLE=load_speed VALUE={kv[1]|int} {% endif %}
            {% if kv[0] == "unload_speed" %}     SET_GCODE_VARIABLE MACRO=_PARSE_MATERIAL VARIABLE=unload_speed VALUE={kv[1]|int} {% endif %}
            {% if kv[0] == "coldpull_heat" %}    SET_GCODE_VARIABLE MACRO=_PARSE_MATERIAL VARIABLE=coldpull_heat VALUE={kv[1]|int} {% endif %}
            {% if kv[0] == "coldpull_pull" %}    SET_GCODE_VARIABLE MACRO=_PARSE_MATERIAL VARIABLE=coldpull_pull VALUE={kv[1]|int} {% endif %}
        {% endif %}
    {% endfor %}


#####################################################################
# Load Filament
#####################################################################
[gcode_macro LOAD_FILAMENT]
description: "Smart load with material prompt"

# User-configurable defaults
variable_current_material: "PLA"
variable_load_distance: 40
variable_turn_off_extruder: 1
variable_grab_distance: 8
variable_grab_speed: 120

gcode:
    # If MATERIAL is omitted, open material picker instead of silently defaulting to PLA.
    {% if params.MATERIAL is not defined %}
        _LOAD_FILAMENT_MENU
    {% else %}
        # Determine selected material
        {% set material = params.MATERIAL|default("PLA")|upper|string %}
        SET_GCODE_VARIABLE MACRO=LOAD_FILAMENT VARIABLE=current_material VALUE='"{material}"'

        # Parse material profile first, then run execution macro in a new render context.
        _PARSE_MATERIAL MAT={material}
        _LOAD_FILAMENT_EXEC MATERIAL={material} FAST_SWAP={params.FAST_SWAP|default(-1)|int} MOVE_TO_PURGE={params.MOVE_TO_PURGE|default(printer["gcode_macro _USER_CONFIG"].filament_move_to_purge_area)|int} AUTO_HOME={params.AUTO_HOME|default(printer["gcode_macro _USER_CONFIG"].filament_auto_home_xy)|int}
    {% endif %}


[gcode_macro _LOAD_FILAMENT_EXEC]
description: "Internal execution macro for LOAD_FILAMENT after _PARSE_MATERIAL"
gcode:
    {% set material = params.MATERIAL|default(printer["gcode_macro LOAD_FILAMENT"].current_material)|upper|string %}
    {% set fastswap = params.FAST_SWAP|default(-1)|int %}
    {% set move_to_purge = 1 %}
    {% set auto_home = params.AUTO_HOME|default(printer["gcode_macro _USER_CONFIG"].filament_auto_home_xy)|int %}
    {% set wipe_enabled = params.WIPE|default(printer["gcode_macro _USER_CONFIG"].filament_default_wipe)|int %}
    {% if fastswap < 0 %}
        {% set fastswap = printer["gcode_macro _USER_CONFIG"].filament_default_fast_swap|int %}
    {% endif %}
    {% set can_xy = 1 if (printer["gcode_macro _TRUSTED_HOME"].xy|int == 1 or printer["gcode_macro _RECOVERY_STATE"].authorized|int == 1) else 0 %}
    {% set extruder_name = printer.toolhead.extruder %}
    {% set min_extrude_temp = printer.configfile.settings.extruder.min_extrude_temp|float %}

    _KAOS_LOG LEVEL=2 CATEGORY=FILAMENT MSG="LOAD_FILAMENT material={material}"
    _KAOS_FILAMENT_DIAG MSG="LOAD start material={material} move_to_purge={move_to_purge} auto_home={auto_home} fastswap={fastswap} wipe={wipe_enabled} can_xy={can_xy}"

    # Preserve caller motion/extruder state so this utility macro is safe
    # to run from UI, console, or print-time workflows.
    SAVE_GCODE_STATE NAME=load_state

    # If XY isn't trusted, auto-home XY so service-area moves can run safely.
    {% if auto_home == 1 and can_xy != 1 %}
        _KAOS_LOG LEVEL=1 CATEGORY=FILAMENT MSG="XY not trusted: auto-homing X/Y"
        G28 X Y
    {% endif %}

    {% if move_to_purge == 1 and auto_home != 1 and can_xy != 1 %}
        RESPOND PREFIX="FILAMENT_DIAG" MSG="LOAD abort: XY not trusted and AUTO_HOME=0 while MOVE_TO_PURGE=1"
        { action_raise_error("LOAD_FILAMENT aborted: XY not trusted. Set AUTO_HOME=1 or MOVE_TO_PURGE=0.") }
    {% endif %}

    # Optional: move to purge area first using the Phrozen safe transit macro.
    {% if move_to_purge == 1 %}
        _KAOS_FILAMENT_DIAG MSG="LOAD phase=purge_move"
        PRZ_CUT_WAITINGAREA
    {% endif %}

    # Heat to load temperature with an explicit tolerance window.
    # This avoids stalls from strict site-specific M109 wrappers.
    {% set load_temp = printer["gcode_macro _PARSE_MATERIAL"].load_temp|int %}
    _KAOS_FILAMENT_DIAG MSG="LOAD phase=heat current={printer[extruder_name].temperature|round(1)} target={load_temp}"
    {% if printer[printer.toolhead.extruder].temperature < load_temp %}
        M104 S{load_temp}
        TEMPERATURE_WAIT SENSOR={printer.toolhead.extruder} MINIMUM={load_temp-2} MAXIMUM={load_temp+10}
    {% endif %}

    # Continue in a fresh render context so readiness checks reflect post-heat state.
    _LOAD_FILAMENT_EXTRUDE MATERIAL={material} FAST_SWAP={fastswap} WIPE={wipe_enabled} MOVE_TO_PURGE={move_to_purge} MIN_EXTRUDE_TEMP={min_extrude_temp}


[gcode_macro _LOAD_FILAMENT_EXTRUDE]
description: "Internal phase-2 for LOAD_FILAMENT: verify extrusion readiness and load"
gcode:
    {% set material = params.MATERIAL|default(printer["gcode_macro LOAD_FILAMENT"].current_material)|upper|string %}
    {% set fastswap = params.FAST_SWAP|default(-1)|int %}
    {% set wipe_enabled = params.WIPE|default(printer["gcode_macro _USER_CONFIG"].filament_default_wipe)|int %}
    {% set move_to_purge = 1 %}
    {% if fastswap < 0 %}
        {% set fastswap = printer["gcode_macro _USER_CONFIG"].filament_default_fast_swap|int %}
    {% endif %}
    {% set extruder_name = printer.toolhead.extruder %}
    {% set min_extrude_temp = params.MIN_EXTRUDE_TEMP|default(printer.configfile.settings.extruder.min_extrude_temp)|float %}
    {% set can_extrude_now = 1 if (printer[extruder_name].temperature|float >= min_extrude_temp) else 0 %}

    _KAOS_FILAMENT_DIAG MSG="LOAD phase=post_heat temp={printer[extruder_name].temperature|round(1)} min={min_extrude_temp|round(1)} can_extrude={can_extrude_now}"

    # Load sequence
    # G91 sets relative XYZ moves; M83 sets relative extruder moves.
    # This prevents slicer absolute-E mode from breaking manual filament ops.
    {% if can_extrude_now == 1 %}
        _KAOS_FILAMENT_DIAG MSG="LOAD phase=extrude"
        RESPOND PREFIX="FILAMENT" MSG="Insert filament until gears bite. Using Phrozen catch + chute prime."
        M117 Insert filament, Phrozen load...
        _KAOS_FILAMENT_DIAG MSG="LOAD phase=phrozen_catch"
        PG110
        _KAOS_FILAMENT_DIAG MSG="LOAD phase=phrozen_spit_start"
        PRZ_SPITTING_START
        {% if wipe_enabled == 1 %}
            _KAOS_FILAMENT_DIAG MSG="LOAD phase=phrozen_orca_purge"
            ORCA_PURGE FLUSH=0
        {% endif %}
    {% else %}
        RESPOND PREFIX="FILAMENT_DIAG" MSG="LOAD abort: can_extrude=0 temp={printer[extruder_name].temperature|round(1)} min={min_extrude_temp|round(1)}"
        { action_raise_error("LOAD_FILAMENT aborted: hotend cannot extrude yet.") }
    {% endif %}

    # Optional wipe.
    # In purge-area mode, ORCA_PURGE above performs native chute wipe.
    # Otherwise use generic trust-checked helper.
    {% if wipe_enabled == 1 %}
        {% if move_to_purge != 1 %}
            _KAOS_FILAMENT_WIPE_SAFE
        {% endif %}
    {% endif %}

    # Turn off heater unless FAST_SWAP
    {% if printer["gcode_macro LOAD_FILAMENT"].turn_off_extruder and fastswap == 0 %}
        M104 S0
    {% endif %}

    RESTORE_GCODE_STATE NAME=load_state
    M117 Loaded {material}
    _KAOS_LOG LEVEL=2 CATEGORY=FILAMENT MSG="Filament loaded ({material})"

[gcode_macro _LOAD_FILAMENT_MENU]
description: "UI menu for LOAD_FILAMENT material selection"
variable_use_popup: 0
gcode:
    {% set use_popup = params.POPUP|default(printer["gcode_macro _LOAD_FILAMENT_MENU"].use_popup)|int %}
    {% if use_popup == 1 %}
        RESPOND TYPE=command MSG="action:prompt_begin KAOS Filament Load"
        RESPOND TYPE=command MSG="action:prompt_text Select material to load:"
        RESPOND TYPE=command MSG="action:prompt_button PLA|_KAOS_LOAD_FILAMENT_PLA"
        RESPOND TYPE=command MSG="action:prompt_button PETG|_KAOS_LOAD_FILAMENT_PETG"
        RESPOND TYPE=command MSG="action:prompt_button PCTG|_KAOS_LOAD_FILAMENT_PCTG"
        RESPOND TYPE=command MSG="action:prompt_button ASA|_KAOS_LOAD_FILAMENT_ASA"
        RESPOND TYPE=command MSG="action:prompt_button ABS|_KAOS_LOAD_FILAMENT_ABS"
        RESPOND TYPE=command MSG="action:prompt_button PA|_KAOS_LOAD_FILAMENT_PA"
        RESPOND TYPE=command MSG="action:prompt_button PA6_GF|_KAOS_LOAD_FILAMENT_PA6_GF"
        RESPOND TYPE=command MSG="action:prompt_button PA_CF|_KAOS_LOAD_FILAMENT_PA_CF"
        RESPOND TYPE=command MSG="action:prompt_button Close|_KAOS_MENU_CANCEL"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% else %}
        RESPOND PREFIX="FILAMENT" MSG="Select material and run one of:"
        RESPOND PREFIX="FILAMENT" MSG="LOAD_FILAMENT MATERIAL=PLA"
        RESPOND PREFIX="FILAMENT" MSG="LOAD_FILAMENT MATERIAL=PETG"
        RESPOND PREFIX="FILAMENT" MSG="LOAD_FILAMENT MATERIAL=PCTG"
        RESPOND PREFIX="FILAMENT" MSG="LOAD_FILAMENT MATERIAL=ASA"
        RESPOND PREFIX="FILAMENT" MSG="LOAD_FILAMENT MATERIAL=ABS"
        RESPOND PREFIX="FILAMENT" MSG="LOAD_FILAMENT MATERIAL=PA"
        RESPOND PREFIX="FILAMENT" MSG="LOAD_FILAMENT MATERIAL=PA6_GF"
        RESPOND PREFIX="FILAMENT" MSG="LOAD_FILAMENT MATERIAL=PA_CF"
    {% endif %}

[gcode_macro KAOS_SET_FILAMENT_MENU_MODE]
description: "Set material picker mode: POPUP=1 for action prompt UI, POPUP=0 for console fallback"
gcode:
    {% set popup = params.POPUP|default(0)|int %}
    {% if popup < 0 %}
        {% set popup = 0 %}
    {% endif %}
    {% if popup > 1 %}
        {% set popup = 1 %}
    {% endif %}
    SET_GCODE_VARIABLE MACRO=_LOAD_FILAMENT_MENU VARIABLE=use_popup VALUE={popup}
    {% if popup == 1 %}
        RESPOND PREFIX="FILAMENT" MSG="Filament menu mode set to POPUP"
    {% else %}
        RESPOND PREFIX="FILAMENT" MSG="Filament menu mode set to CONSOLE"
    {% endif %}

[gcode_macro _KAOS_LOAD_FILAMENT_PLA]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    LOAD_FILAMENT MATERIAL=PLA

[gcode_macro _KAOS_LOAD_FILAMENT_PETG]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    LOAD_FILAMENT MATERIAL=PETG

[gcode_macro _KAOS_LOAD_FILAMENT_PCTG]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    LOAD_FILAMENT MATERIAL=PCTG

[gcode_macro _KAOS_LOAD_FILAMENT_ASA]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    LOAD_FILAMENT MATERIAL=ASA

[gcode_macro _KAOS_LOAD_FILAMENT_ABS]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    LOAD_FILAMENT MATERIAL=ABS

[gcode_macro _KAOS_LOAD_FILAMENT_PA]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    LOAD_FILAMENT MATERIAL=PA

[gcode_macro _KAOS_LOAD_FILAMENT_PA6_GF]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    LOAD_FILAMENT MATERIAL=PA6_GF

[gcode_macro _KAOS_LOAD_FILAMENT_PA_CF]
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    LOAD_FILAMENT MATERIAL=PA_CF



#####################################################################
# Unload Filament
#####################################################################
[gcode_macro UNLOAD_FILAMENT]
description: "Smart unload with material-aware temps and tip shaping"

# Main retract distance tuned to clear most filament paths beyond drive gears.
variable_unload_distance: 150
variable_unload_retract_chunk: 25
# Short push/pull cycles help the hobbed gear release a bitten filament before final pullout.
variable_unload_debite_cycles: 3
variable_unload_debite_push: 1
variable_unload_debite_pull: 6
variable_unload_debite_speed: 120
# Additional slow pull to reliably release filament from hobbed gears.
variable_unload_gear_release_distance: 60
variable_unload_gear_release_speed: 180
variable_turn_off_extruder: 1
variable_prompt_load_menu: 1

gcode:
    {% set material = printer["gcode_macro LOAD_FILAMENT"].current_material %}

    # Parse material profile first, then run execution macro in a new render context.
    _PARSE_MATERIAL MAT={material}
    _UNLOAD_FILAMENT_EXEC MATERIAL={material} FAST_SWAP={params.FAST_SWAP|default(-1)|int} MOVE_TO_PURGE={params.MOVE_TO_PURGE|default(printer["gcode_macro _USER_CONFIG"].filament_move_to_purge_area)|int} AUTO_HOME={params.AUTO_HOME|default(printer["gcode_macro _USER_CONFIG"].filament_auto_home_xy)|int} PROMPT_LOAD={params.PROMPT_LOAD|default(printer["gcode_macro UNLOAD_FILAMENT"].prompt_load_menu)|int}


[gcode_macro _UNLOAD_FILAMENT_EXEC]
description: "Internal execution macro for UNLOAD_FILAMENT after _PARSE_MATERIAL"
gcode:
    {% set material = params.MATERIAL|default(printer["gcode_macro LOAD_FILAMENT"].current_material)|upper|string %}
    {% set fastswap = params.FAST_SWAP|default(-1)|int %}
    {% set move_to_purge = 1 %}
    {% set auto_home = params.AUTO_HOME|default(printer["gcode_macro _USER_CONFIG"].filament_auto_home_xy)|int %}
    {% set prompt_load = params.PROMPT_LOAD|default(printer["gcode_macro UNLOAD_FILAMENT"].prompt_load_menu)|int %}
    {% set wipe_enabled = params.WIPE|default(printer["gcode_macro _USER_CONFIG"].filament_default_wipe)|int %}
    {% if fastswap < 0 %}
        {% set fastswap = printer["gcode_macro _USER_CONFIG"].filament_default_fast_swap|int %}
    {% endif %}
    {% set can_xy = 1 if (printer["gcode_macro _TRUSTED_HOME"].xy|int == 1 or printer["gcode_macro _RECOVERY_STATE"].authorized|int == 1) else 0 %}
    {% set extruder_name = printer.toolhead.extruder %}
    {% set min_extrude_temp = printer.configfile.settings.extruder.min_extrude_temp|float %}

    _KAOS_LOG LEVEL=2 CATEGORY=FILAMENT MSG="UNLOAD_FILAMENT material={material}"
    _KAOS_FILAMENT_DIAG MSG="UNLOAD start material={material} move_to_purge={move_to_purge} auto_home={auto_home} fastswap={fastswap} wipe={wipe_enabled} prompt_load={prompt_load} can_xy={can_xy}"

    # Preserve caller motion/extruder state so this utility macro is safe
    # to run from UI, console, or print-time workflows.
    SAVE_GCODE_STATE NAME=unload_state

    # If XY isn't trusted, auto-home XY so service-area moves can run safely.
    {% if auto_home == 1 and can_xy != 1 %}
        _KAOS_LOG LEVEL=1 CATEGORY=FILAMENT MSG="XY not trusted: auto-homing X/Y"
        G28 X Y
    {% endif %}

    {% if move_to_purge == 1 and auto_home != 1 and can_xy != 1 %}
        RESPOND PREFIX="FILAMENT_DIAG" MSG="UNLOAD abort: XY not trusted and AUTO_HOME=0 while MOVE_TO_PURGE=1"
        { action_raise_error("UNLOAD_FILAMENT aborted: XY not trusted. Set AUTO_HOME=1 or MOVE_TO_PURGE=0.") }
    {% endif %}

    # Optional: move to purge area first using the Phrozen safe transit macro.
    {% if move_to_purge == 1 %}
        _KAOS_FILAMENT_DIAG MSG="UNLOAD phase=purge_move"
        PRZ_CUT_WAITINGAREA
    {% endif %}

    # Heat to unload temperature with an explicit tolerance window.
    # This avoids stalls from strict site-specific M109 wrappers.
    {% set unload_temp = printer["gcode_macro _PARSE_MATERIAL"].unload_temp|int %}
    _KAOS_FILAMENT_DIAG MSG="UNLOAD phase=heat current={printer[extruder_name].temperature|round(1)} target={unload_temp}"
    {% if printer[printer.toolhead.extruder].temperature < unload_temp %}
        M104 S{unload_temp}
        TEMPERATURE_WAIT SENSOR={printer.toolhead.extruder} MINIMUM={unload_temp-2} MAXIMUM={unload_temp+10}
    {% endif %}

    # Continue in a fresh render context so readiness checks reflect post-heat state.
    _UNLOAD_FILAMENT_EXTRUDE MATERIAL={material} FAST_SWAP={fastswap} WIPE={wipe_enabled} MOVE_TO_PURGE={move_to_purge} PROMPT_LOAD={prompt_load} MIN_EXTRUDE_TEMP={min_extrude_temp}


[gcode_macro _UNLOAD_FILAMENT_EXTRUDE]
description: "Internal phase-2 for UNLOAD_FILAMENT: verify extrusion readiness and retract"
gcode:
    {% set material = params.MATERIAL|default(printer["gcode_macro LOAD_FILAMENT"].current_material)|upper|string %}
    {% set fastswap = params.FAST_SWAP|default(-1)|int %}
    {% set wipe_enabled = params.WIPE|default(printer["gcode_macro _USER_CONFIG"].filament_default_wipe)|int %}
    {% set prompt_load = params.PROMPT_LOAD|default(printer["gcode_macro UNLOAD_FILAMENT"].prompt_load_menu)|int %}
    {% if fastswap < 0 %}
        {% set fastswap = printer["gcode_macro _USER_CONFIG"].filament_default_fast_swap|int %}
    {% endif %}
    {% set extruder_name = printer.toolhead.extruder %}
    {% set min_extrude_temp = params.MIN_EXTRUDE_TEMP|default(printer.configfile.settings.extruder.min_extrude_temp)|float %}
    {% set can_extrude_now = 1 if (printer[extruder_name].temperature|float >= min_extrude_temp) else 0 %}

    _KAOS_FILAMENT_DIAG MSG="UNLOAD phase=post_heat temp={printer[extruder_name].temperature|round(1)} min={min_extrude_temp|round(1)} can_extrude={can_extrude_now}"

    {% if can_extrude_now == 1 %}
        _KAOS_FILAMENT_DIAG MSG="UNLOAD phase=tip_shape"
        # Tip shaping
        # G91 + M83 ensures all E moves are relative and deterministic.
        G91
        M83
        G92 E0

        {% set tip = printer["gcode_macro _PARSE_MATERIAL"].tip|string|replace('"','')|lower %}
        _KAOS_FILAMENT_DIAG MSG="UNLOAD tip_profile={tip}"
        {% if tip == "mild" %}
            G1 E3 F120
            G1 E-5 F300
        {% elif tip == "aggressive" %}
            G1 E5 F120
            G1 E-10 F300
        {% else %}
            G1 E4 F120
            G1 E-7 F300
        {% endif %}

        # Main unload (chunked for better reliability and diagnostics).
        {% set retract_total = printer["gcode_macro UNLOAD_FILAMENT"].unload_distance|int %}
        {% set retract_chunk = printer["gcode_macro UNLOAD_FILAMENT"].unload_retract_chunk|int %}
        {% if retract_chunk < 1 %}
            {% set retract_chunk = 1 %}
        {% endif %}
        {% set full_chunks = retract_total // retract_chunk %}
        {% set remainder = retract_total % retract_chunk %}
        _KAOS_FILAMENT_DIAG MSG="UNLOAD phase=main_retract_start total={retract_total} chunk={retract_chunk}"
        {% for _ in range(full_chunks) %}
            _KAOS_FILAMENT_DIAG MSG="UNLOAD phase=main_retract_chunk index={loop.index} size={retract_chunk}"
            G1 E-{retract_chunk} F{printer["gcode_macro _PARSE_MATERIAL"].unload_speed}
        {% endfor %}
        {% if remainder > 0 %}
            _KAOS_FILAMENT_DIAG MSG="UNLOAD phase=main_retract_chunk index={full_chunks + 1} size={remainder}"
            G1 E-{remainder} F{printer["gcode_macro _PARSE_MATERIAL"].unload_speed}
        {% endif %}
        _KAOS_FILAMENT_DIAG MSG="UNLOAD phase=main_retract_done"

        # De-bite stage: tiny push/pull jogs to release filament from gear teeth.
        {% set debite_cycles = printer["gcode_macro UNLOAD_FILAMENT"].unload_debite_cycles|int %}
        {% set debite_push = printer["gcode_macro UNLOAD_FILAMENT"].unload_debite_push|int %}
        {% set debite_pull = printer["gcode_macro UNLOAD_FILAMENT"].unload_debite_pull|int %}
        {% set debite_speed = printer["gcode_macro UNLOAD_FILAMENT"].unload_debite_speed|int %}
        {% if debite_cycles > 0 and debite_pull > debite_push %}
            _KAOS_FILAMENT_DIAG MSG="UNLOAD phase=debite_start cycles={debite_cycles} push={debite_push} pull={debite_pull} speed={debite_speed}"
            {% for _ in range(debite_cycles) %}
                {% if debite_push > 0 %}
                    G1 E{debite_push} F{debite_speed}
                {% endif %}
                G1 E-{debite_pull} F{debite_speed}
            {% endfor %}
            _KAOS_FILAMENT_DIAG MSG="UNLOAD phase=debite_done"
        {% endif %}

        # Final extra retract to clear filament from extruder gears.
        {% set gear_release = printer["gcode_macro UNLOAD_FILAMENT"].unload_gear_release_distance|int %}
        {% set gear_release_speed = printer["gcode_macro UNLOAD_FILAMENT"].unload_gear_release_speed|int %}
        {% if gear_release > 0 %}
            _KAOS_FILAMENT_DIAG MSG="UNLOAD phase=gear_release distance={gear_release} speed={gear_release_speed}"
            G1 E-{gear_release} F{gear_release_speed}
            _KAOS_FILAMENT_DIAG MSG="UNLOAD phase=gear_release_done"
        {% endif %}
    {% else %}
        RESPOND PREFIX="FILAMENT_DIAG" MSG="UNLOAD abort: can_extrude=0 temp={printer[extruder_name].temperature|round(1)} min={min_extrude_temp|round(1)}"
        { action_raise_error("UNLOAD_FILAMENT aborted: hotend cannot extrude yet.") }
    {% endif %}

    # Optional wipe at service area (chute mode is enforced).
    {% if wipe_enabled == 1 %}
        PRZ_WIPEMOUTH
    {% endif %}

    # Heater off unless FAST_SWAP
    {% if printer["gcode_macro UNLOAD_FILAMENT"].turn_off_extruder and fastswap == 0 %}
        M104 S0
    {% endif %}

    _KAOS_FILAMENT_DIAG MSG="UNLOAD phase=restore_state"
    RESTORE_GCODE_STATE NAME=unload_state
    _KAOS_FILAMENT_DIAG MSG="UNLOAD phase=complete"
    {% if fastswap == 1 %}
        RESPOND PREFIX="FILAMENT" MSG="Fast swap ready: insert new filament now, then run LOAD_FILAMENT."
        M117 Fast swap: load filament
        {% if prompt_load == 1 %}
            _KAOS_FILAMENT_FAST_SWAP_PROMPT
        {% endif %}
    {% else %}
        M117 Unloaded {material}
    {% endif %}
    _KAOS_LOG LEVEL=2 CATEGORY=FILAMENT MSG="Filament unloaded ({material})"


#####################################################################
# Cold Pull
#####################################################################
[gcode_macro COLD_PULL]
description: "Perform a cold pull using material-specific temps"

gcode:
    {% set material = printer["gcode_macro LOAD_FILAMENT"].current_material %}

    # Parse material profile first, then run execution macro in a new render context.
    _PARSE_MATERIAL MAT={material}
    _COLD_PULL_EXEC MATERIAL={material}


[gcode_macro _COLD_PULL_EXEC]
description: "Internal execution macro for COLD_PULL after _PARSE_MATERIAL"
gcode:
    {% set material = params.MATERIAL|default(printer["gcode_macro LOAD_FILAMENT"].current_material)|upper|string %}
    {% set extruder_name = printer.toolhead.extruder %}
    {% set min_extrude_temp = printer.configfile.settings.extruder.min_extrude_temp|float %}

    _KAOS_LOG LEVEL=2 CATEGORY=FILAMENT MSG="COLD_PULL material={material}"

    {% set coldpull_heat = printer["gcode_macro _PARSE_MATERIAL"].coldpull_heat|int %}
    _KAOS_FILAMENT_DIAG MSG="COLD_PULL phase=heat current={printer[extruder_name].temperature|round(1)} target={coldpull_heat}"
    M104 S{coldpull_heat}
    TEMPERATURE_WAIT SENSOR={printer.toolhead.extruder} MINIMUM={coldpull_heat-2} MAXIMUM={coldpull_heat+10}

    # Continue in a fresh render context so readiness checks reflect post-heat state.
    _COLD_PULL_CONTINUE MATERIAL={material} MIN_EXTRUDE_TEMP={min_extrude_temp}


[gcode_macro _COLD_PULL_CONTINUE]
description: "Internal phase-2 for COLD_PULL: verify extrusion readiness and complete pull"
gcode:
    {% set material = params.MATERIAL|default(printer["gcode_macro LOAD_FILAMENT"].current_material)|upper|string %}
    {% set extruder_name = printer.toolhead.extruder %}
    {% set min_extrude_temp = params.MIN_EXTRUDE_TEMP|default(printer.configfile.settings.extruder.min_extrude_temp)|float %}
    {% set can_extrude_now = 1 if (printer[extruder_name].temperature|float >= min_extrude_temp) else 0 %}

    _KAOS_FILAMENT_DIAG MSG="COLD_PULL phase=post_heat temp={printer[extruder_name].temperature|round(1)} min={min_extrude_temp|round(1)} can_extrude={can_extrude_now}"

    # Use relative E mode for repeatable push/retract cleanup strokes.
    {% if can_extrude_now == 1 %}
        _KAOS_FILAMENT_DIAG MSG="COLD_PULL phase=prep_strokes"
        G91
        M83
        G1 E5 F120
        G1 E-2 F300
        G90
    {% else %}
        RESPOND PREFIX="FILAMENT_DIAG" MSG="COLD_PULL abort: can_extrude=0 temp={printer[extruder_name].temperature|round(1)} min={min_extrude_temp|round(1)}"
        { action_raise_error("COLD_PULL aborted: hotend cannot extrude during heat phase.") }
    {% endif %}

    {% set coldpull_pull = printer["gcode_macro _PARSE_MATERIAL"].coldpull_pull|int %}
    _KAOS_FILAMENT_DIAG MSG="COLD_PULL phase=pull_temp target={coldpull_pull}"
    M104 S{coldpull_pull}
    TEMPERATURE_WAIT SENSOR={printer.toolhead.extruder} MINIMUM={coldpull_pull-2} MAXIMUM={coldpull_pull+10}

    G91
    G1 E-30 F120
    G90

    M117 Cold pull complete


#####################################################################
# M600 / Runout / Swap
#####################################################################
[gcode_macro M600]
description: "Filament change during print"

gcode:
    _REQUIRE_TRUSTED_XY
    _REQUIRE_TRUSTED_Z
    _KAOS_LOG LEVEL=1 CATEGORY=FILAMENT MSG="M600 filament change triggered"
    SAVE_GCODE_STATE NAME=fil_change
    PAUSE
    G91
    G1 Z10 F600
    G90
    G1 X10 Y10 F6000
    UNLOAD_FILAMENT FAST_SWAP=1
    RESTORE_GCODE_STATE NAME=fil_change


[gcode_macro FILAMENT_RUNOUT]
description: "Triggered when filament sensor detects runout"
gcode:
    _KAOS_LOG LEVEL=1 CATEGORY=FILAMENT MSG="Filament runout detected"
    M600


[gcode_macro SWAP_FILAMENT]
description: "Unload then load filament with material prompt"
gcode:
    UNLOAD_FILAMENT FAST_SWAP=1 PROMPT_LOAD=0
    _LOAD_FILAMENT_MENU


[gcode_macro _KAOS_FILAMENT_FAST_SWAP_PROMPT]
description: "Show screen prompt to insert filament and start load after fast swap"
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin KAOS Fast Swap"
    RESPOND TYPE=command MSG="action:prompt_text Unload complete. Insert new filament, then choose load."
    RESPOND TYPE=command MSG="action:prompt_button Load Filament|_LOAD_FILAMENT_MENU"
    RESPOND TYPE=command MSG="action:prompt_button Close|_KAOS_MENU_CANCEL"
    RESPOND TYPE=command MSG="action:prompt_show"


#####################################################################
# Status / Debug
#####################################################################
[gcode_macro MATERIAL_INFO]
description: "Print current material profile info"

gcode:
    {% set material = printer["gcode_macro LOAD_FILAMENT"].current_material %}

    # Parse material profile first, then report values in a new render context.
    _PARSE_MATERIAL MAT={material}
    _MATERIAL_INFO_EXEC MATERIAL={material}


[gcode_macro _MATERIAL_INFO_EXEC]
description: "Internal execution macro for MATERIAL_INFO after _PARSE_MATERIAL"
gcode:
    {% set material = params.MATERIAL|default(printer["gcode_macro LOAD_FILAMENT"].current_material)|upper|string %}
    {% set tip = printer["gcode_macro _PARSE_MATERIAL"].tip|string|replace('"','')|lower %}
    RESPOND TYPE=command MSG="Material {material}: load={printer['gcode_macro _PARSE_MATERIAL'].load_temp} unload={printer['gcode_macro _PARSE_MATERIAL'].unload_temp} purge={printer['gcode_macro _PARSE_MATERIAL'].purge} tip={tip}"

[gcode_macro _KAOS_FILAMENT_WIPE_SAFE]
description: "Internal helper: perform wipe move only when XY is trusted"
gcode:
    {% set can_xy = 1 if (printer["gcode_macro _TRUSTED_HOME"].xy|int == 1 or printer["gcode_macro _RECOVERY_STATE"].authorized|int == 1) else 0 %}
    {% if can_xy == 1 %}
        G90
        G1 X10 Y10 F6000
        G91
    {% else %}
        _KAOS_LOG LEVEL=1 CATEGORY=FILAMENT MSG="Wipe skipped: XY not trusted"
    {% endif %}

[gcode_macro _KAOS_FILAMENT_DIAG]
description: "Internal helper: filament diagnostics gated by KAOS DEBUG log level"
variable_enabled: 1
gcode:
    {% if printer["gcode_macro _KAOS_FILAMENT_DIAG"].enabled|int == 1 %}
        _KAOS_LOG LEVEL=3 CATEGORY=FILAMENT MSG="{params.MSG|default('')|string}"
    {% endif %}

[gcode_macro KAOS_FILAMENT_STATUS]
description: "Show current filament macro state"
gcode:
    RESPOND MSG="Filament status: material={printer['gcode_macro LOAD_FILAMENT'].current_material}, load_distance={printer['gcode_macro LOAD_FILAMENT'].load_distance}, unload_distance={printer['gcode_macro UNLOAD_FILAMENT'].unload_distance}"
    KAOS_FILAMENT_SENSOR_STATUS SENSOR=fila


[gcode_macro KAOS_FILAMENT_SENSOR_STATUS]
description: "Show live state of a filament runout sensor (default: fila)"
gcode:
    {% set sensor = params.SENSOR|default("fila")|string %}
    {% set sw_key = "filament_switch_sensor " ~ sensor %}
    {% set mo_key = "filament_motion_sensor " ~ sensor %}

    {% if sw_key in printer %}
        RESPOND MSG="Filament sensor '{sensor}' type=switch detected={printer[sw_key].filament_detected}"
    {% elif mo_key in printer %}
        RESPOND MSG="Filament sensor '{sensor}' type=motion detected={printer[mo_key].filament_detected}"
    {% else %}
        RESPOND PREFIX="FILAMENT" MSG="No filament sensor object loaded for '{sensor}'."
        RESPOND PREFIX="FILAMENT" MSG="Define [filament_switch_sensor {sensor}] or [filament_motion_sensor {sensor}] in printer config."
        RESPOND PREFIX="FILAMENT" MSG="Startup sensor-disable call is skipped when no 'fila' sensor object exists."
    {% endif %}
