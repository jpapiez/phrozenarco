# KAOS_VERSION: v0.95
;******************************
; Variable bed mesh depending on size of print.
;******************************

[gcode_macro BED_MESH_CALIBRATE_CUSTOM]
description: KAOS adaptive bed mesh wrapper; requires physically trusted XYZ before probing
gcode:
    ; Defaults prevent missing-parameter Jinja errors so safety failures stay clear.
    {% set mesh_min_x = params.MESH_MIN_X|default(10)|float %}
    {% set mesh_min_y = params.MESH_MIN_Y|default(10)|float %}
    {% set mesh_max_x = params.MESH_MAX_X|default(290)|float %}
    {% set mesh_max_y = params.MESH_MAX_Y|default(290)|float %}

    ; Safety: use the current trusted-home state, not PG28.has_run.
    ; Mesh probing requires a real trusted home, not merely recovery authorization.
    _KAOS_SAFETY_MODE_REQUIRE_PHYSICAL_TRUSTED_XYZ NAME="BED_MESH_CALIBRATE_CUSTOM"
    _KAOS_LOG LEVEL=3 CATEGORY=MESH MSG="BED_MESH_CALIBRATE_CUSTOM: trusted XYZ confirmed"

    {% set x_size = mesh_max_x - mesh_min_x %}
    {% set y_size = mesh_max_y - mesh_min_y %}
    {% set max_size = x_size if x_size > y_size else y_size %}

    {% if max_size <= 60 %}
        {% set probe_count = "3,3" %}
        {% set mesh_algorithm = "lagrange" %}
    {% elif max_size <= 150 %}
        {% set probe_count = "5,5" %}
        {% set mesh_algorithm = "bicubic" %}
    {% else %}
        {% set probe_count = "7,7" %}
        {% set mesh_algorithm = "bicubic" %}
    {% endif %}

    _KAOS_LOG LEVEL=2 CATEGORY=MESH MSG="BED_MESH_CALIBRATE_CUSTOM: area={max_size}mm probe_count={probe_count} algorithm={mesh_algorithm}"

    BED_MESH_CLEAR
    BED_MESH_CALIBRATE PROFILE=default mesh_min={mesh_min_x},{mesh_min_y} mesh_max={mesh_max_x},{mesh_max_y} probe_count={probe_count} algorithm={mesh_algorithm}