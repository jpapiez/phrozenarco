# KAOS_VERSION: v0.95
#####################################################################
; Light Section
;   #TURN_ON_LIGHT_AT_BOOT
;   #KAOS_LIGHTS_OFF_DELAY
;   #KAOS_LIGHTS_ON
;   #KAOS_LIGHTS_OFF
;   #KAOS_LIGHTS_TOGGLE
#####################################################################

# ============================================================
# KAOS Startup Light / Sound Persistence
# ============================================================
# Persisted variables:
#   kaos_enable_startup_light = 0/1
#   kaos_enable_startup_beep  = 0/1
#
# Runtime variables live in _USER_CONFIG:
#   enable_startup_light
#   enable_startup_beep
# ============================================================

[gcode_macro KAOS_SET_STARTUP_LIGHT]
description: Enable/disable startup lights and optionally persist the setting
gcode:
    {% set cfg = printer["gcode_macro _USER_CONFIG"] %}
    {% set enable = params.ENABLE|default(cfg.enable_startup_light)|int %}
    {% set save = params.SAVE|default(1)|int %}

    {% if enable < 0 %}{% set enable = 0 %}{% endif %}
    {% if enable > 1 %}{% set enable = 1 %}{% endif %}

    SET_GCODE_VARIABLE MACRO=_USER_CONFIG VARIABLE=enable_startup_light VALUE={enable}

    {% if save == 1 %}
        SAVE_VARIABLE VARIABLE=kaos_enable_startup_light VALUE={enable}
        RESPOND MSG="KAOS startup lights set to {enable} and saved"
    {% else %}
        RESPOND MSG="KAOS startup lights set to {enable} for this session only"
    {% endif %}

[gcode_macro KAOS_SET_STARTUP_BEEP]
description: Enable/disable startup sound and optionally persist the setting
gcode:
    {% set cfg = printer["gcode_macro _USER_CONFIG"] %}
    {% set enable = params.ENABLE|default(cfg.enable_startup_beep)|int %}
    {% set save = params.SAVE|default(1)|int %}

    {% if enable < 0 %}{% set enable = 0 %}{% endif %}
    {% if enable > 1 %}{% set enable = 1 %}{% endif %}

    SET_GCODE_VARIABLE MACRO=_USER_CONFIG VARIABLE=enable_startup_beep VALUE={enable}

    {% if save == 1 %}
        SAVE_VARIABLE VARIABLE=kaos_enable_startup_beep VALUE={enable}
        RESPOND MSG="KAOS startup sound set to {enable} and saved"
    {% else %}
        RESPOND MSG="KAOS startup sound set to {enable} for this session only"
    {% endif %}

[gcode_macro _KAOS_LOAD_PERSISTED_STARTUP_OPTIONS]
description: Load saved KAOS startup light/sound settings from save_variables
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set cfg = printer["gcode_macro _USER_CONFIG"] %}

    {% set default_light = cfg.enable_startup_light|default(1)|int %}
    {% set default_beep = cfg.enable_startup_beep|default(0)|int %}

    {% set saved_light = svv.kaos_enable_startup_light|default(default_light)|int %}
    {% set saved_beep = svv.kaos_enable_startup_beep|default(default_beep)|int %}

    {% if saved_light < 0 or saved_light > 1 %}
        RESPOND TYPE=error MSG="KAOS startup: saved kaos_enable_startup_light is invalid; using default {default_light}"
        KAOS_SET_STARTUP_LIGHT ENABLE={default_light} SAVE=0
    {% else %}
        KAOS_SET_STARTUP_LIGHT ENABLE={saved_light} SAVE=0
        RESPOND MSG="KAOS startup: loaded saved startup lights {saved_light}"
    {% endif %}

    {% if saved_beep < 0 or saved_beep > 1 %}
        RESPOND TYPE=error MSG="KAOS startup: saved kaos_enable_startup_beep is invalid; using default {default_beep}"
        KAOS_SET_STARTUP_BEEP ENABLE={default_beep} SAVE=0
    {% else %}
        KAOS_SET_STARTUP_BEEP ENABLE={saved_beep} SAVE=0
        RESPOND MSG="KAOS startup: loaded saved startup sound {saved_beep}"
    {% endif %}

[gcode_macro KAOS_STARTUP_STATUS]
description: Show KAOS startup light/sound status
gcode:
    {% set cfg = printer["gcode_macro _USER_CONFIG"] %}
    RESPOND MSG="KAOS startup status: light={cfg.enable_startup_light|int}, sound={cfg.enable_startup_beep|int}"

[delayed_gcode TURN_ON_LIGHT_AT_BOOT]
initial_duration: 5
gcode:
  {% if printer["gcode_macro _USER_CONFIG"].enable_startup_light|int == 1 %}
    KAOS_LIGHTS_ON
  {% endif %}


[delayed_gcode KAOS_LIGHTS_OFF_DELAY]
gcode:
    KAOS_LIGHTS_OFF
 #UPDATE_DELAYED_GCODE ID=KAOS_LIGHTS_OFF_DELAY DURATION=1200  ; 20 minutes

## State container shared by KAOS_LIGHTS_ON / KAOS_LIGHTS_OFF / KAOS_LIGHTS_TOGGLE.
[gcode_macro _LIGHTS_STATE]
description: State container - chamber-light on/off (read by KAOS_LIGHTS_TOGGLE, written by ON/OFF/TOGGLE)
variable_on: 0
gcode:


[gcode_macro KAOS_LIGHTS_ON]
description: Turn printer light on (sets _LIGHTS_STATE.on=1)
gcode:
        SET_GCODE_VARIABLE MACRO=_LIGHTS_STATE VARIABLE=on VALUE=1
        P0 LED_SetState=1

[gcode_macro KAOS_LIGHTS_OFF]
description: Turn printer light off (sets _LIGHTS_STATE.on=0)
gcode:
        SET_GCODE_VARIABLE MACRO=_LIGHTS_STATE VARIABLE=on VALUE=0
        P0 LED_SetState=0

[gcode_macro KAOS_LIGHTS_TOGGLE]
description: Toggle printer light state (reads + flips _LIGHTS_STATE.on)
gcode:
    {% if printer["gcode_macro _LIGHTS_STATE"].on == 0 %}
        SET_GCODE_VARIABLE MACRO=_LIGHTS_STATE VARIABLE=on VALUE=1
        P0 LED_SetState=1
    {% else %}
        SET_GCODE_VARIABLE MACRO=_LIGHTS_STATE VARIABLE=on VALUE=0
        P0 LED_SetState=0
    {% endif %}
