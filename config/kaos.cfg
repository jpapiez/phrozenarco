# KAOS_VERSION: v0.95
# KAOS configuration loader
# Last cleanup: 2026-04-30
#
# This file is now only the loader/index.
# Feature logic lives in the ./kaos/ subdirectory.

[respond] # console messaging support
[exclude_object] # Orca object selection support


#####################################################################
# KAOS: User-editable configuration
#####################################################################


[gcode_macro _USER_CONFIG]
#####################################################################
# This section stores feature variable defaults.
# Defaults are pre-populated with tested values. 
# User modified values are save in kaos/kaos_variables.
#####################################################################
variable_enable_startup_light: 1
variable_enable_startup_beep: 0
variable_enable_hold_current: 1    # enable reduced hold current for stepper motors
variable_enable_board_fan_ctrl: 1  # Enable Fan control  ===
;Future:
;variable_enable_filamentchange_beep: 0
;variable_enable_lights_off_print_complete: 0

#####################################################################
# === Unified logging control Defaults ===
# Levels: 0=ERROR, 1=WARN, 2=INFO, 3=DEBUG
# User modified values are save in kaos/kaos_variables.
#####################################################################
variable_log_level: 1        # recommended quiet mode
variable_log_categories: 1   # 1=show categories, 0=hide categories
variable_log_timestamp: 0    # Python-side KAOS timestamp flag
variable_log_language: 'en'  # Python-side KAOS language: en, fr, or zh

#####################################################################
# === Variables to control Homing and Motion ===
#####################################################################
variable_min_allowed_z: -0.10      # lowest normal/manual Z target allowed (mm); protects against full position_min travel while allowing small live-Z offsets
variable_homing_z_lift_feedrate: 600      # mm/min; Z safety lift/drop feedrate used inside homing_override
variable_homing_y_clear_feedrate: 2000     # mm/min; Y move away from endstop after Y home
variable_homing_center_feedrate: 8000      # mm/min; XY move to bed center before Z home
variable_homing_final_z_feedrate: 600      # mm/min; final Z lift after full homing


#####################################################################
# === Variables to control functionality of AMS color changes ===
#####################################################################
variable_initial_purge_length: 80     # mm to purge on initial load (when slicer sends FLUSH=0); stacks on top of PRZ_SPITTING_START's 55mm prime
variable_max_poop_size: 100           # max mm per poop (larger purges split with kick between)

#####################################################################
# === Variables to control fan ===
#####################################################################
variable_board_fan_target: 40   ; normal MCU target temp (°C)
variable_cpu_fan_on: 55          ; CPU temperature to force fan ON
variable_cpu_fan_off: 45         ; CPU temperature to release override
variable_cpu_override_target: 10  ; lowers fan target to force ON during CPU override

#####################################################################
# === Variables Dynamic Speed By Height (tall / narrow prints) ===
#####################################################################
# Height thresholds (mm)
variable_dynamic_z1: 100 ;height break one
variable_dynamic_z2: 160 ;height break two
# Acceleration profiles (mm/s²)
variable_dynamic_accel_mid: 8000 ; velocity after height break one
variable_dynamic_accel_high: 4000 ;velocity after height break two
# Speed scaling profiles (M220 %)
variable_dynamic_speed_mid: 70 ;speed after height break two
variable_dynamic_speed_high: 50 ;speed after height break two


#####################################################################
#####################################################################
#####################################################################
# Do not modify anything below here unless you know what you are doing!
#####################################################################
#####################################################################
gcode:
  # placeholder – this macro only stores variables
  {% set _ = 0 %}

# ============================================================
# KAOS Persistent Variables
# ============================================================
# Used by KAOS to persist user-facing preferences across restarts.
# Example variables:
#   kaos_log_level
#   kaos_log_categories
#   kaos_log_timestamp
#   kaos_log_language
#   kaos_enable_startup_light
#   kaos_enable_startup_beep
#   kaos_enable_hold_current
#   kaos_enable_board_fan_ctrl
#
# Values are written by SAVE_VARIABLE and read from:
#   printer.save_variables.variables
# ============================================================

[save_variables]
filename: ~/printer_data/config/kaos/kaos_variables.cfg

# ============================================================
# KAOS Startup Loader
# ============================================================




# KAOS modules - keep this order for readability and predictable startup behavior.
[include kaos/kaos_logging.cfg]
[include kaos/kaos_fans.cfg]
[include kaos/kaos_lights.cfg]
[include kaos/kaos_safety.cfg]
[include kaos/kaos_steppers.cfg]
[include kaos/kaos_beeper.cfg]
[include kaos/kaos_mesh.cfg]
[include kaos/kaos_z_tilt.cfg]
[include kaos/kaos_screws_tilt.cfg]
[include kaos/kaos_dynamic_speed.cfg]
[include kaos/kaos_debug.cfg]
[include kaos/kaos_menu.cfg]
[include kaos/magic_ams_by_chris.cfg] # Complete rewrite of filament purge to integrate with Orca


[delayed_gcode KAOS_LOAD_PERSISTED_SETTINGS]
# Load persisted settings before startup light/sound delayed_gcode actions run.
initial_duration: 0.5
gcode:
    _KAOS_LOAD_PERSISTED_LOGGING
    _KAOS_LOAD_PERSISTED_STARTUP_OPTIONS
    _KAOS_LOAD_PERSISTED_FAN_OPTIONS
    _KAOS_LOAD_PERSISTED_STEPPER_OPTIONS